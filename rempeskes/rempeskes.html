<script>
/* ============================================================
   AUTOPLAY MODULE — Ρεμπεσκές
   ------------------------------------------------------------
   Toggle ON/OFF, δεν αλλάζει καθόλου το κανονικό gameplay όσο
   είναι OFF (autoPlayEnabled = false -> getSpeedFactor() = 1,
   άρα CD_DURATION/COMBAT_TICK_MS παραμένουν στα κανονικά τους).

   Ρυθμίσεις που μπορείς εύκολα να αλλάξεις παρακάτω:
   - AUTO_DEPTH_BELOW_PLAYER : πόσα levels κάτω από τον παίκτη
     διαλέγει αυτόματα το dungeon (default 5). Χρησιμοποιείται μόνο
     όταν AUTO_USE_TARGET_RATIO = false.
   - AUTO_USE_TARGET_RATIO   : true -> αγνοεί το AUTO_DEPTH_BELOW_PLAYER
     και αντ' αυτού διαλέγει το βάθος που φέρνει το combat ratio
     (calculateDifficulty του παιχνιδιού) όσο πιο κοντά γίνεται στο
     AUTO_TARGET_COMBAT_RATIO.
   - AUTO_TARGET_COMBAT_RATIO : επιθυμητό ratio δυσκολίας (π.χ. 0.9).
     Μικρότερο ratio = πιο εύκολη/ασφαλής μάχη, μεγαλύτερο = πιο δύσκολη.
   - AUTO_BEER_HP_PCT        : κάτω από ποιο % HP πίνει μπύρα (0.70 = 70%).
   - AUTO_RETREAT_HP_PCT     : κάτω από ποιο % HP σκέφτεται retreat (0.50 = 50%).
   - AUTO_RETREAT_BEER_CHARGE_PCT : πόσο "γεμάτο" (0..1) πρέπει να είναι
     το cooldown της μπύρας ώστε να ΜΗΝ κάνει retreat (default 0.50 = 50%).
   - AUTO_TICK_MS            : κάθε πόσα ms (σε ταχύτητα x1) σκέφτεται το bot.
   ============================================================ */
(function () {

    // ==================== ΡΥΘΜΙΣΕΙΣ (επεξεργάσιμες) ====================
    let AUTO_DEPTH_BELOW_PLAYER = 0;        // levels κάτω (ή πάνω, αν αρνητικό) από τον player — μόνο αν AUTO_USE_TARGET_RATIO = false
    let AUTO_USE_TARGET_RATIO = true;       // true: επιλογή βάθους με βάση το combat ratio αντί για σταθερό offset
    let AUTO_TARGET_COMBAT_RATIO = 0.85;      // στόχος για το calculateDifficulty(player, monster) — μόνο αν AUTO_USE_TARGET_RATIO = true
    let AUTO_BEER_HP_PCT = 0.80;            // μπύρα όταν HP <= 70% (δηλ. έχει δεχτεί >=30% damage)
    let AUTO_RETREAT_HP_PCT = 0.5;         // κατώφλι HP για σκέψη retreat
    let AUTO_RETREAT_BEER_CHARGE_PCT = 0.5;// αν η μπύρα δεν είναι έστω χ% charged -> retreat
    let AUTO_TICK_MS = 150;                 // βασικός ρυθμός σκέψης του bot σε x1 ταχύτητα
    // =====================================================================

    let autoPlayInterval = null;
    let autoLastMonsterRef = null; // για να ξέρουμε πότε εμφανίστηκε νέο τέρας (Κατραπακιά στο 1ο χτύπημα)
    let autoLastPlayerLevel = player.level; // για να ξέρουμε πότε ανέβηκε level ο παίκτης
    let autoCombatTickStart = Date.now();
    let autoEarlyPhaseFired = false;
    let autoLatePhaseFired = false;
    let autoRetreatAfterLevel = false;
    let autoLastCombatTime = 0;

    const toggleBtn = document.getElementById('autoplay-toggle-btn');
    const speedSelect = document.getElementById('autoplay-speed-select');
    const statusEl = document.getElementById('autoplay-status');

    function setStatus(text) {
        if (statusEl) statusEl.textContent = text;
    }

    // Εκτιμά τα στατιστικά ενός "κανονικού" (normal variant) τέρατος σε συγκεκριμένο level,
    // χωρίς να χρειάζεται να το κάνουμε spawn — ίδιος τύπος στατιστικών με το spawnMonster().
    // (Οι σπάνιες παραλλαγές weapon/armor/magic/legendary αγνοούνται εδώ σκόπιμα ως προσέγγιση.)
    function estimateMonsterAt(lvl) {
        const atk = lvl * 0.75 + (lvl - 1) + (lvl / 2 - 0.5);
        const def = lvl * 0.75 + (lvl - 1) + (lvl / 2 - 0.5);
        const maxHp = lvl * 100;
        return { level: lvl, atk: atk, def: def, hp: maxHp, maxHp: maxHp };
    }

    // Ψάχνει, μέσα στα διαθέσιμα levels, το ΒΑΘΥΤΕΡΟ level του οποίου το calculateDifficulty()
    // ΔΕΝ ξεπερνάει το targetRatio (είναι ένα "ceiling", όχι απλά το πιο κοντινό πάνω/κάτω).
    // πχ βάθος 9 -> 0.70, βάθος 10 -> 0.80, βάθος 11 -> 0.88, target 0.86 => διαλέγει το 10.
    function findDepthForTargetRatio(targetRatio, maxLevel) {
        let bestLevel = 1;
        let bestRatioUnderCap = -Infinity; // το μεγαλύτερο ratio που βρήκαμε ενώ ήταν <= targetRatio
        let smallestRatioLevel = 1;
        let smallestRatio = Infinity; // fallback αν ΚΑΝΕΝΑ level δεν πιάνει το cap (π.χ. ακόμα και το 1 το ξεπερνάει)

        for (let lvl = 1; lvl <= maxLevel; lvl++) {
            const virtualMonster = estimateMonsterAt(lvl);
            const ratio = calculateDifficulty(player, virtualMonster);

            if (ratio <= targetRatio && ratio > bestRatioUnderCap) {
                bestRatioUnderCap = ratio;
                bestLevel = lvl;
            }

            if (ratio < smallestRatio) {
                smallestRatio = ratio;
                smallestRatioLevel = lvl;
            }
        }

        // Αν κανένα level δεν έμεινε κάτω/ίσο από το cap, πήγαινε στο πιο ασφαλές (μικρότερο ratio) διαθέσιμο.
        if (bestRatioUnderCap === -Infinity) return smallestRatioLevel;

        return bestLevel;
    }

    // Ξαναφτιάχνει το interval σκέψης του bot ανάλογα με την επιλεγμένη ταχύτητα,
    // ΚΑΙ ξαναφτιάχνει (αν είμαστε ήδη σε μάχη) το combatInterval του παιχνιδιού
    // ώστε να τρέξει με τη νέα ταχύτητα αμέσως, χωρίς να περιμένει τον επόμενο γύρο.
    function rearmTimers() {
        if (autoPlayInterval) {
            clearInterval(autoPlayInterval);
            autoPlayInterval = null;
        }

        if (autoPlayEnabled) {
            const tickMs = Math.max(10, AUTO_TICK_MS / getSpeedFactor());
            autoPlayInterval = setInterval(autoPlayTick, tickMs);
        }

        if (typeof inCombat !== 'undefined' && inCombat) {
            if (combatInterval) clearInterval(combatInterval);
            combatInterval = setInterval(executeCombatRound, effTick());
        } else if (typeof townRegenInterval !== 'undefined' && townRegenInterval) {
            startTownRegen();
        }
    }

    function autoPlayTick() {
        if (!autoPlayEnabled) return;

        // Ironman νεκρός -> δεν κάνει τίποτα (ο παίκτης πρέπει να ξεκινήσει νέο)
        if (player.ironman && player.ironmanDead) {
            setStatus("AutoPlay: ο Ironman χαρακτήρας έχει πεθάνει, δεν μπορεί να συνεχίσει.");
            return;
        }

        // ---------- LEVEL UP: σημείωσε για retreat στην επόμενη μάχη ----------
        if (player.level > autoLastPlayerLevel) {
            autoLastPlayerLevel = player.level;
            autoRetreatAfterLevel = true;
            setStatus(`AutoPlay: ανέβηκε level (${player.level}) -> θα κάνει retreat στην επόμενη μάχη...`);
        }

        // ---------- ΕΚΤΟΣ ΜΑΧΗΣ: πρώτα γλέντι (αν υπάρχει), μετά μπες στο dungeon ----------
        if (!inCombat) {
            autoLastMonsterRef = null;
            autoRetreatAfterLevel = false;

            // ΑΣΦΑΛΕΙΑ: μετά από retreat+kill, το παιχνίδι θέτει inCombat=false άμεσα
            // αλλά το HP μηδενίζεται στο 10% με setTimeout(500). Αν ξαναμπούμε σε μάχη
            // πριν προλάβει το timeout, θα βρεθούμε mid-fight με 10% HP.
            const msSinceCombat = Date.now() - autoLastCombatTime;
            if (msSinceCombat < 900) {
                setStatus(`AutoPlay: αναμονή μετά τη μάχη (${Math.round(msSinceCombat)}ms)...`);
                return;
            }

            // Ίδια λογική με το handleHuntRetreatClick(): αν έχει ανέβει level και έχει gold
            // που δεν έχει "γλεντήσει" ακόμα, κάνε πρώτα cash-in σε XP πριν κατέβεις ξανά.
            if (player.level > player.lastGoldCashedLevel && player.gold > 0) {
                setStatus("AutoPlay: γλεντάει το χρυσάφι για XP στον τεκέ...");
                cashInGoldForXp();
                levelUpSound();
                return; // το επόμενο tick θα προχωρήσει στην κατάβαση
            }

            // Περίμενε να γεμίσει η υγεία στον τεκέ πριν ξανακατέβεις (ο τεκές την αναπληρώνει μόνος του).
            const maxHpTown = getPlayerMaxHp();
            if (player.hp < maxHpTown) {
                setStatus(`AutoPlay: ξεκουράζεται στον τεκέ (${Math.round(player.hp / maxHpTown * 100)}% HP)...`);
                return;
            }

            const selector = document.getElementById('area-selector');
            if (!selector || selector.options.length === 0) return;

            let targetLevel;
            if (AUTO_USE_TARGET_RATIO) {
                targetLevel = findDepthForTargetRatio(AUTO_TARGET_COMBAT_RATIO, selector.options.length);
                const achievedRatio = calculateDifficulty(player, estimateMonsterAt(targetLevel));
                setStatus(`AutoPlay: στοχεύει ratio ${AUTO_TARGET_COMBAT_RATIO} -> βάθος ${targetLevel} (εκτ. ratio ${achievedRatio.toFixed(2)})`);
            } else {
                // levels κάτω (ή πάνω, αν αρνητικό) από τον player, clamp σε [1, options.length]
                targetLevel = Math.max(1, player.level - AUTO_DEPTH_BELOW_PLAYER);
                targetLevel = Math.min(targetLevel, selector.options.length);
                setStatus(`AutoPlay: κατεβαίνει στο βάθος ${targetLevel}...`);
            }

            selector.value = String(targetLevel);
            currentSelectedLevel = parseFloat(selector.value);
            updateSelectorColor(selector);

            enterCombatFromSelector();
            return;
        }

        // Ενημέρωση: είμαστε σίγουρα σε μάχη
        autoLastCombatTime = Date.now();

        // ==========================================
        // ΦΑΣΙΚΟΣ ΧΡΟΝΙΣΜΟΣ ΕΝΤΟΛΩΝ (10% / 90% του τικ)
        // ==========================================
        const tickMs = effTick();
        const phase = ((Date.now() - autoCombatTickStart) % tickMs) / tickMs;

        // ---------- ΑΝΑΜΕΣΑ ΣΕ ΜΑΧΕΣ: έλεγχος υποχώρησης ----------
        if (waitingForNextMonster || !monster) {
            const maxHpMid = getPlayerMaxHp();
            const hpPctMid = player.hp / maxHpMid;

            if (hpPctMid <= AUTO_BEER_HP_PCT && !potionCooldownActive) {
                usePotion();
            } else if (hpPctMid <= AUTO_RETREAT_HP_PCT && potionCooldownActive) {
                const elapsedMid = Date.now() - potionCdStart;
                const chargePctMid = Math.min(1, elapsedMid / effCD());
                if (chargePctMid < AUTO_RETREAT_BEER_CHARGE_PCT) {
                    setStatus(`AutoPlay: HP χαμηλό ανάμεσα σε μάχες (${Math.round(hpPctMid * 100)}%) -> Retreat!`);
                    forceRetreat();
                    return;
                }
            }

            setStatus("AutoPlay: περιμένει το επόμενο τέρας...");
            return;
        }

        // Επαναφορά flags όταν ξεκινάει νέο τικ
        // Χρήση < 0.11 για να πιάνει και περιπτώσεις όπου η phase πηδάει από 0.975 σε 0.050
        if (phase < 0.11) {
            autoEarlyPhaseFired = false;
            autoLatePhaseFired = false;
        }

        // ---- ΠΡΩΙΜΗ ΦΑΣΗ (10%): Κατραπακιά, Μπύρα, Retreat ----
        if (!autoEarlyPhaseFired && phase >= 0.10) {
            autoEarlyPhaseFired = true;

            if (monster && !skillCooldownActive && monster.hp > monster.maxHp * 0.50) {
                queueSpecialAttack();
            }

            const maxHp = getPlayerMaxHp();
            const hpPct = player.hp / maxHp;

            if (hpPct <= AUTO_BEER_HP_PCT && !potionCooldownActive) {
                usePotion();
            } else if (hpPct <= AUTO_RETREAT_HP_PCT && potionCooldownActive) {
                const elapsed = Date.now() - potionCdStart;
                const chargePct = Math.min(1, elapsed / effCD());
                if (chargePct < AUTO_RETREAT_BEER_CHARGE_PCT) {
                    if (!isAttemptingRetreat) {
                        setStatus(`AutoPlay: HP χαμηλό (${Math.round(hpPct * 100)}%) & μπύρα όχι έτοιμη -> Retreat!`);
                        toggleRetreat();
                    }
                } else {
                    setStatus(`AutoPlay: HP χαμηλό αλλά η μπύρα είναι σχεδόν έτοιμη (${Math.round(chargePct * 100)}%), περιμένει...`);
                }
            } else if (autoRetreatAfterLevel && !isAttemptingRetreat) {
                setStatus(`AutoPlay: retreat λόγω level up (${player.level})...`);
                toggleRetreat();
            } else {
                setStatus(`AutoPlay: μάχεται στο βάθος ${currentSelectedLevel} — HP ${Math.round(hpPct * 100)}%`);
            }
        }

        // ---- ΟΨΙΜΗ ΦΑΣΗ (90%): Εκτέλεση ----
        if (!autoLatePhaseFired && phase >= 0.90) {
            autoLatePhaseFired = true;
            queuePreciseStrike();
        }

        // Αν περάσαμε το 95% χωρίς να συμβεί τίποτα, update status
        if (phase >= 0.95) {
            const maxHp = getPlayerMaxHp();
            const hpPct = player.hp / maxHp;
            setStatus(`AutoPlay: μάχεται στο βάθος ${currentSelectedLevel} — HP ${Math.round(hpPct * 100)}%`);
        }
    }

    function recalculateCooldowns(oldSpeed) {
        const now = Date.now();

        function recalc(active, start, timer, setActive, setStart) {
            if (!active) return timer;
            const oldEff = CD_DURATION / oldSpeed;
            const newEff = CD_DURATION / getSpeedFactor();
            const elapsed = now - start;
            const frac = Math.min(1, elapsed / oldEff);
            const remaining = Math.max(0, newEff * (1 - frac));
            clearTimeout(timer);
            setStart(now - (newEff * frac));
            return setTimeout(() => {
                setActive(false);
                updateUI();
            }, remaining);
        }

        potionCdTimer = recalc(potionCooldownActive, potionCdStart, potionCdTimer, function(v) { potionCooldownActive = v; }, function(v) { potionCdStart = v; });
        skillCdTimer = recalc(skillCooldownActive, skillCdStart, skillCdTimer, function(v) { skillCooldownActive = v; }, function(v) { skillCdStart = v; });
        preciseCdTimer = recalc(preciseCooldownActive, preciseCdStart, preciseCdTimer, function(v) { preciseCooldownActive = v; }, function(v) { preciseCdStart = v; });
    }

    function setAutoPlayEnabled(enabled) {
        autoPlayEnabled = enabled;

        if (toggleBtn) {
            toggleBtn.textContent = enabled ? '🤖 AutoPlay: ON' : '🤖 AutoPlay: OFF';
            toggleBtn.classList.toggle('on', enabled);
        }

        if (enabled) {
            autoLastMonsterRef = null;
            autoLastPlayerLevel = player.level;
            setStatus("AutoPlay ενεργό.");
            recalculateCooldowns(gameSpeedFactor);
        } else {
            setStatus("AutoPlay ανενεργό.");
            recalculateCooldowns(autoPlaySpeedFactor);
            rearmTimers();
            return;
        }

        rearmTimers();
    }

    if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
            setAutoPlayEnabled(!autoPlayEnabled);
        });
    }

    if (speedSelect) {
        speedSelect.addEventListener('change', function () {
            const oldSpeed = autoPlaySpeedFactor;
            autoPlaySpeedFactor = parseInt(speedSelect.value, 10) || 1;
            if (autoPlayEnabled) {
                recalculateCooldowns(oldSpeed);
                rearmTimers();
            }
        });
    }

    // AutoPlay ρυθμίσεις modal
    const settingsBtn = document.getElementById('autoplay-settings-btn');
    const settingsModal = document.getElementById('autoplay-settings-modal');

    function openSettingsModal() {
        if (!settingsModal) return;
        document.getElementById('settings-ratio').value = AUTO_TARGET_COMBAT_RATIO;
        document.getElementById('settings-ratio-val').textContent = AUTO_TARGET_COMBAT_RATIO;
        document.getElementById('settings-beer').value = AUTO_BEER_HP_PCT;
        document.getElementById('settings-beer-val').textContent = AUTO_BEER_HP_PCT;
        document.getElementById('settings-retreat').value = AUTO_RETREAT_HP_PCT;
        document.getElementById('settings-retreat-val').textContent = AUTO_RETREAT_HP_PCT;
        document.getElementById('settings-beer-charge').value = AUTO_RETREAT_BEER_CHARGE_PCT;
        document.getElementById('settings-beer-charge-val').textContent = AUTO_RETREAT_BEER_CHARGE_PCT;
        document.getElementById('settings-tick').value = AUTO_TICK_MS;
        document.getElementById('settings-tick-val').textContent = AUTO_TICK_MS;
        settingsModal.style.display = 'flex';
    }

    function closeSettingsModal() {
        if (!settingsModal) return;
        settingsModal.style.display = 'none';
    }

    // Live preview στα range sliders
    document.querySelectorAll('#autoplay-settings-modal input[type="range"]').forEach(function (input) {
        input.addEventListener('input', function () {
            const valSpan = this.parentElement.querySelector('span');
            if (valSpan) valSpan.textContent = parseFloat(this.value);
        });
    });

    if (settingsBtn) {
        settingsBtn.addEventListener('click', openSettingsModal);
    }

    document.getElementById('settings-ok').addEventListener('click', function () {
        AUTO_TARGET_COMBAT_RATIO = parseFloat(document.getElementById('settings-ratio').value);
        AUTO_BEER_HP_PCT = parseFloat(document.getElementById('settings-beer').value);
        AUTO_RETREAT_HP_PCT = parseFloat(document.getElementById('settings-retreat').value);
        AUTO_RETREAT_BEER_CHARGE_PCT = parseFloat(document.getElementById('settings-beer-charge').value);
        AUTO_TICK_MS = parseInt(document.getElementById('settings-tick').value, 10);
        closeSettingsModal();
    });

    document.getElementById('settings-cancel').addEventListener('click', closeSettingsModal);

    window.rearmTimers = rearmTimers;

})();
</script>

    let sbClient = null;
    try {
        sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        console.error('Supabase init failed (psofologio sync off):', e);

    // Anevazei OLES tis kataxwriseis tou topikou psofologiou sto online database.
    // An kapoia yparxei idi (idio name/level/depth/killer/weapon/armor/magic/date),
    // ginetai overwrite (upsert) anti gia diplotypo.
    window.syncIronmanRecordsToCloud = function (records) {
        if (!sbClient || !records || records.length === 0) return;

        const rows = records.map(r => ({
            name: r.name,
            level: r.level,
            depth: r.depth,
            killer: r.killer,
            weapon: r.weapon,
            armor: r.armor,
            magic: r.magic,
            death_date: new Date(r.date).toISOString(),
            victory: !!r.victory
        }));

        try {
            sbClient
                .from('ironman_deaths')
                .upsert(rows, { onConflict: 'name,level,depth,killer,weapon,armor,magic,death_date' })
                .then(({ error }) => {
                    if (error) {
                        console.error('Psofologio cloud sync error:', error);
                        logMessage("Απέτυχε η αποστολή στο online Ψοφολόγιο.", 'system');

    };
})();
