<html lang="el">
<head>

<link rel="manifest" href="manifest.json">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ρεμπεσκές v120</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-gold: #ffd700;
            --hp-player: #2ecc71;
            --hp-monster: #e74c3c;
            --border-color: #333333;
            --skill-blue: #3498db;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            transition: background-color 3s ease;
        }

        h2, h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .header-row h3 {
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .editable-name {
            border-bottom: 1px dashed var(--accent-gold);
            cursor: pointer;
            padding: 0 4px;
        }
        .editable-name:focus {
            outline: none;
            background-color: #2a2a2a;
            border-bottom: 1px solid var(--accent-gold);
        }

        .xp-wrapper-area {
            position: relative;
            margin: -2px 0 15px 0;
        }

        .rates-row{
            display:flex;
            justify-content:flex-end;
            gap:4px;
            margin-top:-10px;
            margin-bottom:12px;
        }

        .rates-row input{
            width:70px;
            font-size:11px;
        }

        .reset-rates-btn{
            padding:2px 6px;
        }

        .xp-bar-container {
            background-color: #333;
            width: 100%;
            height: 15px;      /* διπλάσιο ύψος */
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .xp-bar-text{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:10px;
            font-weight:bold;
            color:white;
            text-shadow:1px 1px 2px #000;
            pointer-events:none;
        }

        #p-xp-bar {
            height: 100%;
            width: 0%;
            background-color: #40a8ee;
            transition: width 0.28s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            margin-bottom: 5px;
            font-size: 0.95rem;
            align-items: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #171717;
            padding: 4px 8px;
            border: 1px solid #252525;
            border-radius: 3px;
            position: relative;
        }

        .inline-upgrade-btn {
            background-color: #2a2a2a;
            color: var(--accent-gold);
            border: 1px solid #444;
            padding: 8px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 2px;
            font-family: inherit;
            transition: all 0.2s;
            margin-left: 10px;
        }
        .inline-upgrade-btn:hover:not(:disabled) {
            background-color: #3a3a3a;
            border-color: var(--accent-gold);
        }
        .inline-upgrade-btn:disabled {
            color: var(--text-muted);
            border-color: #222;
            background-color: #1a1a1a;
            cursor: not-allowed;
            opacity: 0.4;
        }

        .gold { color: var(--accent-gold); font-weight: bold; }

        .cooldown-grid {
            display: grid;
            grid-template-columns: 100px 1fr 100px 1fr;
            gap: 10px;
            align-items: center;
        }

        .cd-action-cell {
            display: flex;
            align-items: center;
            gap: 8px; /* Κενό μεταξύ μπάρας, κουμπιού και κειμένου */
            width: 100%;
        }
        .cd-action-cell .cd-wrapper { flex: none; width: 60px }
        .cd-action-cell button { margin-left: 0; flex-shrink: 0; }

        .bar-container {
            background-color: #333;
            width: 100%;
            height: 20px;
            border-radius: 3px;
            overflow: visible;
            margin: 5px 0 15px 0;
            position: relative;
        }

        .bar {
            height: 100%;
            width: 100%;
            transition: width 0.28s ease;
            border-radius: 3px;
        }

        #player-hp-bar { background-color: var(--hp-player); }
        #monster-hp-bar { background-color: var(--hp-monster); }

        .bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            left: 0;
            font-size: 0.85rem;
            line-height: 20px;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        .cd-wrapper {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        .cd-inner {
            height: 100%;
            width: 100%;
            background-color: #6ec6ff;
            transition: width 0.1s linear;
        }

        .skill-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:8px;
            margin-top:10px;
            margin-bottom:15px;
        }

.skill-btn{
    position:relative;
    overflow:hidden;

    width:100%;
    height:44px;
    padding:0;

    border:1px solid #444;
    border-radius:4px;

    background:#1a1a1a;

    color:white;
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;

    cursor:pointer;

    --fill:100%;
    --ready-color:#2c3e50;
}

.skill-btn::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    width:var(--fill);
    height:100%;
    background:var(--ready-color);
    z-index:0;
}

.hunt-btn{
    --ready-color:#461a1a;      /* κόκκινο όταν λέει Σκότωσε */
}

.potion-btn{
    --ready-color:#0e703f;
}

.hunt-btn.retreat-ready{
    --ready-color:var(--accent-gold);
}

.hunt-btn.retreat-mode{
    --ready-color:#5d7d96;      /* γαλάζιο όταν λέει Τρέξε */
}

.hunt-btn::before{
    background:var(--ready-color);
}

.skill-btn span{
    position:relative;
    z-index:1;
}

.skill-btn:disabled{
    opacity:1;
}      
        .cd-inner.active {
            background-color: var(--hp-monster);
        }

        #log {
            height: 200px;
            border: 1px solid var(--border-color);
            background-color: #0a0a0a;
            padding: 10px;
            overflow-y: auto;
            font-size: 0.85rem;
            margin-bottom: 15px;
            border-radius: 3px;
        }

        .log-entry { margin-bottom: 4px; }
        .log-player { color: #5dade2; }
        .log-monster { color: #f1948a; }
        .log-system { color: #95a5a6; }
        .log-victory { color: var(--accent-gold); font-weight: bold; }
        .log-retreat { color: #e67e22; font-weight: bold; }

        .area-select-container {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
}

@keyframes skillCastFlash {

    0% {
        transform: scale(1);
        filter: brightness(1);
        box-shadow: none;
    }

    20% {
        transform: scale(1.08);
        filter: brightness(2.5);
        box-shadow:
            0 0 10px #fff,
            0 0 20px #fff,
            0 0 40px #fff;
    }

    100% {
        transform: scale(1);
        filter: brightness(1);
        box-shadow: none;
    }
}

.skill-cast-flash {
    animation: skillCastFlash 280ms ease-out;
}


#teke-title {
    line-height: 1.3;
    margin-top: 10px;
    margin-bottom: 10px;
}


/* Προσθήκη για τη μείωση του ύψους του ίδιου του drop-down κουτιού */
.area-select-container select {
    height: 28px;       /* <-- Μειώνει το συνολικό ύψος του κουτιού (π.χ. από το default ~38px στα 28px) */
    padding: 2px 6px;   /* <-- Μικραίνει το εσωτερικό κενό πάνω-κάτω για να μην κόβεται το κείμενο */
    font-size: 13px;    /* <-- Ελαφρώς πιο συμπαγής γραμματοσειρά για να ταιριάζει με το νέο ύψος */
    line-height: 1;
}

        select {
            background-color: #2a2a2a;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px;
            font-family: inherit;
            border-radius: 3px;
            cursor: pointer;
            max-width: 100%;
        }

        button {
            background-color: #2a2a2a;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: background 0.2s;
            border-radius: 3px;
        }

        button:hover:not(:disabled) {
            background-color: #3a3a3a;
            border-color: #555;
        }

        button:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-delete-save {
            border-color: #c0392b; 
            padding: 4px 8px; 
            font-size: 0.75rem;
            background-color: #1a1a1a;
            color: #e74c3c;
        }

        .btn-delete-save:hover {
            background-color: #c0392b !important;
            color: #fff;
        }

        .btn-showRules {
            border-color: #218518; 
            padding: 4px 8px; 
            font-size: 0.75rem;
            background-color: #1a1a1a;
            color: #218518;
        }

        .btn-showRules:hover {
            background-color: #336297 !important;
            color: #fff;
        }

        .btn-showStats {
            border-color: #2d66a7; 
            padding: 4px 8px; 
            font-size: 0.75rem;
            background-color: #1a1a1a;
            color: #2d66a7;
        }

        .btn-showStats:hover {
            background-color: #2d66a7 !important;
            color: #fff;
        }

        .btn-save {
            border-color: #8b5814; 
            padding: 4px 8px; 
            font-size: 0.75rem;
            background-color: #1a1a1a;
            color: #8b5814;
        }

        .btn-save:hover {
            background-color: #8b5814 !important;
            color: #fff;
        }

    .ironman-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .ironman-modal-box {
            background: var(--panel-bg);
            padding: 24px;
            border-radius: 8px;
            max-width: 380px;
            text-align: center;
        }

        .ironman-modal-box p {
            margin-bottom: 18px;
        }

        .ironman-modal-box button {
            margin: 0 6px;
        }


        .hidden { display: none; }
        .hotkey-hint { color: var(--text-muted); font-size: 0.8rem; text-align: right; white-space: nowrap; }

        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 1.15rem;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 1px 1px 3px #000, -1px -1px 3px #000;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            20% { transform: translateY(-12px) scale(1.2); }
            100% { opacity: 1; transform: translateY(-55px) scale(0.85); }
        }

@keyframes monsterDeathFlash {
    0% {
        filter: brightness(1);
        opacity: 1;
    }

    20% {
        filter: brightness(8);
        background: #ffbe0d;
        box-shadow:
            0 0 10px #ffbe0d,
            0 0 25px #ffbe0d,
            0 0 50px #ffbe0d;
    }

    100% {
        filter: brightness(1);
        opacity: 0;
    }
}

.monster-death {
    animation: monsterDeathFlash 0.5s ease-out forwards;
}

.equipment-row{
    display:grid;
    grid-template-columns: 100px 1fr 100px;
    align-items:center;
}

.equip-label{
    text-align:center;
  /*  border-right: 1px solid #555; */
}

.equip-name{
    text-align:center;
  /*     border-right: 1px solid #555; */
}

.equip-tier{
    text-align:center;
    font-weight:bold;
    color:var(--text-main);
}

.town-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 8px;
    margin-bottom: 15px;
}

@keyframes itemUpgradeFlash {
    0%   { background-color: #171717; }
    50%  {
        background-color: #3a2157;
        box-shadow: 0 0 15px #bb66ff;
    }
    100% { background-color: #171717; }
}

@keyframes xpLevelFlash {
    0%   { background-color: #ffffff; }
    50%  {
        background-color: #ffffff;
        box-shadow: 0 0 15px #ffffff;
    }
    100% { background-color: #ffffff; }
}

.xp-level-flash {
    animation: xpLevelFlash 0.7s ease-out 2;
}


.item-upgrade-flash {
    animation: monsterDeathFlash 0.5s ease-out 2;
}


.skill-queued {
  /* background-color: #e67e22 !important; */
    border-color: #ffb347 !important;
    color: white !important;
}

.label-atk {
    color: #ec6868; /* κόκκινο */
}

.label-def {
    color: #6b9fec; /* γαλάζιο */
}



.xp-value {
    color: #40a8ee; /* Το γαλάζιο χρώμα της επιλογής σας */
    font-weight: bold; /* Προαιρετικό, για να ξεχωρίζουν οι αριθμοί */
}

.label-gold {
    color: #f5d142; /* χρυσό */
}

/* Ομαλή μετάβαση για το φόντο */
body {
    transition: background-color 0.8s ease-in-out;
}


.skill-btn.skill-queued{
    border-color: var(--accent-gold);
    box-shadow:
        0 0 6px rgba(255,215,0,.8),
        0 0 12px rgba(255,215,0,.6),
        0 0 20px rgba(255,215,0,.4);
}

#battle-title {
    white-space: nowrap;
    overflow: hidden;
    font-size: 1.2rem;
}

@keyframes hpDamageFlash {
    0% {
        box-shadow: 0 0 0 rgba(231, 76, 60, 0);
    }
    25% {
        box-shadow: 0 0 8px 3px rgba(231, 76, 60, 0.75);
    }
    100% {
        box-shadow: 0 0 0 rgba(231, 76, 60, 0);
    }
}

.hp-damage-flash {
    animation: hpDamageFlash 280ms ease-out;
}

@keyframes hpHealFlash {
    0% {
        box-shadow: 0 0 0 rgba(46, 204, 113, 0);
    }
    25% {
        box-shadow: 0 0 8px 3px rgba(46, 204, 113, 0.75);
    }
    100% {
        box-shadow: 0 0 0 rgba(46, 204, 113, 0);
    }
}

.hp-heal-flash {
    animation: hpHealFlash 280ms ease-out;
}


    </style>

function flashHpBar(containerId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.classList.remove("hp-damage-flash", "hp-heal-flash");
    void el.offsetWidth;
    el.classList.add("hp-damage-flash");
}

function flashHpBarHeal(containerId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.classList.remove("hp-damage-flash", "hp-heal-flash");
    void el.offsetWidth;
    el.classList.add("hp-heal-flash");
}


function formatNumber(num) {
    if (num === undefined || num === null) return "0";
    return Number(num).toLocaleString('el-GR');
}

function showStats() {

    let efficiency = 0;

    if (player.totalGoldGained > 0) {
        efficiency = (
            player.gold / player.totalGoldGained * 100
        ).toFixed(1);
    }

    logMessage("==========");
    logMessage("ΣΤΑΤΙΣΤΙΚΑ");
    logMessage(`Φόνοι: ${formatNumber(player.kills)}`);
    logMessage(`Θάνατοι: ${player.ironman ? 'IRONMAN' : formatNumber(player.deaths)}`);
    logMessage(`Κατανάλωση μπύρας: ${player.beersDrunk.toLocaleString()} λίτρα`);
    logMessage("==========");
}

function showIronmanHighscores() {
    const scores = getIronmanHighscores();

    logMessage("==========");
    logMessage("ΨΟΦΟΛΟΓΙΟN", "system");

    if (scores.length === 0) {
        logMessage("Δεν υπάρχουν ακόμα νεκροί Ironmen.");
    } else {
        scores.forEach(s => {
            logMessage(`${s.name}, επίπεδο ${s.level}, σκοτώθηκε στο βάθος ${s.depth} από ${s.killer}.`);
        });
    }

    logMessage("==========");
}


function flashSkillButton(buttonId) {

    const btn = document.getElementById(buttonId);

    if (!btn) return;

    // αφαιρούμε τυχόν προηγούμενο animation
    btn.classList.remove("skill-cast-flash");

    // αναγκάζει τον browser να ξανατρέξει το animation
    void btn.offsetWidth;

    // ενεργοποίηση flash
    btn.classList.add("skill-cast-flash");
}


function getMonsterDisplayName(monster) {
    if (!monster) return "";

    if (monster.variant === 'normal')
        return monster.name;

    return `${monster.firstName} ${monster.title}`;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let soundEnabled = true;

//  const now = audioCtx.currentTime;

function monsterDeathSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Ανεβάσαμε λίγο τις συχνότητες (από 400/200 σε 480/280) για να ακούγεται το μπάσο στο Android
    [480, 280].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine"; 
        const startTime = now + i * 0.06; 
        const duration = 0.14; 

        osc.frequency.setValueAtTime(freq, startTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.4, startTime + duration);

        gain.gain.setValueAtTime(0, startTime);
        // Ελαφρώς χαμηλότερο peak gain (0.2 αντί για 0.3) για να μην μπουκώνει
        gain.gain.linearRampToValueAtTime(0.2, startTime + 0.005); 
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
    });
}

function playerDeathSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Ανέβηκαν οι συχνότητες (από 180, 120, 70 σε 320, 240, 160) για να μην τις «καταπίνει» το κινητό
    // Χαμηλώσαμε το gain από 0.5 σε 0.22 επειδή οι νέες συχνότητες ακούγονται πιο δυνατά
    const freqs = [320, 240, 160];

    freqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        const t = now + i * 0.08;

        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.6, t + 0.18);

        gain.gain.setValueAtTime(0.22, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.20);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.20);
    });
}

function hitSound() {
    if (!soundEnabled) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "triangle";
    const now = audioCtx.currentTime;

    // Από 180->90 το πήγαμε 360->140. Το pop-corn "κλικ" παραμένει, αλλά ακούγεται πεντακάθαρα στο Android
    // Ρυθμίσαμε το gain στο 0.28 για να είναι ισορροπημένο
    osc.frequency.setValueAtTime(360, now);
    osc.frequency.exponentialRampToValueAtTime(140, now + 0.04);

    gain.gain.setValueAtTime(0.28, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.05);
}

function specialHitSound() {
    if (!soundEnabled) return;
 
    const now = audioCtx.currentTime;

    // Κύριο χτύπημα (Ανέβηκαν οι συχνότητες και μαζεύτηκε το gain στο 0.3)
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();

    osc1.type = "triangle";
    osc1.frequency.setValueAtTime(380, now);
    osc1.frequency.exponentialRampToValueAtTime(150, now + 0.08);

    gain1.gain.setValueAtTime(0.3, now);
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);

    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);

    osc1.start(now);
    osc1.stop(now + 0.10);

    // Echo (Ανέβηκαν οι συχνότητες και μαζεύτηκε το gain στο 0.15)
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    osc2.type = "triangle";
    osc2.frequency.setValueAtTime(280, now + 0.035);
    osc2.frequency.exponentialRampToValueAtTime(120, now + 0.10);

    gain2.gain.setValueAtTime(0.15, now + 0.035);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start(now + 0.035);
    osc2.stop(now + 0.13);
}

function potionSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Οι συχνότητες εδώ ήταν σχετικά καλές, απλά μαζέψαμε το αρχικό gain (0.25 και 0.12) για να μην κάνει clip
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();

    osc1.type = "sine";
    osc1.frequency.setValueAtTime(160, now);
    osc1.frequency.exponentialRampToValueAtTime(260, now + 0.08);

    gain1.gain.setValueAtTime(0.25, now);
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);

    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);

    osc1.start(now);
    osc1.stop(now + 0.10);

    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    osc2.type = "sine";
    osc2.frequency.setValueAtTime(200, now + 0.05);
    osc2.frequency.exponentialRampToValueAtTime(340, now + 0.15);

    gain2.gain.setValueAtTime(0.12, now + 0.05);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start(now + 0.05);
    osc2.stop(now + 0.16);
}

function levelUpSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    const notes = [261.63, 329.63, 392.00];

    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        const t = now + i * 0.08;

        osc.frequency.setValueAtTime(freq, t);

        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.15);
    });
}

function itemDropSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Πολύ ψηλές συχνότητες (1400, 2100). Κρατάμε το fast-blip, αλλά ρίχνουμε το gain στο 0.08 
    // για να ακούγεται σαν διακριτικό text/drop εφέ χωρίς να ενοχλεί
    const notes = [1400, 2100];

    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        const t = now + i * 0.03;

        osc.frequency.setValueAtTime(freq, t);

        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.10);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.10);
    });
}

function buyItemSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Ο μεγάλος ένοχος! Το 0.5 gain στα 900Hz-1400Hz έσπαγε τα ηχεία. 
    // Κατεβάσαμε το gain στο 0.12 για τον osc1 και 0.04 για το λαμπύρισμα (osc2). 
    // Ο ήχος παραμένει ακριβώς ο ίδιος σε δομή, αλλά έρχεται σε τέλεια ισορροπία.
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();

    osc1.type = "triangle";
    osc1.frequency.setValueAtTime(900, now);
    osc1.frequency.exponentialRampToValueAtTime(1400, now + 0.05);

    gain1.gain.setValueAtTime(0.12, now); // Από 0.5
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.07);

    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);

    osc1.start(now);
    osc1.stop(now + 0.07);

    // μικρό λαμπύρισμα
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    osc2.type = "sine";
    osc2.frequency.setValueAtTime(1800, now + 0.02);

    gain2.gain.setValueAtTime(0.04, now + 0.02); // Από 0.15
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start(now + 0.02);
    osc2.stop(now + 0.08);
}

function playerHitSound() {
    if (!soundEnabled) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine"; 
    const now = audioCtx.currentTime;

    // Πιο χαμηλή και υπόκωφη συχνότητα για να μην μπερδεύεται με το Hit του παίκτη
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(170, now + 0.04);

    // Ελάχιστο gain για να μην μπουκώνει το ηχείο του Android στην ταυτόχρονη μάχη
    gain.gain.setValueAtTime(0.16, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.04);
}

function retreatSound() {
    if (!soundEnabled) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    // Το 'sine' κύμα είναι το πιο απαλό και καθαρό, ιδανικό για "καλμ" ήχους
    osc.type = "sine";

    // Ξεκινάμε από μια πιο υψηλή συχνότητα και πέφτουμε αργά,

    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(100, now + 0.6);

    // Το gain πέφτει πολύ ομαλά για να μην ακουστεί "κλικ" ή "ποπ"
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.6);

function getMonsterName(lvl) {
    // 1. Το κανονικό index του τέρατος με βάση το επίπεδό του
    let baseIndex = Math.floor(lvl) - 1;

    // 2. Υπολογισμός τυχαίας μετατόπισης από -2 έως +2
    const offset = Math.floor(Math.random() * 5) - 2; // Παράγει: -2, -1, 0, 1, 2

    // 3. Εφαρμογή της μετατόπισης
    let nameIndex = baseIndex + offset;

    // 4. Δικλείδα ασφαλείας για να μην βγούμε ποτέ εκτός των ορίων του πίνακα (0 έως 99)
    nameIndex = Math.max(0, Math.min(nameIndex, monsterNames.length - 1));

    // 5. Επιστροφή του τυχαίου ονόματος
    return monsterNames[nameIndex];
}

//Equipment level roll
function rollItemTier(monsterLevel) {
    // Παραγωγή ενός τυχαίου ακέραιου αριθμού από το 1 έως το 100
    let roll = Math.floor(Math.random() * 100) + 1;
    let modifier = 0;
    // Έλεγχος των ορίων βάσει των ποσοστών:
    if (roll <= 1) {
        modifier = -5;  // 1% (1)
    } else if (roll <= 4) {
        modifier = -4;  // 3% (2 έως 4)
    } else if (roll <= 12) {
        modifier = -3;  // 8% (5 έως 12)
    } else if (roll <= 24) {
        modifier = -2;  // 12% (13 έως 24)
    } else if (roll <= 40) {
        modifier = -1;  // 16% (25 έως 40)
    } else if (roll <= 58) {
        modifier = 0;   // 18% (41 έως 58)
    } else if (roll <= 74) {
        modifier = +1;  // 16% (59 έως 74)
    } else if (roll <= 87) {
        modifier = +2;  // 13% (75 έως 87)
    } else if (roll <= 95) {
        modifier = +3;  // 8% (88 έως 95)
    } else if (roll <= 98) {
        modifier = +4;  // 3% (96 έως 98)
    } else {
        modifier = +5;  // 1% (99 έως 100)
    }
    let tier = monsterLevel + modifier;
    tier = Math.max(1, Math.min(100, tier));
    return tier;
}

function createSeededRandom(seed) {
    return function () {
        seed |= 0;
        seed = (seed + 0x6D2B79F5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

function getDailySeed() {
    const d = new Date();

    return (
        d.getFullYear() * 10000 +
        (d.getMonth() + 1) * 100 +
        d.getDate()
    );
}

let areaModifiers = {};

function rollAreaType(depth) {

    const seed = getDailySeed() * 1000 + depth;
    const rng = createSeededRandom(seed);

    const roll = rng() * 100;

    if (roll < 70) return AREA_TYPES.NORMAL;
    if (roll < 76) return AREA_TYPES.RICH;
    if (roll < 82) return AREA_TYPES.POOR;
    if (roll < 88) return AREA_TYPES.WEAPON;
    if (roll < 94) return AREA_TYPES.ARMOR;
    return AREA_TYPES.MAGIC;
}

function updateAreaSelector() {
    const selector = document.getElementById('area-selector');
    if (!selector) return;

    if (selector.options.length === 100) return;

    const currentSelected = selector.value;
    selector.innerHTML = '';

    for (let i = 1; i <= 100; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        let areaType = getAreaType(i);
        let icon = AREA_TYPE_ICON[areaType];
        
        // Αντικατάσταση της ονοματοδοσίας των τεράτων με την απλή ένδειξη βάθους
        opt.innerText = `${icon ? icon + ' ' : ''}${depthNames[i - 1]}`;
        
        // Δίνουμε ΠΑΝΤΑ χρώμα στο option, ακόμα και αν είναι NORMAL
        opt.style.color = AREA_TYPE_COLOR[areaType];
        
      //  if (areaType === AREA_TYPES.RICH) opt.style.fontWeight = 'bold';
      //  if (areaType === AREA_TYPES.POOR) opt.style.fontStyle = 'italic';
        selector.appendChild(opt);
    }

    if (currentSelected) {
        selector.value = currentSelected;
    } else {
        selector.value = "1";
    }

    // Αλλαγή του χρώματος στο κείμενο του select κατά την αρχική φόρτωση
    updateSelectorColor(selector);

        updateUI();

}

function logMessage(text, type = 'system') {
    const logDiv = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = `log-entry log-${type}`;

    if (text === "") {
        entry.innerHTML = "&nbsp;";
    } else {
        entry.innerText = text;
    }

    logDiv.append(entry);

    while (logDiv.children.length > 1000) {
        logDiv.removeChild(logDiv.firstChild);
    }

    logDiv.scrollTop = logDiv.scrollHeight;
}

function startTownRegen() {
    if (townRegenInterval) clearInterval(townRegenInterval);
    townRegenInterval = setInterval(() => {
        const maxHp = getPlayerMaxHp();
        if (!inCombat && player.hp < maxHp && !(player.ironman && player.ironmanDead)) {
            let regenAmount = Math.round(maxHp * 0.1);
            // αν είμαστε κοντά στο full hp
            regenAmount = Math.min(
                regenAmount,
                maxHp - player.hp
            );
            player.hp += regenAmount;
            createFloatingText(
                'player-hp-parent',
                `+${formatNumber(regenAmount)}`,
                "var(--hp-player)"
                 );
                 flashHpBarHeal('player-hp-parent');
            updateUI();
        }
    }, 2000);
}

 // Monster attack and defense formulas, also HP. to +/- tou level einai to penalty gia na isoropisei sto level
    function spawnMonster() {
    let lvl = currentSelectedLevel;
    let baseAtk = lvl * 0.75 + (lvl - 1) + (lvl/2 - 0.5);
    let baseDef = lvl *0.75 + (lvl - 1) + (lvl/2 - 0.5);
    let baseHp = lvl * 100;

    let variant = 'normal';
    let firstName = '';
    let title = '';

    let areaType = getAreaType(lvl);

    // RICH/POOR αλλάζουν το βασικό chance εμφάνισης special τέρατος
    let specialChance = 0.17;
    if (areaType === AREA_TYPES.RICH) specialChance = specialChance * 1.25;
    else if (areaType === AREA_TYPES.POOR) specialChance = specialChance * 0.65;

    if (Math.random() < specialChance) {
        firstName = randomFrom(monsterFirstNames);

        // WEAPON/ARMOR/MAGIC areas: extra 33% check να είναι ο "δικός" τους τύπος,
        // αλλιώς γίνεται το κανονικό τυχαίο 33/33/33
        let favored = null;
        if (areaType === AREA_TYPES.WEAPON) favored = 'weapon';
        else if (areaType === AREA_TYPES.ARMOR) favored = 'armor';
        else if (areaType === AREA_TYPES.MAGIC) favored = 'magic';

        let chosenVariant;
        if (favored && Math.random() < 0.333) {
            chosenVariant = favored;
        } else {
            let roll = Math.random();
            chosenVariant = roll < 0.333 ? 'weapon' : (roll < 0.666 ? 'armor' : 'magic');
        }

        if (chosenVariant === 'weapon') {
            variant = 'weapon';
            baseAtk += 17;
            baseHp = lvl * 100;
            title = randomFrom(wildTitles);
        }
        else if (chosenVariant === 'armor') {
            variant = 'armor';
            baseDef += 14;
            baseHp = lvl * 100;
            title = randomFrom(armoredTitles);
        }
        else {
            variant = 'magic';
            baseAtk += 6;
            baseDef += 6;
            baseHp = lvl * 100;
            title = randomFrom(magicTitles);
        }
    }

    monster = {
        name: getMonsterName(lvl),
        level: lvl,
        atk: baseAtk,
        def: baseDef,
        hp: baseHp,
        maxHp: baseHp,
        variant: variant,
        firstName: firstName,
        title: title
    };


        let prefix = "";
        if (variant === 'weapon') prefix = "<Άγριο> ";
        if (variant === 'armor') prefix = "<Θωρακισμένο> ";
        if (variant === 'magic') prefix = "<Μαγικό> ";

    let monsterFullName = (variant === 'normal') ? monster.name : `${monster.firstName} ${monster.title}`;
    logMessage(`Εμφανίζεται: ${getMonsterDisplayName(monster)}!`, "system");
    }

//attack/defense damage modifier

//complex εκθετικος modifier
    function calcDmgModifier(diff) {
    return diff >= 0
        ? 2 - Math.exp(-0.04 * diff)
        : 0.5 + 0.5 * Math.exp(0.08 * diff);
    }

//simple modifier flat % steps
//   function calcDmgModifier(diff) {
 //   return Math.min(2, Math.max(0.4, 1 + diff * 0.03));
//      }



    function rollBaseDamage(fixedDice = null) {
        let d6;
        if (fixedDice !== null) {
            d6 = fixedDice;
        } else {
            d6 = Math.floor(Math.random() * 6) + 1;
        }
        let diff = getPlayerAtk() - monster.def;
        let dmgModifier = calcDmgModifier(diff);
        let dmg = d6 * 5 * player.level * dmgModifier;
        return Math.max(1, Math.round(dmg));
    }

       function performPlayerAttack(skill = null) {

            let hitChance = skill?.hitChance ?? 80;
            hitChance = Math.max(10, Math.min(100, hitChance));

            if (Math.floor(Math.random() * 100) >= hitChance) {

                return {
                    damage: 0,
                    log: skill
                        ? `[SKILL] ${skill.name}: Αστόχησε.`
                        : "Αστόχησες."
                };
            }

            // βασικό damage
            let damage = rollBaseDamage(skill?.fixedDice);

            // skill modifier
            
if (skill) {
               
    damage = Math.round(damage * skill.multiplier);

    if (skill === skills.heavyStrike)
        flashSkillButton("btn-skill");

    if (skill === skills.preciseStrike)
        flashSkillButton("btn-precise");

    if (skill.sound)
        skill.sound();

    return {
        damage,
        log: `[SKILL] ${skill.name}! Προκάλεσες ${formatNumber(damage)} ζημιά.`
    };
}

            return {
                damage,
                log: `Χτύπησες: ${formatNumber(damage)} ζημιά σε ${getMonsterDisplayName(monster)}.`
            };
        }


    function queueSpecialAttack() {
        if (!inCombat || !monster || skillCooldownActive || isSkillQueued) return;
        isSkillQueued = true;
        queuedSkill = skills.heavyStrike;
        logMessage("[QUEUE] Η Κατραπακιά προετοιμάστηκε για τον επόμενο γύρο.", 'system');
        updateUI();
    }

    function queuePreciseStrike() {
    if (!inCombat || !monster || preciseCooldownActive) return;
    if (monster.hp > monster.maxHp * skills.preciseStrike.executeThreshold) return;

    let result = performPlayerAttack(skills.preciseStrike);

    preciseCooldownActive = true;
    preciseCdStart = Date.now();
    preciseCdTimer = setTimeout(() => {
        preciseCooldownActive = false;
        updateUI();
    }, CD_DURATION);

    resolvePlayerAttack(result);
}

function resolvePlayerAttack(result) {
    if (result.log) logMessage(result.log, 'player');
    if (result.damage > 0) {
        monster.hp = Math.max(0, monster.hp - result.damage);
        if (monster.hp > 0) hitSound();
        createFloatingText('monster-hp-parent', `-${formatNumber(result.damage)}`, "var(--hp-monster)");
        flashHpBar('monster-hp-parent');  
    }
    else {
    createFloatingText('monster-hp-parent', 'ΑΠΕΦΥΓΕ', '#ffffff');
        }
        
    updateUI();

    if (monster.hp <= 0) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => {
            document.getElementById('monster-hp-parent').classList.remove('monster-death');
        }, 500);
        endCombat('victory');
        return true;
    }
    return false;
}

generateAreaModifiers();
refreshAreaSelectorAppearance();

function forceRetreat() {
    // 1. ΣΤΑΜΑΤΗΜΑ του interval της μάχης
    if (typeof combatInterval !== 'undefined') {
        clearInterval(combatInterval);
        combatInterval = null;
    }

    // 2. Επαναφορά του interface
    document.getElementById('monster-hp-bar').classList.remove('monster-death');
    startTownRegen();
    document.getElementById('town-interface').classList.remove('hidden');
    document.getElementById('combat-interface').classList.add('hidden');

    // 3. Επαναφορά μεταβλητών κατάστασης
    inCombat = false;
    isAttemptingRetreat = false;
    isSkillQueued = false;
    queuedSkill = null;
    player.hp = Math.round(getPlayerMaxHp() * 0.10);
    logMessage(`Επέστρεψες κουρασμένος στον Τεκέ του Ζαλαδούρα. Ξεπαστρέψες ${currentRunKills} εχθρούς σε αυτή την κατάβαση. Ρίχνεις έναν υπνάκο.`, 'retreat');
    currentRunKills = 0; // Μηδενισμός μετά την αναφορά
    cashInGoldForXp();
    logMessage("Η κομπανία παίζει το «" + randomTekeSong() + "».");
    createFloatingText('player-hp-parent', "ΥΠΟΧΩΡΗΣΗ", "#00d2ff");
    retreatSound();
    
    updateUI();
    saveGame();
}

function executeCombatRound() {
   
    if (!inCombat) return;
    if (waitingForNextMonster) return;

    if (!monster || monster.hp <= 0) {
        spawnMonster();
        updateUI();
    }

// Προσθήκη για την πιθανότητα υποχώρησης
if (isAttemptingRetreat) {
    if (Math.random() < 0.15) {
       // logMessage("Ξέφυγες! Γυρίζεις εξουθενωμένος στον Τεκέ.", 'retreat');
        // Προσομοίωση νίκης για να γίνει η διαφυγή με ασφάλεια
      forceRetreat();
      //DOCTOR
      
        return;
    } else {
        logMessage("Υποχώρηση...", 'retreat');
    }
}

    // ==========================================
    // ΦΑΣΗ 1: ΥΠΟΛΟΓΙΣΜΟΣ ΕΠΙΘΕΣΕΩΝ (ταυτόχρονα)
    // ==========================================

    // Κρατάμε σε μια μεταβλητή αν χρησιμοποιήθηκε το Άμεσο Πλήγμα σε αυτόν τον γύρο
    let usedPreciseStrikeThisRound = false;

    // --- Επίθεση Παίκτη ---
    let result;

    if (isSkillQueued) {
        isSkillQueued = false;
        result = performPlayerAttack(queuedSkill);
        if (queuedSkill === skills.heavyStrike) {
            skillCooldownActive = true;
            skillCdStart = Date.now();
            skillCdTimer = setTimeout(() => {
                skillCooldownActive = false;
                updateUI();
            }, CD_DURATION);
        }
        if (queuedSkill === skills.preciseStrike) {
            usedPreciseStrikeThisRound = true; // Ενεργοποιείται η ιδιότητα του skill
            preciseCooldownActive = true;
            preciseCdStart = Date.now();
            preciseCdTimer = setTimeout(() => {
                preciseCooldownActive = false;
                updateUI();
            }, CD_DURATION);
        }
        queuedSkill = null;
    } else {
        result = performPlayerAttack();
    }

    // --- Επίθεση Τέρατος ---
    let monsterDamageCalculated = 0;
    let monsterActionLog = "";
    let monsterHitChance = 80;
    monsterHitChance = Math.max(10, Math.min(100, monsterHitChance));

    if (Math.floor(Math.random() * 100) >= monsterHitChance) {
        monsterActionLog = `${getMonsterDisplayName(monster)}: αστόχησε.`;
        monsterDamageCalculated = 0;
    } else {
        let d6 = Math.floor(Math.random() * 6) + 1;
        let diff = monster.atk - getPlayerDef();
        let dmgModifier = calcDmgModifier(diff);
        let dmg = d6 * 5 * monster.level * dmgModifier;
        monsterDamageCalculated = Math.max(1, Math.round(dmg));
        monsterActionLog = `${getMonsterDisplayName(monster)}: σου έκανε ${formatNumber(monsterDamageCalculated)} ζημιά.`;
    }

    // ==========================================
    // ΦΑΣΗ 2: ΕΦΑΡΜΟΓΗ ΖΗΜΙΩΝ
    // ==========================================

    // Εφαρμογή ζημιάς του Παίκτη
    if (result.log) logMessage(result.log, 'player');
    if (result.damage > 0) {
        monster.hp = Math.max(0, monster.hp - result.damage);
        if (monster.hp > 0) hitSound();
        createFloatingText('monster-hp-parent', `-${formatNumber(result.damage)}`, "var(--hp-monster)");
        flashHpBar('monster-hp-parent');
    } else {
        createFloatingText('monster-hp-parent', 'ΑΠΕΦΥΓΕ', '#ffffff');
    }

    // ΣΥΓΚΕΚΡΙΜΕΝΟΣ ΕΛΕΓΧΟΣ: Αν χρησιμοποιήθηκε το Άμεσο Πλήγμα και το τέρας πέθανε,
    // η μάχη τελειώνει ΕΔΩ, κόβοντας την επίθεση του τέρατος.
    if (usedPreciseStrikeThisRound && monster.hp <= 0) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-parent').classList.remove('monster-death'), 500);
        updateUI();
        endCombat('victory');
        return;
    }

    // Εφαρμογή ζημιάς του Τέρατος (εκτελείται κανονικά αν δεν ίσχυε το παραπάνω)
    if (monsterActionLog) logMessage(monsterActionLog, 'monster');
    if (monsterDamageCalculated > 0) {
        player.hp = Math.max(0, player.hp - monsterDamageCalculated);
        createFloatingText('player-hp-parent', `-${formatNumber(monsterDamageCalculated)}`, "var(--hp-monster)");
        playerHitSound();
        flashHpBar('player-hp-parent');  
    } else {
        createFloatingText('player-hp-parent', 'ΑΠΕΦΥΓΕΣ', "var(--hp-player)");
    }

    updateUI();

    // ==========================================
    // ΦΑΣΗ 3: ΕΛΕΓΧΟΣ ΑΠΟΤΕΛΕΣΜΑΤΟΣ (Κλασικός ταυτόχρονος έλεγχος)
    // ==========================================
    let playerDied = player.hp <= 0;
    let monsterDied = monster.hp <= 0;

    if (monsterDied && playerDied) {
        document.getElementById('monster-hp-bar').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-bar').classList.remove('monster-death'), 500);
        playerDeathSound();
        endCombat('mutual_death');
        return;
    }

    if (monsterDied) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-parent').classList.remove('monster-death'), 500);
        endCombat('victory');
        return;
    }

    if (playerDied) {
        endCombat('defeat');
        playerDeathSound();
        return;
    }
}

function handleEquipmentDrop(type, rolledTier, forceSell = false) {
    let itemName = getItemName(type, rolledTier);
    logMessage(`[DROP] Στον εχθρό βρέθηκε: ${itemName} (T${rolledTier})!`, 'victory');

    if (!forceSell && rolledTier > player[type].power) {
        let oldTier = player[type].power;
        player[type] = { name: itemName, power: rolledTier };
        itemDropSound();
        logMessage(
         `[EQUIP] Αναβάθμιση εξοπλισμού! (T${oldTier} → T${rolledTier})`,
         'victory'
                 );

        let targetBox =
            type === 'weapon' ? 'stat-atk-box' :
            type === 'armor' ? 'stat-def-box' :
            'stat-magic-box';

        const box = document.getElementById(targetBox);
            box.classList.add('item-upgrade-flash');
            setTimeout(() => {
            box.classList.remove('item-upgrade-flash');
            }, 400);

        if (type !== 'magic') {
            createFloatingText(targetBox, "NEW EQUIP!", "var(--accent-gold)");
        } else {
            createFloatingText('player-hp-parent', "MAX HP UP!", "var(--hp-player)");
        }

    } else {

        // timh magikwn antikeimenon
    let sellValue = rollGoldForLevel(rolledTier) * 1;

    player.gold += sellValue;
    player.totalGoldGained += sellValue;

    if (forceSell) {
        logMessage(
            `[DROP] Το αντικείμενο ήταν πολύ δυνατό για το επίπεδό σου και θα πουληθεί για ${formatNumber(sellValue)} χρυσά.`,
            'victory'
        );
    } else {
        logMessage(
            `[DROP] Θα πουληθεί για ${formatNumber(sellValue)} χρυσά.`,
            'victory'
        );
    }

    setTimeout(() => {
        createFloatingText(
            'stat-gold-box',
            `+${formatNumber(sellValue)}g`,
            "var(--accent-gold)"
        );
}, 500);

}
}

   function endCombat(outcome) {
        if (outcome !== 'victory') {
            isAttemptingRetreat = false;
        }
        isSkillQueued = false;

        if (outcome === 'victory' || outcome === 'mutual_death') {
            document.getElementById('monster-hp-bar').classList.add('monster-death');
            setTimeout(() => document.getElementById('monster-hp-bar').classList.remove('monster-death'), 500);
            
            logMessage(`${getMonsterDisplayName(monster)}: εξοντώθηκε.`, 'victory');
            monsterDeathSound();
            player.kills++;
            currentRunKills++;
            
          
            // Υπολογισμός χρυσού με bonus για τα μη-normal τέρατα
            let gainedGold = rollGoldForLevel(monster.level);

            if (monster.variant !== 'normal') {
                gainedGold *= 1;
            }

            player.gold += gainedGold;
            sessionGold += gainedGold;
            player.totalGoldGained += gainedGold;
   
            logMessage(`+${formatNumber(gainedGold)} GP`, 'victory');
            createFloatingText('stat-gold-box', `+${formatNumber(gainedGold)}g`, "var(--accent-gold)");

            let gainedXp = getMonsterXpReward(monster.level) *
               (monster.variant !== 'normal' ? 2 : 1);
            player.xp += gainedXp;
            sessionXp += gainedXp;
            logMessage(`+${formatNumber(gainedXp)} XP`, 'victory');
            createFloatingText('xp-parent', `+${formatNumber(gainedXp)} XP`, "var(--accent-gold)");

            
            // weaponchances
            let weaponChance  = (monster.variant === 'weapon') ? 1.00 : 0.000;
            let armorChance  = (monster.variant === 'armor') ? 1.00 : 0.000;
            let magicChance  = (monster.variant === 'magic') ? 1.00 : 0.000;

            
            let rolledPower = monster.level;
            let droppedSomething = false;

            if (monster.level === 0.5) {
    // κανένα drop
}
else {
let rolledPower = rollItemTier(monster.level);

// Cap: ο παίκτης δεν μπορεί να εξοπλίσει item πάνω από level+5 του ίδιου.
// Αν το roll ξεπερνάει το cap, δεν υποβαθμίζεται - πουλιέται κατευθείαν
// στην κανονική τιμή πώλησης του rolled tier (χωρίς να ελεγχθεί αν κάνει upgrade).
// SWITCH - afinoume anoixto to eq upgrade pros to paron.
let levelCap = player.level + 100;
let forceSell = rolledPower > levelCap;

if (Math.random() < weaponChance) handleEquipmentDrop('weapon', rolledPower, forceSell);
if (Math.random() < armorChance) handleEquipmentDrop('armor', rolledPower, forceSell);
if (Math.random() < magicChance) handleEquipmentDrop('magic', rolledPower, forceSell);
}
            if (droppedSomething) { triggerSmoothTransition('#3e3200'); }

            checkLevelUp();

            saveGame();
            if (outcome === 'victory') {
                if (isAttemptingRetreat) {

    document.getElementById('monster-hp-bar').classList.add('monster-death');

        if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
        inCombat = false;
        monster = null;
        isAttemptingRetreat = false;


    setTimeout(() => {

        document.getElementById('monster-hp-bar').classList.remove('monster-death');

        generateAreaModifiers();
        refreshAreaSelectorAppearance();    

        startTownRegen();
        document.getElementById('town-interface').classList.remove('hidden');
        document.getElementById('combat-interface').classList.add('hidden');
        
        logMessage(`Επέστρεψες κουρασμένος στον Τεκέ του Ζαλαδούρα. Ξεπαστρέψες ${currentRunKills} εχθρούς σε αυτή την έξοδο. Ρίχνεις έναν υπνάκο...`, 'retreat');
        currentRunKills = 0; // Μηδενισμός μετά την αναφορά
        cashInGoldForXp();
        logMessage("Η κομπανία παίζει το «" + randomTekeSong() + "».");
        player.hp = Math.round(getPlayerMaxHp() * 0.10);
        // --- ΠΡΟΣΘΗΚΗ FLOATING TEXT ΚΑΤΑ ΤΗΝ ΥΠΟΧΩΡΗΣΗ ---
        createFloatingText('player-hp-parent', "ΥΠΟΧΩΡΗΣΗ", "#00d2ff");
        retreatSound();
        
        
        updateUI();

    }, 500);

    return;
}
 else {
    waitingForNextMonster = true;
    monster = null;
    
    logMessage("Ψάχνεις για νέο εχθρό...", "system");
    updateUI();

setTimeout(() => {
    waitingForNextMonster = false;

    if (inCombat) {
        spawnMonster();
      //  logMessage(`Εμφανίζεται: ${getMonsterDisplayName(monster)}!`, "system");
        updateUI();

        // RESET: το ρολόι της μάχης ξεκινά ξανά από το spawn,
        // ώστε το τέρας να έχει πάντα 2 πλήρη δευτ. πριν τον πρώτο γύρο
        if (combatInterval) clearInterval(combatInterval);
        combatInterval = setInterval(executeCombatRound, 2000);
        }
    }, 2000);
}
            }
            updateUI();

            if (outcome === 'mutual_death') {
                if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
                inCombat = false;
                applyDefeatPenalties();
                
            }
        } else {
            if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
            inCombat = false;

            if (outcome === 'defeat') {
                applyDefeatPenalties();
            } else if (outcome === 'retreat') {
                
                generateAreaModifiers();
                refreshAreaSelectorAppearance();

                startTownRegen();
                saveGame();
                document.getElementById('town-interface').classList.remove('hidden');
                document.getElementById('combat-interface').classList.add('hidden');
                updateUI();
            }
        }
    }

function applyDefeatPenalties() {
    generateAreaModifiers();
    refreshAreaSelectorAppearance();
    player.gold = 0;
    player.hp = 1;

    // xasimo eksoplismou
    const slots = ['weapon', 'armor', 'magic'];
    const lostSlot = slots[Math.floor(Math.random() * slots.length)];

    const slotNames = {
        weapon: "Το όπλο",
        armor: "Η πανοπλία",
        magic: "Το φυλαχτό"
    };

        logMessage(
        `Σκοτώθηκες! Έχασες το χρυσάφι σου και μεταφερθήκες στον τεκέ με 1 HP.`,
        'monster');
        
    currentRunKills = 0;
    player.deaths++;

    if (player.ironman) {
        player.ironmanDead = true;
        const killerName = getMonsterDisplayName(monster);
        const deathDepth = monster.level;
        logMessage(`ΥΣΤΑΤΗ ΠΝΟΗ: ${player.name}, επίπεδο ${player.level}, σκοτώθηκε στο βάθος ${deathDepth} από ${killerName}.`, 'monster');
        saveIronmanHighscore({
            name: player.name,
            level: player.level,
            depth: deathDepth,
            killer: killerName
        });
    }

    if (player[lostSlot].power > 1) {
        player[lostSlot].power--;
        player[lostSlot].name =
            getItemName(lostSlot, player[lostSlot].power);

        logMessage(
            `${slotNames[lostSlot]} υπέστη φθορά και έπεσε σε T${player[lostSlot].power}.`,
            'monster'
        );
    }

        
        logMessage("Η κομπανία παίζει το «" + randomTekeSong() + "».");

    triggerSmoothTransition('#4a1515');

    resetCooldowns();
    startTownRegen();

    saveGame();
    document.getElementById('town-interface').classList.remove('hidden');
    document.getElementById('combat-interface').classList.add('hidden');
    updateUI();
}

    function usePotion() {
        if (potionCooldownActive) return;
        
        let maxHp = getPlayerMaxHp();
        if (player.hp >= maxHp) {
            logMessage("Η υγεία είναι ήδη πλήρης.", 'system');
            return;
        }

        let pct = Math.floor(Math.random() * 41) + 10; 
        let heal = Math.round(maxHp * (pct / 100));
        player.hp = Math.min(maxHp, player.hp + heal);
        logMessage(`Έσφιξες μια μπύρα για +${formatNumber(heal)} HP! (Αναπλήρωση: ${pct}%).`, 'player');
        potionSound();
        flashSkillButton("btn-potion");
        player.beersDrunk += 0.5;

        createFloatingText('player-hp-parent', `+${formatNumber(heal)} HP`, "var(--hp-player)");
        flashHpBarHeal('player-hp-parent');

        potionCooldownActive = true;
        potionCdStart = Date.now();
        potionCdTimer = setTimeout(() => { potionCooldownActive = false; updateUI(); }, CD_DURATION);

        saveGame();
        updateUI();
    }

    setInterval(updateCooldownBars, 100);

    window.addEventListener('keydown', (event) => {

    // αν γράφεις όνομα, μη γίνονται hotkeys
    const active = document.activeElement;

    if (
        active &&
        (
            active.tagName === 'INPUT' ||
            active.tagName === 'TEXTAREA' ||
            active.isContentEditable
        )
    ) {
        return;
    }

    const code = event.code;
    const key = event.key;

    // ENTER = Σφάξε / Υποχώρηση
    if (
        code === 'Enter' ||
        code === 'NumpadEnter' ||
        key === 'Enter'
    ) {
        event.preventDefault();

        if (!inCombat)
            enterCombatFromSelector();
        else
            toggleRetreat();

        return;
    }

    // 0 = Υποχώρηση
    if (
        code === 'Digit0' ||
        code === 'Numpad0' ||
        key === '0'
    ) {
        event.preventDefault();

        if (inCombat)
            toggleRetreat();

        return;
    }

    // 4 = Κατραπακιά
    if (
        code === 'Digit4' ||
        code === 'Numpad4' ||
        key === '4'
    ) {
        event.preventDefault();
        queueSpecialAttack();
        return;
    }

    // 5 = Εκτέλεση
    if (
        code === 'Digit5' ||
        code === 'Numpad5' ||
        key === '5'
    ) {
        event.preventDefault();
        queuePreciseStrike();
        return;
    }

    // 6 = Μπύρα
    if (
        code === 'Digit6' ||
        code === 'Numpad6' ||
        key === '6'
    ) {
        event.preventDefault();
        usePotion();
        return;
    }

    // τα παρακάτω μόνο εκτός μάχης
    if (inCombat) return;

    // επόμενο επίπεδο
// επόμενο επίπεδο
if (
    code === 'Digit2' ||
    code === 'Numpad2' ||
    key === '2'
) {

    event.preventDefault();

    const selector = document.getElementById('area-selector');

    if (selector.selectedIndex < selector.options.length - 1) {
        selector.selectedIndex++;
        currentSelectedLevel = parseFloat(selector.value);
        
        // ΠΡΟΣΘΗΚΗ: Ενημέρωση του χρώματος της μπάρας
        updateSelectorColor(selector);

        saveGame();
        updateUI();
    }

    return;
}

    // προηγούμενο επίπεδο
    // προηγούμενο επίπεδο
if (
    code === 'Digit8' ||
    code === 'Numpad8' ||
    key === '8'
) {

    event.preventDefault();

    const selector = document.getElementById('area-selector');

    if (selector.selectedIndex > 0) {
        selector.selectedIndex--;
        currentSelectedLevel = parseFloat(selector.value);

        // ΠΡΟΣΘΗΚΗ: Ενημέρωση του χρώματος της μπάρας
        updateSelectorColor(selector);

        saveGame();
        updateUI();
    }

    return;
}
