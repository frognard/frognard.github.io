    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-bright: #ffffff;
            --text-muted: #888888;
            --accent-gold: #ffd700;
            --hp-player: #2ecc71;
            --hp-monster: #e74c3c;
            --border-color: #333333;
            --skill-blue: #3498db;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            transition: background-color 3s ease;
        }

        h2, h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .header-row h3 {
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .editable-name {
            border-bottom: 1px dashed var(--accent-gold);
            cursor: pointer;
            padding: 0 4px;
        }
        .editable-name:focus {
            outline: none;
            background-color: #2a2a2a;
            border-bottom: 1px solid var(--accent-gold);
        }

        .xp-wrapper-area {
            position: relative;
            margin: -2px 0 15px 0;
        }

        .rates-row{
            display:flex;
            justify-content:flex-end;
            gap:4px;
            margin-top:-10px;
            margin-bottom:12px;
        }

        .rates-row input{
            width:70px;
            font-size:11px;
        }

        .reset-rates-btn{
            padding:2px 6px;
        }

        .xp-bar-container {
            background-color: #333;
            width: 100%;
            height: 15px;      /* διπλάσιο ύψος */
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .xp-bar-text{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:10px;
            font-weight:bold;
            color:white;
            text-shadow:1px 1px 2px #000;
            pointer-events:none;
        }

        #p-xp-bar {
            height: 100%;
            width: 0%;
            background-color: #40a8ee;
            transition: width 0.28s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            margin-bottom: 5px;
            font-size: 0.95rem;
            align-items: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #171717;
            padding: 4px 8px;
            border: 1px solid #252525;
            border-radius: 3px;
            position: relative;
        }

        .inline-upgrade-btn {
            background-color: #2a2a2a;
            color: var(--accent-gold);
            border: 1px solid #444;
            padding: 8px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 2px;
            font-family: inherit;
            transition: all 0.2s;
            margin-left: 10px;
        }
        .inline-upgrade-btn:hover:not(:disabled) {
            background-color: #3a3a3a;
            border-color: var(--accent-gold);
        }
        .inline-upgrade-btn:disabled {
            color: var(--text-muted);
            border-color: #222;
            background-color: #1a1a1a;
            cursor: not-allowed;
            opacity: 0.4;
        }

        .gold { color: var(--accent-gold); font-weight: bold; }

        .cooldown-grid {
            display: grid;
            grid-template-columns: 100px 1fr 100px 1fr;
            gap: 10px;
            align-items: center;
        }

        .cd-action-cell {
            display: flex;
            align-items: center;
            gap: 8px; /* Κενό μεταξύ μπάρας, κουμπιού και κειμένου */
            width: 100%;
        }
        .cd-action-cell .cd-wrapper { flex: none; width: 60px }
        .cd-action-cell button { margin-left: 0; flex-shrink: 0; }

        .bar-container {
            background-color: #333;
            width: 100%;
            height: 20px;
            border-radius: 3px;
            overflow: visible;
            margin: 5px 0 15px 0;
            position: relative;
        }

        .bar {
            height: 100%;
            width: 100%;
            transition: width 0.28s ease;
            border-radius: 3px;
        }

        #player-hp-bar { background-color: var(--hp-player); }
        #monster-hp-bar { background-color: var(--hp-monster); }

        .bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            left: 0;
            font-size: 0.85rem;
            line-height: 20px;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        .cd-wrapper {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        .cd-inner {
            height: 100%;
            width: 100%;
            background-color: #6ec6ff;
            transition: width 0.1s linear;
        }

        .skill-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:8px;
            margin-top:10px;
            margin-bottom:15px;
        }

.legendary-item {
    color: #ffde21 !important; /* πραγματικό gold base */
    font-weight: 700;
    animation: legendaryGlow 2.2s ease-in-out infinite;
}

@keyframes legendaryGlow {
    0% {
        color: #ffde21;
        text-shadow:
            0 0 2px #990026,
            0 0 5px #cc0033,
            0 0 8px #ff1a53;
    }
    50% {
        color: #ffde21;
        text-shadow:
            0 0 4px #ff1a53,
            0 0 10px #ff3366,
            0 0 17px #ff4d79,
            0 0 25px #ff1a53;
    }
    100% {
        color: #ffde21;
        text-shadow:
            0 0 2px #990026,
            0 0 5px #cc0033,
            0 0 8px #ff1a53;
    }
}

/* Legendary τέρατα: ίδιο gold+glow στυλ όπως τα legendary items,
   αλλά το χρώμα της λάμψης αλλάζει ανάλογα με τον τύπο (weapon/armor/magic) */
.legendary-glow-weapon {
    color: #ffde21 !important;
    font-weight: 700;
    animation: legendaryGlowWeapon 2.2s ease-in-out infinite;
}
.legendary-glow-armor {
    color: #ffde21 !important;
    font-weight: 700;
    animation: legendaryGlowArmor 2.2s ease-in-out infinite;
}
.legendary-glow-magic {
    color: #ffde21 !important;
    font-weight: 700;
    animation: legendaryGlowMagic 2.2s ease-in-out infinite;
}

@keyframes legendaryGlowWeapon {
    0% {
        color: #ffde21;
        text-shadow:
            0 0 2px #990026,
            0 0 5px #cc0033,
            0 0 8px #ff1a53;
    }
    50% {
        color: #fff2c2;
        text-shadow:
            0 0 4px #ff1a53,
            0 0 10px #ff3366,
            0 0 17px #ff4d79,
            0 0 25px #ff1a53;
    }
    100% {
        color: #ffde21;
        text-shadow:
            0 0 2px #990026,
            0 0 5px #cc0033,
            0 0 8px #ff1a53;
    }
}

@keyframes legendaryGlowArmor {
    0% {
        color: #ffde21;
        text-shadow:
            0 0 2px #0059b3,
            0 0 5px #0073e6,
            0 0 8px #1ab2ff;
    }
    50% {
        color: #fff2c2;
        text-shadow:
            0 0 4px #1ab2ff,
            0 0 10px #33bbff,
            0 0 17px #66ccff,
            0 0 25px #1ab2ff;
    }
    100% {
        color: #ffde21;
        text-shadow:
            0 0 2px #0059b3,
            0 0 5px #0073e6,
            0 0 8px #1ab2ff;
    }
}

@keyframes legendaryGlowMagic {
    0% {
        color: #ffde21;
        text-shadow:
            0 0 2px #7a00cc,
            0 0 5px #9933ff,
            0 0 8px #cc66ff;
    }
    50% {
        color: #fff2c2;
        text-shadow:
            0 0 4px #cc66ff,
            0 0 10px #d966ff,
            0 0 17px #e699ff,
            0 0 25px #cc66ff;
    }
    100% {
        color: #ffde21;
        text-shadow:
            0 0 2px #7a00cc,
            0 0 5px #9933ff,
            0 0 8px #cc66ff;
    }
}

        .legendary-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: #ffd700;
    text-shadow:
        0 0 10px #ffd700,
        0 0 25px #ffea7a,
        0 0 40px #ffd700;
    z-index: 9999;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
}

.legendary-popup.show {
    opacity: 1;
    animation: popGlow 0.8s ease;
}

.hidden {
    display: none;
}

@keyframes popGlow {
    0% {
        transform: translate(-50%, -50%) scale(0.6);
        opacity: 0;
    }
    50% {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 1;
    }
    100% {
        transform: translate(-50%, -50%) scale(1);
    }
}

.legendary-monster-glow {
    color: #000000 !important; /* htan #ffaa00 */
    font-weight: bold !important;
    text-transform: uppercase;
    letter-spacing: 2px;
    animation: legendaryMonsterPulse 1.2s infinite alternate;
}

@keyframes legendaryMonsterPulse {
    from {
        text-shadow: 0 0 5px #ff5500, 0 0 10px #ffaa00, 0 0 15px #ffaa00;
        transform: scale(1);
    }
    to {
        text-shadow: 0 0 15px #ff5500, 0 0 25px #ffaa00, 0 0 35px #ff0000, 0 0 50px #ff5500;
        transform: scale(1.02);
    }
}

.skill-btn{
    position:relative;
    overflow:hidden;

    width:100%;
    height:44px;
    padding:0;

    border:1px solid #444;
    border-radius:4px;

    background:#1a1a1a;

    color:white;
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;

    cursor:pointer;

    --fill:100%;

.skill-btn::before{

    height:100%;

    z-index:0;

<script>

//============MUZKA=============================================================================================
// --- ORIGINAL MYSTERY WITH WAVE-SWELLING ISON (120% SLOW & LOWER OCTAVE) ---
let bgMusicInterval = null;
let isMusicPlaying = false;

// Καθολικές μεταβλητές ελέγχου του αιθέριου Ίσου
let isonOsc = null;
let isonLFO = null;
let isonFilter = null;
let isonGain = null;

// Ο δρόμος Χιτζάζ - Το δεύτερο μισό κατέβηκε μια οκτάβα για να αποφευχθούν οι πολύ ψηλές νότες
const hitjazScale = [
    110.00, // A2
    116.54, // Bb2
    138.59, // C#3
    146.83, // D3
    164.81, // E3
    174.61, // F3
    196.00, // G3
    110.00, // A2  (Αντί για 220.00)
    116.54, // Bb2 (Αντί για 233.08)
    138.59, // C#3 (Αντί για 277.18)
    146.83, // D3  (Αντί για 293.66)
    164.81, // E3  (Αντί για 329.63)
    174.61, // F3  (Αντί για 349.23)
    196.00  // G3  (Αντί για 392.00)
];

// Παραγωγή της αρχικής μελωδίας 100 βημάτων (Η δομή παραμένει ανέπαφη)
function getHitjazNoteForStep(step) {
    let index = 0;

    if (step < 40) {
        // ΜΕΡΟΣ 1ο: Μυστηριώδης, αργή εισαγωγή (Βήματα 0-39)
        if (step % 8 === 0) index = 7; 
        else if (step % 4 === 0) index = 4; 
        else index = (step * 2) % 7;
    } 
    else if (step >= 40 && step < 80) {
        // ΜΕΡΟΣ 2ο: Weird Ανάπτυξη (Βήματα 40-79)
        let wave = Math.sin(step * 0.5) * 3 + 10;
        index = Math.floor(wave) % hitjazScale.length;
        if (step % 6 === 0) index = 7; 
    } 
    else {
        // ΜΕΡΟΣ 3ο: Σταδιακή κάθοδος και σβήσιμο (Βήματα 80-99)
        index = (100 - step) % 6;
        if (step % 3 === 0) index = 2; 
    }

    return hitjazScale[index];
}

function startBackgroundMusic() {
    if (isMusicPlaying || !musicEnabled) return;
    isMusicPlaying = true;

    const now = audioCtx.currentTime;

    // --- ΔΗΜΙΟΥΡΓΙΑ ΑΙΘΕΡΙΟΥ ΙΣΟΥ ---
    isonFilter = audioCtx.createBiquadFilter();
    isonFilter.type = "lowpass";
    isonFilter.frequency.setValueAtTime(130, now); 

    isonGain = audioCtx.createGain();
    isonGain.gain.setValueAtTime(0, now);

    isonOsc = audioCtx.createOscillator();
    isonOsc.type = "sine";
    isonOsc.frequency.setValueAtTime(110.00, now); 

    isonLFO = audioCtx.createOscillator();
    isonLFO.type = "sine";
    isonLFO.frequency.setValueAtTime(0.3, now); 
    
    let lfoGain = audioCtx.createGain();
    lfoGain.gain.setValueAtTime(1.2, now);

    isonLFO.connect(lfoGain);
    lfoGain.connect(isonOsc.frequency);
    
    isonOsc.connect(isonFilter);
    isonFilter.connect(isonGain);
    isonGain.connect(audioCtx.destination);

    isonOsc.start(now);
    isonLFO.start(now);

    let currentStep = 0;
    
    // Ρυθμός: 540ms ανά βήμα
    bgMusicInterval = setInterval(() => {
        if (!musicEnabled) return;

        const t = audioCtx.currentTime;
        const baseFreq = getHitjazNoteForStep(currentStep);

        // --- ΜΗΧΑΝΙΣΜΟΣ ΚΥΜΑΤΟΣ (SWELL & SILENCE) ---
        const waveCycle = currentStep % 16;

        if (waveCycle === 0) {
            const currentGainVal = isonGain.gain.value;
            isonGain.gain.cancelScheduledValues(t);
            isonGain.gain.setValueAtTime(currentGainVal, t);
            isonGain.gain.linearRampToValueAtTime(0.15, t + 3.6); //entash drone
        } 
        else if (waveCycle === 5) {
            const currentGainVal = isonGain.gain.value;
            isonGain.gain.cancelScheduledValues(t);
            isonGain.gain.setValueAtTime(currentGainVal, t);
            isonGain.gain.linearRampToValueAtTime(0.0000, t + 2.4);
        }

        // --- ΚΥΡΙΑ ΜΕΛΩΔΙΑ (Ghostly Pluck) ---
        for (let i = 0; i < 2; i++) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = "sine"; 
            osc.frequency.setValueAtTime(baseFreq, t);
            osc.detune.setValueAtTime(i === 0 ? 7 : -7, t);

            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.15, t + 0.02); //entash melwdias
            gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.3);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(t);
            osc.stop(t + 1.35);
        }

        currentStep = (currentStep + 1) % 100;
    }, 540);
}

function stopBackgroundMusic() {
    isMusicPlaying = false;
    if (bgMusicInterval) {
        clearInterval(bgMusicInterval);
        bgMusicInterval = null;
    }

    const now = audioCtx.currentTime;
    if (isonGain) {
        try {
            isonGain.gain.cancelScheduledValues(now);
            isonGain.gain.linearRampToValueAtTime(0, now + 0.5);
            
            setTimeout(() => {
                if (isonOsc) { isonOsc.stop(); isonOsc = null; }
                if (isonLFO) { isonLFO.stop(); isonLFO = null; }
                if (isonFilter) { isonFilter = null; }
                isonGain = null;
            }, 600);
        } catch(e) {
            isonOsc = null;
            isonLFO = null;
            isonGain = null;
        }
    }
}

function updateMusicState() {
    if (musicEnabled && isMusicPlaying === false) {
        startBackgroundMusic();
    } else if (!musicEnabled) {
        stopBackgroundMusic();
    }
}

function monsterDeathSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    [480, 280].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine"; 
        const startTime = now + i * 0.06; 
        const duration = 0.14; 

        osc.frequency.setValueAtTime(freq, startTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.4, startTime + duration);

        gain.gain.setValueAtTime(0, startTime);
        // ΔΙΠΛΑΣΙΑΣΜΟΣ: Από 0.2 σε 0.4
        gain.gain.linearRampToValueAtTime(0.4, startTime + 0.005); 
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
    });
}

function playerDeathSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    const freqs = [320, 240, 160];

    freqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        const t = now + i * 0.08;

        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.6, t + 0.18);

        // ΔΙΠΛΑΣΙΑΣΜΟΣ: Από 0.22 σε 0.44
        gain.gain.setValueAtTime(0.44, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.20);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.20);
    });
}

    osc.stop(now + 0.05);

function getLegendaryMonster(level, lootType) {
    const list = legendaryMonstersByType[lootType] || [];
    const pool = list.filter(p => level >= p.min && level <= p.max);

    // Αν δεν υπάρχει ζευγάρι ακριβώς για αυτό το επίπεδο, πάρε από όλη τη λίστα του τύπου
    // (ασφάλεια, δεν θα έπρεπε να χρειαστεί αν η λίστα καλύπτει όλα τα brackets)
    const chosen = randomFrom(pool.length ? pool : list);

    if (!chosen) return { name: "Άγνωστος Θρύλος", itemName: "Θρυλικό Αντικείμενο" };

    return { name: chosen.name, itemName: chosen.itemName };
}

function getMonsterName(lvl) {
    // 1. Το κανονικό index του τέρατος με βάση το επίπεδό του
    let baseIndex = Math.floor(lvl) - 1;

    // 2. Υπολογισμός τυχαίας μετατόπισης από -2 έως +2
    const offset = Math.floor(Math.random() * 5) - 2; // Παράγει: -2, -1, 0, 1, 2

    // 3. Εφαρμογή της μετατόπισης
    let nameIndex = baseIndex + offset;

    // 4. Δικλείδα ασφαλείας για να μην βγούμε ποτέ εκτός των ορίων του πίνακα (0 έως 99)
    nameIndex = Math.max(0, Math.min(nameIndex, monsterNames.length - 1));

    // 5. Επιστροφή του τυχαίου ονόματος
    return monsterNames[nameIndex];
}

// ψοφιος κωδικας
function getLegendaryItemName(type, tier) {
    // Το tier ενός legendary item = (επίπεδο τέρατος βάσει rollItemTier) + 20
    // (βλ. handleEquipmentDrop: rolledTier = Math.min(125, rolledTier + 20)).  ayta ginan +10 115 ktl
    // Άρα αφαιρούμε το +20 για να βρούμε ξανά το αντίστοιχο bracket επιπέδου
    // μέσα στο legendaryMonstersByType, το ίδιο table που χρησιμοποιείται
    // και τη στιγμή του drop.
    let baseLevel = tier - 15;
    baseLevel = Math.max(1, Math.min(100, baseLevel));

    const list = legendaryMonstersByType[type] || [];
    const entry = list.find(p => baseLevel >= p.min && baseLevel <= p.max);

    return entry ? entry.itemName : "Θρυλικό Αντικείμενο";
}


//Equipment level roll
function rollItemTier(monsterLevel) {
    // Παραγωγή ενός τυχαίου ακέραιου αριθμού από το 1 έως το 100
    let roll = Math.floor(Math.random() * 100) + 1;
    let modifier = 0;
    // Έλεγχος των ορίων βάσει των ποσοστών:
    if (roll <= 1) {
        modifier = -5;  // 1% (1)
    } else if (roll <= 4) {
        modifier = -4;  // 3% (2 έως 4)
    } else if (roll <= 12) {
        modifier = -3;  // 8% (5 έως 12)
    } else if (roll <= 24) {
        modifier = -2;  // 12% (13 έως 24)
    } else if (roll <= 40) {
        modifier = -1;  // 16% (25 έως 40)
    } else if (roll <= 58) {
        modifier = 0;   // 18% (41 έως 58)
    } else if (roll <= 74) {
        modifier = +1;  // 16% (59 έως 74)
    } else if (roll <= 87) {
        modifier = +2;  // 13% (75 έως 87)
    } else if (roll <= 95) {
        modifier = +3;  // 8% (88 έως 95)
    } else if (roll <= 98) {
        modifier = +4;  // 3% (96 έως 98)
    } else {
        modifier = +5;  // 1% (99 έως 100)
    }
    let tier = monsterLevel + modifier;
    tier = Math.max(2, Math.min(105, tier));
    return tier;
}

function createSeededRandom(seed) {
    return function () {
        seed |= 0;
        seed = (seed + 0x6D2B79F5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

function getDailySeed() {
    const d = new Date();

    return (
        d.getFullYear() * 10000 +
        (d.getMonth() + 1) * 100 +
        d.getDate()
    );
}

let areaModifiers = {};

function rollAreaType(depth) {

    const seed = getDailySeed() * 1000 + depth;
    const rng = createSeededRandom(seed);

    const roll = rng() * 100;

    if (roll < 50) return AREA_TYPES.NORMAL;   
    if (roll < 60) return AREA_TYPES.RICH;     
    if (roll < 70) return AREA_TYPES.POOR;     
    if (roll < 80) return AREA_TYPES.WEAPON;   
    if (roll < 90) return AREA_TYPES.ARMOR;    
    return AREA_TYPES.MAGIC;                   
}

function generateAreaModifiers() {
    areaModifiers = {};

    for (let lvl = 1; lvl <= 100; lvl++) {

    }
}

   // XP REQ FORMULA == prepei na einai arketa argh wste na mhn ksefeygoun poly ta levels apo to equipment
    function calculateNextXpRequirement(lvl) { return Math.round(80 * Math.pow(lvl, 2.6)); }
  
    // cost armor kai weapon: ligo pio megalos ek8eths apo to gold gain, giati ta levels megalwnoun se xrono

 //XP REWARD FORMULA
    function getMonsterXpReward(monsterLvl) { 
   
   // dynamic difficulty xp mod
 // let difficultyModifier = calculateDifficulty(player, monster);
 // let xp = 10 * Math.pow(monsterLvl, 2) * ((difficultyModifier+0.12 + 1)/2);
    let xp = 10 * Math.pow(monsterLvl, 2);


// simpler extra lvl difference penalty
  let diff = player.level - monsterLvl;
if (diff > 0) { // Ο παίκτης είναι μεγαλύτερο επίπεδο: Πέναλτι ανά επίπεδο διαφοράς
        
        xp *= Math.pow(0.90, diff);
    } else if (diff < 0) { // Το τέρας είναι μεγαλύτερο επίπεδο: Μπόνους ανά επίπεδο διαφοράς.  Χρησιμοποιούμε Math.abs(diff) για να γίνει ο εκθέτης θετικός
       xp *= Math.pow(1.0, Math.abs(diff));
    }
    return Math.round(xp);
}

//difficulty system - experimental isws too much scaling
function calculateDifficulty(player, monster) {
    const playerAtk = getPlayerAtk();
    const playerDef = getPlayerDef();
    const playerMaxHp = getPlayerMaxHp();

    const playerDmgMod = calcDmgModifier(playerAtk - monster.def);
    const monsterDmgMod = calcDmgModifier(monster.atk - playerDef);

    const playerDps = player.level * playerDmgMod;
    const monsterDps = monster.level * monsterDmgMod;

    const playerTTK = monster.maxHp * 1.5 / playerDps;
    const monsterTTK = playerMaxHp / monsterDps;

    return playerTTK / monsterTTK;
}

function updateAreaSelector() {
    const selector = document.getElementById('area-selector');
    if (!selector) return;

    if (selector.options.length === 100) return;

    const currentSelected = selector.value;
    selector.innerHTML = '';

    for (let i = 1; i <= 100; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        let areaType = getAreaType(i);
        let icon = AREA_TYPE_ICON[areaType];
        
        // Αντικατάσταση της ονοματοδοσίας των τεράτων με την απλή ένδειξη βάθους
        opt.innerText = `${icon ? icon + ' ' : ''}${depthNames[i - 1]}`;
        
        // Δίνουμε ΠΑΝΤΑ χρώμα στο option, ακόμα και αν είναι NORMAL
        opt.style.color = AREA_TYPE_COLOR[areaType];
        
      //  if (areaType === AREA_TYPES.RICH) opt.style.fontWeight = 'bold';
      //  if (areaType === AREA_TYPES.POOR) opt.style.fontStyle = 'italic';
        selector.appendChild(opt);
    }

    if (currentSelected) {
        selector.value = currentSelected;
    } else {
        selector.value = "1";
    }

    // Αλλαγή του χρώματος στο κείμενο του select κατά την αρχική φόρτωση
    updateSelectorColor(selector);
    
    selector.onchange = function() {
        currentSelectedLevel = parseFloat(this.value);
        logAreaTransition(currentSelectedLevel);
        saveGame();
        updateUI();
    };
}

function updateSelectorColor(selector) {
    let selectedLvl = parseInt(selector.value);
    let areaType = getAreaType(selectedLvl);
    selector.style.color = AREA_TYPE_COLOR[areaType];
}

document.getElementById('area-selector').addEventListener('change', function() {
    updateSelectorColor(this);
});

function refreshAreaSelectorAppearance() {
    const selector = document.getElementById('area-selector');
    if (!selector) return;
    for (let i = 0; i < selector.options.length; i++) {
        const opt = selector.options[i];
        const lvl = parseInt(opt.value);
        const areaType = getAreaType(lvl);
        const icon = AREA_TYPE_ICON[areaType];
        opt.innerText = `${icon ? icon + ' ' : ''}${depthNames[lvl - 1]}`;
        opt.style.color = AREA_TYPE_COLOR[areaType];
    }
    updateSelectorColor(selector);
}

function logMessage(text, type = 'system') {
    const logDiv = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = `log-entry log-${type}`;

    if (text === "") {
        entry.innerHTML = "&nbsp;";
    } else {
        entry.innerText = text;
    }

    logDiv.append(entry);

    while (logDiv.children.length > 1000) {
        logDiv.removeChild(logDiv.firstChild);
    }

    logDiv.scrollTop = logDiv.scrollHeight;
}

function logMessageHTML(html, type = 'system') {
    const logDiv = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = `log-entry log-${type}`;
    entry.innerHTML = html;

    logDiv.append(entry);

    while (logDiv.children.length > 1000) {
        logDiv.removeChild(logDiv.firstChild);
    }

    logDiv.scrollTop = logDiv.scrollHeight;
}

    function triggerSmoothTransition(colorHex) {
        const container = document.getElementById('game-container');
        container.style.transition = 'none';
        container.style.backgroundColor = colorHex;
        void container.offsetHeight;
        container.style.transition = 'background-color 1.0s ease';
        container.style.backgroundColor = 'var(--panel-bg)';
    }

function startTownRegen() {
    if (townRegenInterval) clearInterval(townRegenInterval);
    townRegenInterval = setInterval(() => {
       const maxHp = getPlayerMaxHp();
        if (!inCombat && player.hp < maxHp && !(player.ironman && player.ironmanDead)) {
            let regenAmount = Math.round(maxHp * 0.1);
            // αν είμαστε κοντά στο full hp
            regenAmount = Math.min(
                regenAmount,
                maxHp - player.hp
            );
            player.hp += regenAmount;
            player.activeTime += 2;
            createFloatingText(
                'player-hp-parent',
                `+${formatNumber(regenAmount)}`,
                "var(--hp-player)"
                 );
                 flashHpBarHeal('player-hp-parent');
            updateUI();
            saveGame();
            
         }
    }, effTick());
}

    function stopTownRegen() { if (townRegenInterval) { clearInterval(townRegenInterval); townRegenInterval = null; } }

    
function updateCooldownBars() {
    const now = Date.now();
    function setBar(id, active, start) {
        const btn = document.getElementById(id);
        if (!btn) return; // αμυντικά: αν το κουμπί δεν υπάρχει (π.χ. μεταβατικό state modal), μην σκάσει το loop
        if (active) {
            const pct = Math.min(100, ((now - start) / effCD()) * 100);
            btn.style.setProperty('--fill', pct + '%');
        } else {
            btn.style.setProperty('--fill', '100%');
        }
    }
    setBar('btn-potion', potionCooldownActive, potionCdStart);
    setBar('btn-skill', skillCooldownActive, skillCdStart);
    setBar('btn-precise', preciseCooldownActive, preciseCdStart);
    const huntBtn = document.getElementById('btn-hunt-retreat');
    if (huntBtn) huntBtn.style.setProperty('--fill', '100%');
}

let lastCooldownLoopTick = Date.now();

function cooldownLoop() {
    lastCooldownLoopTick = Date.now();
    try {
        updateCooldownBars();
    } catch (e) {
        // Ό,τι κι αν σκάσει εδώ μέσα, ΔΕΝ πρέπει να σκοτώσει το requestAnimationFrame chain.
        console.error('cooldownLoop: σφάλμα (αγνοήθηκε, το loop συνεχίζει):', e);
    }
    if (document.hidden) {
        setTimeout(cooldownLoop, 50);
    } else {
        requestAnimationFrame(cooldownLoop);
    }
}

// Watchdog: αν το animation loop σταματήσει ποτέ (π.χ. λόγω exception που ξέφυγε,
// ή επειδή κάτι άλλο μπλόκαρε το πρώτο requestAnimationFrame), το ξανασηκώνουμε.
// Έτσι δεν χρειάζεται πια F5 για να "διορθωθούν" τα cooldown animations.
setInterval(function () {
    if (Date.now() - lastCooldownLoopTick > 1000) {
        cooldownLoop();
    }
}, 1000);

    function resetCooldowns() {
        if (potionCdTimer) clearTimeout(potionCdTimer);
        if (skillCdTimer) clearTimeout(skillCdTimer);
        if (preciseCdTimer) clearTimeout(preciseCdTimer);
        preciseCooldownActive = false;
        potionCooldownActive = false;
        skillCooldownActive = false;
        isSkillQueued = false;
        updateCooldownBars();
        updateUI();
    }
//
    function upgradeEquipment(type) {
        if (inCombat) return;
        let currentPower = player[type].power;
        let cost = (type === 'weapon') ? getWeaponUpgradeCost(currentPower) : getArmorUpgradeCost(currentPower);
        if (player.gold >= cost) {
            player.gold -= cost;
            player[type].power++;
            player[type].name = getItemName(type, player[type].power);
            logMessage(`Αναβάθμιση αντικειμένου: ${player[type].name}.`, 'victory');
            buyItemSound();
            
            let targetBox = type === 'weapon' ? 'stat-atk-box' : 'stat-def-box';

            const box = document.getElementById(targetBox);
            box.classList.add('item-upgrade-flash');
            setTimeout(() => {
            box.classList.remove('item-upgrade-flash');
            }, 400);

            createFloatingText(targetBox, "+1 Tier", "var(--accent-gold)");
            createFloatingText('stat-gold-box', `-${cost}g`, "#e74c3c");

            saveGame();
            updateUI();
        }
    }

function spawnMonster() {

} else {

    let areaType = getAreaType(lvl);

    // Βασική πιθανότητα Legendary (1 στις 1000). RICH/POOR areas την επηρεάζουν,
    // με δικούς της πολλαπλασιαστές ώστε να ρυθμίζεται ξεχωριστά από το specialChance.
    let legendaryChance = 0.001;
    const legendaryRichMultiplier = 1.30;  // πόσο πιο συχνά σε RICH areas
    const legendaryPoorMultiplier = 0.70;  // πόσο πιο σπάνια σε POOR areas
    if (areaType === AREA_TYPES.RICH) legendaryChance = legendaryChance * legendaryRichMultiplier;
    else if (areaType === AREA_TYPES.POOR) legendaryChance = legendaryChance * legendaryPoorMultiplier;

    const isLegendary = Math.random() < legendaryChance;

    let variant = 'normal';
    let firstName = '';
    let title = '';
    let legendaryLootType = null;
    let legendaryItemName = null;

    // BASE RARE MONSTER CHANCE RICH/POOR αλλάζουν το βασικό chance εμφάνισης special τέρατος
    let specialChance = 0.17;
    if (areaType === AREA_TYPES.RICH) specialChance = specialChance * 1.30;
    else if (areaType === AREA_TYPES.POOR) specialChance = specialChance * 0.70;

    if (isLegendary) {

    variant = 'legendary';

    // Πρώτα αποφασίζουμε τον τύπο (33/33/33) - καθορίζει ΚΑΙ το χρώμα/λάμψη
    // ΚΑΙ τι είδους αντικείμενο θα πέσει.
    let lootRoll = Math.random();
    legendaryLootType = lootRoll < 0.333 ? 'weapon' : (lootRoll < 0.666 ? 'armor' : 'magic');

    // Μετά διαλέγουμε το ζευγάρι όνομα+αντικείμενο που ταιριάζει με τύπο & επίπεδο
    const legendaryPair = getLegendaryMonster(lvl, legendaryLootType);
    firstName = legendaryPair.name;
    legendaryItemName = legendaryPair.itemName;

    title = ""; // δεν χρειάζεται τίτλος στα legendary

    // Στατιστικά ανάλογα με τον τύπο (βλ. legendaryStatsByType)
    const legendaryStats = legendaryStatsByType[legendaryLootType];
    baseAtk += legendaryStats.atkBonus;
    baseDef += legendaryStats.defBonus;
    baseHp = lvl * legendaryStats.hpMultiplier;

}
else if (Math.random() < specialChance) {
        firstName = randomFrom(monsterFirstNames);

        // WEAPON/ARMOR/MAGIC areas: extra 33% check να είναι ο "δικός" τους τύπος,
        // αλλιώς γίνεται το κανονικό τυχαίο 33/33/33
        let favored = null;
        if (areaType === AREA_TYPES.WEAPON) favored = 'weapon';
        else if (areaType === AREA_TYPES.ARMOR) favored = 'armor';
        else if (areaType === AREA_TYPES.MAGIC) favored = 'magic';

        let chosenVariant;
        if (favored && Math.random() < 0.333) {
            chosenVariant = favored;
        } else {
            let roll = Math.random();
            chosenVariant = roll < 0.333 ? 'weapon' : (roll < 0.666 ? 'armor' : 'magic');
        }

        if (chosenVariant === 'weapon') {
            variant = 'weapon';
            baseAtk += 9;
            baseHp = lvl * 100;
            title = randomFrom(wildTitles);
        }
        else if (chosenVariant === 'armor') {
            variant = 'armor';
            baseDef += 14;
            baseHp = lvl * 100;
            title = randomFrom(armoredTitles);
        }
        else {
            variant = 'magic';
            baseAtk += 5.5;
            baseDef += 5.5;
            baseHp = lvl * 100;
            title = randomFrom(magicTitles);
        }
    }

    monster = {
        name: getMonsterName(lvl),
        level: lvl,
        atk: baseAtk,
        def: baseDef,
        hp: baseHp,
        maxHp: baseHp,
        variant: variant,
        firstName: firstName,
        title: title,
        lootType: legendaryLootType,
        lootItemName: legendaryItemName
    };

// pros to paron den xrisimopoiountai. egine color coded
        let prefix = "";
        if (variant === 'weapon') prefix = "<Άγριο> ";
        if (variant === 'armor') prefix = "<Θωρακισμένο> ";
        if (variant === 'magic') prefix = "<Μαγικό> ";
        if (variant === 'legendary') prefix = "<Θρυλικό> ";

    let monsterFullName = (variant === 'normal') ? monster.name : `${monster.firstName} ${monster.title}`;
    logMessage(`Εμφανίζεται: ${getMonsterDisplayName(monster)}!`, "system");
    }
}

//attack/defense damage modifier

//complex εκθετικος modifier
    function calcDmgModifier(diff) {
    return diff >= 0
        ? 2 - Math.exp(-0.04 * diff)
        : 0.5 + 0.5 * Math.exp(0.08 * diff);
    }

//simple modifier flat % steps
//   function calcDmgModifier(diff) {
 //   return Math.min(2, Math.max(0.4, 1 + diff * 0.03));
//      }

// Weighted roll για το πόσα tiers χάνει ο εξοπλισμός στο death penalty
function rollDeathPenaltyAmount() {
    const roll = Math.random() * 100;
    if (roll < 75) return 1;        // 0-75
    if (roll < 88) return 2;        // 75-88 (13%)
    if (roll < 96) return 3;        // 88-96 (8%)
    if (roll < 99) return 4;        // 96-99 (3%)
    return 5;                       // 99-100 (1%)
}


    function rollBaseDamage(fixedDice = null) {
        let d6;
        if (fixedDice !== null) {
            d6 = fixedDice;
        } else {
            d6 = Math.floor(Math.random() * 6) + 1;
        }
        let diff = getPlayerAtk() - monster.def;
        let dmgModifier = calcDmgModifier(diff);
        let dmg = d6 * 5 * player.level * dmgModifier;
        return Math.max(1, Math.round(dmg));
    }

       function performPlayerAttack(skill = null) {

            let hitChance = skill?.hitChance ?? 80;
            hitChance = Math.max(10, Math.min(100, hitChance));

            if (Math.floor(Math.random() * 100) >= hitChance) {

                        : "Αστόχησες."
                };
            }

            // βασικό damage
            let damage = rollBaseDamage(skill?.fixedDice);

            // skill modifier
            
if (skill) {
               
    damage = Math.round(damage * skill.multiplier);

    if (skill === skills.heavyStrike)
        flashSkillButton("btn-skill");

    if (skill === skills.preciseStrike)

    return {
        damage,
        log: `[SKILL] ${skill.name}! Προκάλεσες ${formatNumber(damage)} ζημιά.`
    };
}

            return {
                damage,
                log: `Χτύπησες: ${formatNumber(damage)} ζημιά σε ${getMonsterDisplayName(monster)}.`
            };
        }


    function queueSpecialAttack() {
        if (!inCombat || !monster || skillCooldownActive || isSkillQueued) return;
        isSkillQueued = true;
        queuedSkill = skills.heavyStrike;
        logMessage("[QUEUE] Η Κατραπακιά προετοιμάστηκε για τον επόμενο γύρο.", 'system');
        updateUI();
    }

    function queuePreciseStrike() {
    if (!inCombat || !monster || preciseCooldownActive) return;
    if (monster.hp > monster.maxHp * skills.preciseStrike.executeThreshold) return;

    let result = performPlayerAttack(skills.preciseStrike);

    preciseCooldownActive = true;
    preciseCdStart = Date.now();
    preciseCdTimer = setTimeout(() => {
        preciseCooldownActive = false;
        updateUI();
    }, effCD());

    resolvePlayerAttack(result);
}

function resolvePlayerAttack(result) {
    if (result.log) logMessage(result.log, 'player');
    if (result.damage > 0) {
        monster.hp = Math.max(0, monster.hp - result.damage);
        if (monster.hp > 0) hitSound();
        createFloatingText('monster-hp-parent', `-${formatNumber(result.damage)}`, "var(--hp-monster)");

    }
    else {
    createFloatingText('monster-hp-parent', 'ΑΠΕΦΥΓΕ', '#ffffff');
        }
        
    updateUI();

    if (monster.hp <= 0) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => {
            document.getElementById('monster-hp-parent').classList.remove('monster-death');
        }, 500);
        endCombat('victory');
        return true;
    }
    return false;
}

function forceRetreat() {
    // 1. ΣΤΑΜΑΤΗΜΑ του interval της μάχης
    if (typeof combatInterval !== 'undefined') {
        clearInterval(combatInterval);
        combatInterval = null;
    }

    // 1b. ΑΚΥΡΩΣΗ οποιουδήποτε "εκκρεμούς" setTimeout από το endCombat() που θα έκανε
    // spawn το επόμενο τέρας. Χωρίς αυτό, σε γρήγορο auto (π.χ. x30) υπάρχει race condition:
    // σκοτώνεις τέρας -> στήνεται timeout για spawn -> κάνεις retreat πριν χτυπήσει ->
    // ξαναμπαίνεις σε νέο hunt -> το παλιό ορφανό timeout πυροδοτείται μέσα στο νέο context
    // και κάνει spawn τέρας "στον τεκέ", σκοτώνοντάς σε με το 10% HP της υποχώρησης.
    if (nextMonsterTimeoutId) {
        clearTimeout(nextMonsterTimeoutId);
        nextMonsterTimeoutId = null;
    }
    waitingForNextMonster = false;

    // 2. Επαναφορά του interface
    document.getElementById('monster-hp-bar').classList.remove('monster-death');
    startTownRegen();
    document.getElementById('town-interface').classList.remove('hidden');
    document.getElementById('combat-interface').classList.add('hidden');

    // 3. Επαναφορά μεταβλητών κατάστασης
    inCombat = false;
    isAttemptingRetreat = false;
    isSkillQueued = false;
    queuedSkill = null;
    player.hp = Math.round(getPlayerMaxHp() * 0.10);
    logMessage(`Επέστρεψες κουρασμένος στον Τεκέ του Ζαλαδούρα. Ξεπαστρέψες ${currentRunKills} εχθρούς σε αυτή την κατάβαση. Ρίχνεις έναν υπνάκο.`, 'retreat');
        if (currentSelectedLevel >= player.level && currentRunKills > player.bestKillStreak) {
        player.bestKillStreak = currentRunKills;
        }
    currentRunKills = 0; // Μηδενισμός μετά την αναφορά
    logMessage("Η κομπανία παίζει «" + randomTekeSong() + "».");
    if (Math.random() < 1/3) {logMessage(zaladouras[Math.floor(Math.random() * zaladouras.length)],'britalic');}
    createFloatingText('player-hp-parent', "ΥΠΟΧΩΡΗΣΗ", "#00d2ff");
    retreatSound();
    triggerSmoothTransition('#1a2742');
    
    updateUI();
    saveGame();

        const huntBtn = document.getElementById("btn-hunt-retreat");
    huntBtn.disabled = true;
    setTimeout(() => {
        huntBtn.disabled = false;
    }, 4000);
}

function executeCombatRound() {
   
    if (!inCombat) return;
    player.activeTime += 2;
    if (waitingForNextMonster) return;

    if (!monster || monster.hp <= 0) {
        spawnMonster();
        updateUI();
    }

// Προσθήκη για την πιθανότητα υποχώρησης
if (isAttemptingRetreat) {
    if (Math.random() < 0.15) {
       logMessage("Ξέφυγες από το τέρας!");
        // Προσομοίωση νίκης για να γίνει η διαφυγή με ασφάλεια
      forceRetreat();
      //DOCTOR
      
        return;
    } else {
        logMessage("Υποχώρηση...");
    }
}

    // ==========================================
    // ΦΑΣΗ 1: ΥΠΟΛΟΓΙΣΜΟΣ ΕΠΙΘΕΣΕΩΝ (ταυτόχρονα)
    // ==========================================

    // Κρατάμε σε μια μεταβλητή αν χρησιμοποιήθηκε το Άμεσο Πλήγμα σε αυτόν τον γύρο
    let usedPreciseStrikeThisRound = false;

    // --- Επίθεση Παίκτη ---
    let result;

    if (isSkillQueued) {
        isSkillQueued = false;
        result = performPlayerAttack(queuedSkill);
        if (queuedSkill === skills.heavyStrike) {
            skillCooldownActive = true;
            skillCdStart = Date.now();
            skillCdTimer = setTimeout(() => {
                skillCooldownActive = false;
                updateUI();
            }, effCD());
        }
        if (queuedSkill === skills.preciseStrike) {
            usedPreciseStrikeThisRound = true; // Ενεργοποιείται η ιδιότητα του skill
            preciseCooldownActive = true;
            preciseCdStart = Date.now();
            preciseCdTimer = setTimeout(() => {
                preciseCooldownActive = false;
                updateUI();
            }, effCD());
        }
        queuedSkill = null;
    } else {
        result = performPlayerAttack();
    }

    // --- Επίθεση Τέρατος ---
    let monsterDamageCalculated = 0;
    let monsterActionLog = "";
    let monsterHitChance = 80;
    monsterHitChance = Math.max(10, Math.min(100, monsterHitChance));

    if (Math.floor(Math.random() * 100) >= monsterHitChance) {
        monsterActionLog = `${getMonsterDisplayName(monster)}: αστόχησε.`;
        monsterDamageCalculated = 0;
    } else {
        let d6 = Math.floor(Math.random() * 6) + 1;
        let diff = monster.atk - getPlayerDef();
        let dmgModifier = calcDmgModifier(diff);
        let dmg = d6 * 5 * monster.level * dmgModifier;
        monsterDamageCalculated = Math.max(1, Math.round(dmg));
        monsterActionLog = `${getMonsterDisplayName(monster)}: σου έκανε ${formatNumber(monsterDamageCalculated)} ζημιά.`;
    }

    // ==========================================
    // ΦΑΣΗ 2: ΕΦΑΡΜΟΓΗ ΖΗΜΙΩΝ
    // ==========================================

    // Εφαρμογή ζημιάς του Παίκτη
    if (result.log) logMessage(result.log, 'player');
    if (result.damage > 0) {
        monster.hp = Math.max(0, monster.hp - result.damage);
        if (monster.hp > 0) hitSound();
        createFloatingText('monster-hp-parent', `-${formatNumber(result.damage)}`, "var(--hp-monster)");
        flashHpBar('monster-hp-parent');
    } else {
        createFloatingText('monster-hp-parent', 'ΑΠΕΦΥΓΕ', '#ffffff');
    }

    // ΣΥΓΚΕΚΡΙΜΕΝΟΣ ΕΛΕΓΧΟΣ: Αν χρησιμοποιήθηκε το Άμεσο Πλήγμα και το τέρας πέθανε,
    // η μάχη τελειώνει ΕΔΩ, κόβοντας την επίθεση του τέρατος.
    if (usedPreciseStrikeThisRound && monster.hp <= 0) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-parent').classList.remove('monster-death'), 500);
        updateUI();
        endCombat('victory');
        return;
    }

    // Εφαρμογή ζημιάς του Τέρατος (εκτελείται κανονικά αν δεν ίσχυε το παραπάνω)
    if (monsterActionLog) logMessage(monsterActionLog, 'monster');
    if (monsterDamageCalculated > 0) {
        player.hp = Math.max(0, player.hp - monsterDamageCalculated);
        createFloatingText('player-hp-parent', `-${formatNumber(monsterDamageCalculated)}`, "var(--hp-monster)");
        playerHitSound();
        flashHpBar('player-hp-parent');  
    } else {
        createFloatingText('player-hp-parent', 'ΑΠΕΦΥΓΕΣ', "var(--hp-player)");
    }

    updateUI();

    // ==========================================
    // ΦΑΣΗ 3: ΕΛΕΓΧΟΣ ΑΠΟΤΕΛΕΣΜΑΤΟΣ (Κλασικός ταυτόχρονος έλεγχος)
    // ==========================================
    let playerDied = player.hp <= 0;
    let monsterDied = monster.hp <= 0;

    if (monsterDied && playerDied) {
        document.getElementById('monster-hp-bar').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-bar').classList.remove('monster-death'), 500);
        playerDeathSound();
        endCombat('mutual_death');
        return;
    }

    if (monsterDied) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-parent').classList.remove('monster-death'), 500);
        endCombat('victory');
        return;
    }

    if (playerDied) {
        endCombat('defeat');
        playerDeathSound();
        return;
    }
}

            box.classList.remove('item-upgrade-flash');
        }, 400);

        if (type !== 'magic') {
            createFloatingText(targetBox, "NEW EQUIP!", "var(--accent-gold)");
        } else {
            createFloatingText('player-hp-parent', "MAX HP UP!", "var(--hp-player)");
        }

    } else {
        // timh magikwn antikeimenon
        let sellValue = rollGoldForLevel(rolledTier) * 1;

        player.gold += sellValue;
        player.totalGoldGained += sellValue;

        if (forceSell) {
            logMessage(
                `[DROP] Το αντικείμενο ήταν πολύ δυνατό για το επίπεδό σου και θα πουληθεί για ${formatNumber(sellValue)} χρυσά.`,
                'victory'
            );
        } else {
            logMessage(
                `[DROP] Θα πουληθεί για ${formatNumber(sellValue)} χρυσά.`,
                'victory'
            );
        }

        setTimeout(() => {
            createFloatingText(
                'stat-gold-box',
                `+${formatNumber(sellValue)}g`,
                "var(--accent-gold)"
            );
        }, 500);
    }
}

function showLegendaryPopup() {

   function endCombat(outcome) {
        if (outcome !== 'victory') {
            isAttemptingRetreat = false;
        }
        isSkillQueued = false;

        if (outcome === 'victory' || outcome === 'mutual_death') {
            document.getElementById('monster-hp-bar').classList.add('monster-death');
            setTimeout(() => document.getElementById('monster-hp-bar').classList.remove('monster-death'), 500);
            
            logMessage(`${getMonsterDisplayName(monster)}: εξοντώθηκε.`, 'victory');
            monsterDeathSound();
            player.kills++;
            currentRunKills++;
            
            // --- ΕΛΕΓΧΟΣ ΓΙΑ ΘΕΟ ΚΟΝΑΝΟ ---
         if (monster && monster.name === "Θεός Κόνανος") {
            // Όλα τα παρακάτω εκτελούνται ΜΟΝΟ αν είναι η πρώτη φορά που νικιέται ο Θεός
            if (!player.hasBeatenConanos) {
                player.hasBeatenConanos = true;
                
               // logMessage(`Ο ΘΕΟΣ ΚΟΝΑΝΟΣ ΠΕΘΑΝΕ! Το παιχνίδι νικήθηκε! Αιώνια δόξα στον ${player.name}! Απο δω και πέρα θα είναι γνωστός ως ΘΕΟΣΦΑΧΤΗΣ.`, 'victory');

                // --- Καταχώρηση της ΝΙΚΗΣ στο Ψοφολόγιο (μόνο για Ironman, ίδια διαδικασία με τους θανάτους) ---
                if (player.ironman) {
                    saveIronmanHighscore({
                        name: player.name,
                        level: player.level,
                        depth: currentSelectedLevel,
                        killer: "Θεός Κόνανος",
                        weapon: player.weapon.power,
                        armor: player.armor.power,
                        magic: player.magic.power,
                        date: Date.now(),
                        victory: true
                    });
                }
                
                if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
                inCombat = false;
                monster = null;
                isAttemptingRetreat = false;

                generateAreaModifiers();
                refreshAreaSelectorAppearance();    

                startTownRegen();
                document.getElementById('town-interface').classList.remove('hidden');
                document.getElementById('combat-interface').classList.add('hidden');
                
                logMessage(`Ο ΘΕΟΣ ΚΟΝΑΝΟΣ ΠΕΘΑΝΕ! Το παιχνίδι νικήθηκε! Αιώνια δόξα στον ${player.name}!. Απο δω και πέρα θα είναι γνωστός ως ΘΕΟΣΦΑΧΤΗΣ. Επιστρέφεις στον τεκέ και ρίχνεις έναν υπνάκο...`, 'konanos');
                    if (currentSelectedLevel >= player.level && currentRunKills > player.bestKillStreak) {
                        player.bestKillStreak = currentRunKills;
                    }
                currentRunKills = 0;
                logMessage("Η κομπανία παίζει «" + randomTekeSong() + "».");
                if (Math.random() < 1/3) {logMessage(zaladouras[Math.floor(Math.random() * zaladouras.length)],'britalic');}
                player.hp = Math.round(getPlayerMaxHp() * 0.10);
                
                createFloatingText('player-hp-parent', "ΝΙΚΗ", "#ffd700");
                
                checkLevelUp();
                saveGame();
                updateUI();
                return; // Σταματάει η εκτέλεση εδώ, δεν πάει σε επόμενο τέρας
            } else {
                // Αν έχει ήδη νικηθεί στο παρελθόν, τυπώνεται απλό μήνυμα και η μάχη συνεχίζεται κανονικά
               //  logMessage("Ξαναξεπαστρέψες τον Θεό Κόνανο, αλλά η δόξα σου ως ΘΕΟΣΦΑΧΤΗΣ είναι ήδη γραμμένη στην ιστορία.", "victory");
            }
        }
            // ----------------------------------
          
            // Υπολογισμός χρυσού με bonus για τα μη-normal τέρατα
            let gainedGold = rollGoldForLevel(monster.level);

            if (monster.variant !== 'normal') {
                gainedGold *= 1;
            }

            player.gold += gainedGold;
            sessionGold += gainedGold;
            player.totalGoldGained += gainedGold;
   
            logMessage(`+${formatNumber(gainedGold)} GP`, 'victory');
            createFloatingText('stat-gold-box', `+${formatNumber(gainedGold)}g`, "var(--accent-gold)");

        //ta variants me o dynamic difficulty system den pairnoun perissotera edw - pairnoun apo to diff - ektos an einai kleisto to dynamic
            let xpMultiplier =
                monster.variant === 'legendary' ? 2 :
                monster.variant !== 'normal' ? 1.5 :
                1;
            let gainedXp = Math.round(
                getMonsterXpReward(monster.level) * xpMultiplier
                );

            player.xp += gainedXp;
            sessionXp += gainedXp;
            logMessage(`+${formatNumber(gainedXp)} XP`, 'victory');
            createFloatingText('xp-parent', `+${formatNumber(gainedXp)} XP`, "var(--accent-gold)");

            
            // weaponchances
            let weaponChance  = (monster.variant === 'weapon') ? 1.00 : 0.000;
            let armorChance  = (monster.variant === 'armor') ? 1.00 : 0.000;
            let magicChance  = (monster.variant === 'magic') ? 1.00 : 0.000;

            // Legendary: 100% drop, στον τύπο που ορίστηκε τυχαία στη γέννηση του τέρατος
            if (monster.variant === 'legendary') {
                const lootType = monster.lootType || 'weapon'; // ασφάλεια, δεν θα έπρεπε να χρειαστεί
                weaponChance = (lootType === 'weapon') ? 1.00 : 0.000;
                armorChance  = (lootType === 'armor') ? 1.00 : 0.000;
                magicChance  = (lootType === 'magic') ? 1.00 : 0.000;
            }

            
            let rolledPower = monster.level;
            let droppedSomething = false;

            rolledPower = rollItemTier(monster.level);
            
            // Πρώτα βάθη (1-3): εγγυημένο ελάχιστο drop tier +1 για ειδικά (variant) τέρατα,
            // ώστε το ήδη-εγγυημένο 100% drop chance να μεταφράζεται σε πραγματικό upgrade
            // και όχι σε άχρηστο drop που απλά πουλιέται.

       //     if (monster.variant !== 'normal' && monster.level <= 3) {
       //         rolledPower = Math.max(rolledPower, monster.level + 1);
       //     }

            // Cap: ο παίκτης δεν μπορεί να εξοπλίσει item πάνω από level+5 του ίδιου.
            // Αν το roll ξεπερνάει το cap, δεν υποβαθμίζεται - πουλιέται κατευθείαν
            // στην κανονική τιμή πώλησης του rolled tier (χωρίς να ελεγχθεί αν κάνει upgrade).
            // SWITCH - afinoume anoixto to eq upgrade pros to paron.
            let levelCap = player.level + 100;
            let forceSell = rolledPower > levelCap;

            if (Math.random() < weaponChance) handleEquipmentDrop('weapon', rolledPower, monster, forceSell);
            if (Math.random() < armorChance) handleEquipmentDrop('armor', rolledPower, monster, forceSell);
            if (Math.random() < magicChance) handleEquipmentDrop('magic', rolledPower, monster, forceSell);

            if (droppedSomething) { triggerSmoothTransition('#3e3200'); }

            checkLevelUp();

            saveGame();
            if (outcome === 'victory') {
                if (isAttemptingRetreat) {

                    document.getElementById('monster-hp-bar').classList.add('monster-death');

                    if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
                    inCombat = false;
                    monster = null;
                    isAttemptingRetreat = false;

                                // ← ΝΕΟ: 2 γραμμές εδώ
                    const huntBtnEarly = document.getElementById("btn-hunt-retreat");
                    if (huntBtnEarly) huntBtnEarly.disabled = true;


                    setTimeout(() => {

                        document.getElementById('monster-hp-bar').classList.remove('monster-death');

                        generateAreaModifiers();
                        refreshAreaSelectorAppearance();    

                        startTownRegen();
                        document.getElementById('town-interface').classList.remove('hidden');
                        document.getElementById('combat-interface').classList.add('hidden');
                        
                        logMessage(`Επέστρεψες κουρασμένος στον Τεκέ του Ζαλαδούρα. Ξεπαστρέψες ${currentRunKills} εχθρούς σε αυτή την έξοδο. Ρίχνεις έναν υπνάκο...`, 'retreat');
                        if (currentSelectedLevel >= player.level && currentRunKills > player.bestKillStreak) {
                            player.bestKillStreak = currentRunKills;
                        }

                        currentRunKills = 0; // Μηδενισμός μετά την αναφορά
                        logMessage("Η κομπανία παίζει «" + randomTekeSong() + "».");
                        if (Math.random() < 1/3) {logMessage(zaladouras[Math.floor(Math.random() * zaladouras.length)],'britalic');}
                        player.hp = Math.round(getPlayerMaxHp() * 0.10);
                        // --- ΠΡΟΣΘΗΚΗ FLOATING TEXT ΚΑΤΑ ΤΗΝ ΥΠΟΧΩΡΗΣΗ ---
                        createFloatingText('player-hp-parent', "ΥΠΟΧΩΡΗΣΗ", "#00d2ff");
                        retreatSound();
                        triggerSmoothTransition('#1a2742');
                        
                        updateUI();
                        const huntBtn = document.getElementById("btn-hunt-retreat");
                            huntBtn.disabled = true;
                            setTimeout(() => {
                                huntBtn.disabled = false;
                            }, 4000);

                    }, 500);

                    return;
                }
                else {
                    waitingForNextMonster = true;
                    monster = null;
                    
                    logMessage("Περιπλανιέσαι στο λαβύρινθο...", "system");
                    updateUI();

                    if (nextMonsterTimeoutId) clearTimeout(nextMonsterTimeoutId);
                    nextMonsterTimeoutId = setTimeout(() => {
                        nextMonsterTimeoutId = null;

                        // ΣΗΜΑΝΤΙΚΟ: αν στο μεταξύ έγινε retreat (forceRetreat) ή ξεκίνησε
                        // εντελώς νέο hunt, το waitingForNextMonster δεν θα είναι πια true
                        // εδώ (η forceRetreat/enterCombatFromSelector το μηδενίζουν).
                        // Χωρίς αυτό το check, ένα "ορφανό" timeout από τον προηγούμενο
                        // κύκλο μπορεί να κάνει spawn τέρας μέσα στο νέο/τεκέ context.
                        if (!inCombat || !waitingForNextMonster) return;

                        waitingForNextMonster = false;

                        spawnMonster();
                        //  logMessage(`Εμφανίζεται: ${getMonsterDisplayName(monster)}!`, "system");
                        updateUI();

                        // RESET: το ρολόι της μάχης ξεκινά ξανά από το spawn,
                        // ώστε το τέρας να έχει πάντα 2 πλήρη δευτ. πριν τον πρώτο γύρο
                        if (combatInterval) clearInterval(combatInterval);
                        combatInterval = setInterval(executeCombatRound, effTick());
                    }, effTick());
                }
            }
            updateUI();

            if (outcome === 'mutual_death') {
                if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
                inCombat = false;
                applyDefeatPenalties();
                
            }
        } else {
            if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
            inCombat = false;

            if (outcome === 'defeat') {
                applyDefeatPenalties();
            } else if (outcome === 'retreat') {
                
                generateAreaModifiers();
                refreshAreaSelectorAppearance();

                startTownRegen();
                saveGame();
                document.getElementById('town-interface').classList.remove('hidden');
                document.getElementById('combat-interface').classList.add('hidden');
                updateUI();
            }
        }
    }

function applyDefeatPenalties() {
    generateAreaModifiers();
    refreshAreaSelectorAppearance();
    logMessage(
        `Σκοτώθηκες! Έχασες ${formatNumber(player.gold)} GP και μεταφέρθηκες στον τεκέ με 1 HP.`,
        'monster');
    player.goldLost += player.gold;
    player.gold = 0;
    player.hp = 1;

   // Απενεργοποίηση του κουμπιού ΣΦΑΞΕ για 4''
    const huntBtn = document.getElementById("btn-hunt-retreat");
    huntBtn.disabled = true;

    setTimeout(() => {
        huntBtn.disabled = false;
    }, 4000);

    // xasimo eksoplismou
    const slots = ['weapon', 'armor', 'magic'];
    const lostSlot = slots[Math.floor(Math.random() * slots.length)];

    const slotNames = {
        weapon: "Το όπλο",
        armor: "Η θωράκιση",
        magic: "Το φυλαχτό"
    };
       
    currentRunKills = 0;
    player.deaths++;

    // Καταμέτρηση θανάτων ανά "χρώμα" τέρατος (κόκκινο=weapon, μπλε=armor, μωβ=magic).
    // Τα legendary τέρατα δεν έχουν δικό τους variant χρώματος, αλλά ανήκουν σε τύπο
    // μέσω του monster.lootType (weapon/armor/magic) - το χρησιμοποιούμε κι εκεί.
    const deathColorType = (monster.variant === 'weapon' || monster.variant === 'armor' || monster.variant === 'magic')
        ? monster.variant
        : (monster.variant === 'legendary' ? monster.lootType : null);

    if (deathColorType === 'weapon') player.deathsWeapon++;
    else if (deathColorType === 'armor') player.deathsArmor++;
    else if (deathColorType === 'magic') player.deathsMagic++;

    if (player.ironman) {
        player.ironmanDead = true;
        const killerName = getMonsterDisplayName(monster);
        const deathDepth = monster.level;
        logMessage(`ΥΣΤΑΤΗ ΠΝΟΗ: ${player.name}, επίπεδο ${player.level}, σκοτώθηκε στο βάθος ${deathDepth} από ${killerName}.`, 'monster');
        saveIronmanHighscore({
            name: player.name,
            level: player.level,
            depth: deathDepth,
            killer: killerName,
            weapon: player.weapon.power,
            armor: player.armor.power,
            magic: player.magic.power,
            date: Date.now()
        });
    }

    if (player[lostSlot].power > 1) {
        const oldPower = player[lostSlot].power;
        const rawLoss = rollDeathPenaltyAmount();
        // δεν πάει κάτω από 1
        const actualLoss = Math.min(rawLoss, oldPower - 1);

        player[lostSlot].power -= actualLoss;
     
     //τα αντικείμενα απλα πέφτουν τιερ
        //   if (!player[lostSlot].legendary) {
     //       player[lostSlot].name = getItemName(lostSlot, player[lostSlot].power);
     //   }

        logMessage(
            `${slotNames[lostSlot]} σου φθείρεται: (T${oldPower} → T${player[lostSlot].power})`,
            'monster'
        );
    }
        
        logMessage("Η κομπανία παίζει «" + randomTekeSong() + "».");
        if (Math.random() < 1/3) {logMessage(zaladouras[Math.floor(Math.random() * zaladouras.length)],'britalic');}

    triggerSmoothTransition('#4a1515');

    resetCooldowns();
    startTownRegen();

    saveGame();
    document.getElementById('town-interface').classList.remove('hidden');
    document.getElementById('combat-interface').classList.add('hidden');
    updateUI();
}

    function usePotion() {
        if (potionCooldownActive) return;
            if (!inCombat) {
        logMessage("Δεν μπορείς να πιεις μπύρα στον τεκέ.", 'system');
        return;
            }
        
        let maxHp = getPlayerMaxHp();
        if (player.hp >= maxHp) {
            logMessage("Η υγεία είναι ήδη πλήρης.", 'system');
            return;
        }

        let pct = Math.floor(Math.random() * 41) + 10; 
        let heal = Math.round(maxHp * (pct / 100));
        player.hp = Math.min(maxHp, player.hp + heal);
        logMessage(`Έσφιξες μια μπύρα για +${formatNumber(heal)} HP! (Αναπλήρωση: ${pct}%).`, 'player');
        potionSound();
        flashSkillButton("btn-potion");
        player.beersDrunk += 0.5;

        createFloatingText('player-hp-parent', `+${formatNumber(heal)} HP`, "var(--hp-player)");
        flashHpBarHeal('player-hp-parent');

        potionCooldownActive = true;
        potionCdStart = Date.now();
        potionCdTimer = setTimeout(() => { potionCooldownActive = false; updateUI(); }, effCD());

        saveGame();
        updateUI();
    }

    cooldownLoop();

    window.addEventListener('keydown', (event) => {

    // αν γράφεις όνομα, μη γίνονται hotkeys
    const active = document.activeElement;

    if (
        active &&
        (
            active.tagName === 'INPUT' ||
            active.tagName === 'TEXTAREA' ||
            active.isContentEditable
        )
    ) {
        return;
    }

    const code = event.code;
    const key = event.key;

    // ENTER = Σφάξε / Υποχώρηση
    if (
        code === 'Enter' ||
        code === 'NumpadEnter' ||
        key === 'Enter'
    ) {
        event.preventDefault();

        if (!inCombat)
            enterCombatFromSelector();
        else
            toggleRetreat();

        return;
    }

    // 0 = Υποχώρηση
    if (
        code === 'Digit0' ||
        code === 'Numpad0' ||
        key === '0'
    ) {
        event.preventDefault();

        if (inCombat)
            toggleRetreat();

        return;
    }

    // 4 = Κατραπακιά
    if (
        code === 'Digit4' ||
        code === 'Numpad4' ||
        key === '4'
    ) {
        event.preventDefault();
        queueSpecialAttack();
        return;
    }

    // 5 = Εκτέλεση
    if (
        code === 'Digit5' ||
        code === 'Numpad5' ||
        key === '5'
    ) {
        event.preventDefault();
        queuePreciseStrike();
        return;
    }

    // 6 = Μπύρα
    if (
        code === 'Digit6' ||
        code === 'Numpad6' ||
        key === '6'
    ) {
        event.preventDefault();
        usePotion();
        return;
    }

    // τα παρακάτω μόνο εκτός μάχης
    if (inCombat) return;

    // επόμενο επίπεδο
// επόμενο επίπεδο
if (
    code === 'Digit2' ||
    code === 'Numpad2' ||
    key === '2'
) {

    event.preventDefault();

    const selector = document.getElementById('area-selector');

    if (selector.selectedIndex < selector.options.length - 1) {
        selector.selectedIndex++;
        currentSelectedLevel = parseFloat(selector.value);
        
        // ΠΡΟΣΘΗΚΗ: Ενημέρωση του χρώματος της μπάρας
        updateSelectorColor(selector);

        saveGame();
        updateUI();
    }

    return;
}

    // προηγούμενο επίπεδο
    // προηγούμενο επίπεδο
if (
    code === 'Digit8' ||
    code === 'Numpad8' ||
    key === '8'
) {

    event.preventDefault();

    const selector = document.getElementById('area-selector');

    if (selector.selectedIndex > 0) {
        selector.selectedIndex--;
        currentSelectedLevel = parseFloat(selector.value);

        // ΠΡΟΣΘΗΚΗ: Ενημέρωση του χρώματος της μπάρας
        updateSelectorColor(selector);

        saveGame();
        updateUI();
    }

    return;
}

});
</script>
