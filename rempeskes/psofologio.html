<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ψοφολόγιο — Ρεμπεσκές</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:wght@400;700&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #120e0a;
        --ledger: #1b160f;
        --ledger-line: #35291a;
        --parchment: #d9c9a0;
        --parchment-dim: #9c8c6a;
        --brass: #c9a227;
        --wine: #7c2430;
        --wine-bright: #a8394a;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        background:
            radial-gradient(ellipse at top, #201911 0%, var(--bg) 55%),
            repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
        color: var(--parchment);
        font-family: 'PT Serif', serif;
        font-size: 18px; /* Αυξήθηκε από 16px */
        line-height: 1.6;  /* Αυξήθηκε ελαφρώς για καλύτερη ροή */
        display: flex;
        justify-content: center;
        padding: 40px 16px 80px;
    }

    #book {
        width: 100%;
        max-width: 680px; /* Αυξήθηκε ελαφρώς για να χωράει τα μεγαλύτερα γράμματα */
    }

    header {
        text-align: center;
        margin-bottom: 8px;
        border-bottom: 1px double var(--ledger-line);
        padding-bottom: 18px;
    }

    header .eyebrow {
        letter-spacing: 4px;
        font-size: 0.75rem; /* Αυξήθηκε από 0.65rem */
        color: var(--parchment-dim);
        text-transform: uppercase;
    }

    header h1 {
        font-family: 'Old Standard TT', serif;
        font-size: 3rem; /* Αυξήθηκε από 2.6rem */
        letter-spacing: 3px;
        margin: 6px 0 2px;
        color: var(--brass);
        text-shadow: 0 0 18px rgba(201,162,39,0.25);
    }

    header p.sub {
        font-style: italic;
        color: var(--parchment-dim);
        margin: 0;
        font-size: 0.95rem; /* Αυξήθηκε από 0.85rem */
    }

    #tally {
        display: flex;
        justify-content: center;
        gap: 28px;
        margin: 20px 0 30px;
        font-size: 0.9rem; /* Αυξήθηκε από 0.8rem */
        color: var(--parchment-dim);
    }

    #tally strong {
        display: block;
        font-family: 'Old Standard TT', serif;
        font-size: 1.8rem; /* Αυξήθηκε από 1.6rem */
        color: var(--brass);
    }

    #entries { display: flex; flex-direction: column; gap: 0; }

    .entry {
        position: relative;
        padding: 18px 14px 18px 60px; /* Προσαρμογή padding για τα μεγαλύτερα στοιχεία */
        border-bottom: 1px solid var(--ledger-line);
    }

    .entry:first-child .rank-badge { background: var(--wine-bright); }

    .rank-badge {
        position: absolute;
        left: 10px;
        top: 18px;
        width: 36px;  /* Αυξήθηκε από 32px */
        height: 36px; /* Αυξήθηκε από 32px */
        border-radius: 50%;
        background: var(--wine);
        color: var(--parchment);
        font-family: 'Old Standard TT', serif;
        font-size: 1.05rem; /* Αυξήθηκε από 0.95rem */
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(0,0,0,0.4);
    }

    .entry .line1 {
        font-size: 1.1rem; /* Αυξήθηκε από 1rem */
        color: var(--parchment);
    }

    .entry .name {
        font-family: 'Old Standard TT', serif;
        font-size: 1.4rem; /* Αυξήθηκε από 1.25rem */
        color: var(--brass);
        letter-spacing: 0.5px;
    }

    .entry .line2 {
        font-size: 0.95rem; /* Σημαντική αύξηση από 0.78rem για τις λεπτομέρειες */
        color: var(--parchment-dim);
        margin-top: 6px;
        line-height: 1.5;
    }

    .entry .gear {
        color: var(--parchment-dim);
        font-size: 0.85rem; /* Αυξήθηκε από 0.75rem */
    }

    .entry.victory {
        background: linear-gradient(90deg, rgba(201,162,39,0.10), transparent 70%);
        border-bottom: 1px solid var(--brass);
    }

    .entry.victory .rank-badge {
        background: var(--brass);
        color: #1b160f;
        box-shadow: 0 0 10px rgba(201,162,39,0.6);
    }

    .entry.victory .name {
        color: var(--brass);
        text-shadow: 0 0 8px rgba(201,162,39,0.6);
    }

    .entry.victory .line1::after {
        content: " ★ ΘΕΟΣΦΑΧΤΗΣ";
        color: var(--brass);
        font-size: 0.8rem;
        letter-spacing: 1px;
    }

    .entry.dead {
        background: linear-gradient(90deg, rgba(160,40,40,0.10), transparent 70%);
        border-bottom: 1px solid #8b2020;
    }

    .entry.dead .rank-badge {
        background: #8b2020;
        color: var(--parchment);
    }

    .entry.alive {
        background: linear-gradient(90deg, rgba(40,140,60,0.10), transparent 70%);
        border-bottom: 1px solid #2d8b3a;
    }

    .entry.alive .rank-badge {
        background: #2d8b3a;
        color: var(--parchment);
    }

    #victors-heading {
        text-align: center;
        font-family: 'Old Standard TT', serif;
        color: var(--brass);
        letter-spacing: 2px;
        margin: 30px 0 10px;
        font-size: 1.1rem;
        text-transform: uppercase;
        border-bottom: 1px double var(--ledger-line);
        padding-bottom: 8px;
    }

    #empty, #err {
        text-align: center;
        color: var(--parchment-dim);
        font-style: italic;
        padding: 40px 10px;
        font-size: 1.1rem;
    }

    #tab-bar {
        display: flex;
        justify-content: center;
        gap: 4px;
        margin: 0 0 24px;
    }
    .tab-btn {
        background: transparent;
        border: 1px solid var(--ledger-line);
        color: var(--parchment-dim);
        font-family: 'PT Serif', serif;
        font-size: 0.9rem;
        padding: 6px 22px;
        cursor: pointer;
        transition: all 0.2s;
        border-radius: 2px;
    }
    .tab-btn:hover {
        border-color: var(--brass);
        color: var(--parchment);
    }
    .tab-btn.active {
        background: var(--brass);
        color: #1b160f;
        border-color: var(--brass);
    }

    footer {
        text-align: center;
        margin-top: 40px;
        font-size: 0.75rem; /* Αυξήθηκε από 0.68rem */
        color: var(--ledger-line);
        letter-spacing: 1px;
    }

    @media (max-width: 420px) {
        header h1 { font-size: 2.4rem; }
        .entry { padding-left: 54px; }
    }
</style>
</head>
<body>

<div id="book">
    <header>
        <div class="eyebrow">Ο Τεκές του Ζαλαδούρα</div>
        <h1>ΡΕΜΠΕΣΚΕΔΕΣ</h1>
        <p class="sub">που αραδιάζουν ανοησίες για το πόπολο</p>
    </header>

    <div id="tab-bar">
        <button class="tab-btn active" data-tab="normal">Normal</button>
        <button class="tab-btn" data-tab="ironmen">Ironmen</button>
        <button class="tab-btn" data-tab="cyborg-normal">[K] Normal</button>
        <button class="tab-btn" data-tab="cyborg-ironmen">[K] Ironmen</button>
    </div>

    <div id="tally"></div>
    <div id="entries"></div>
    <div id="entries-ironmen" style="display:none;"></div>
    <div id="entries-k-normal" style="display:none;"></div>
    <div id="entries-k-ironmen" style="display:none;"></div>
    <div id="empty" style="display:none;">Το κατάστιχο είναι άδειο...</div>
    <div id="err" style="display:none;">Δεν κατάφερα να διαβάσω το κατάστιχο αυτή τη στιγμή.</div>

    <footer>ΡΕΜΠΕΣΚΕΣ &middot; ενημερώνεται ζωντανά από τον ίδιο το Ζαλαδούρα.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://khdovgrolpyblnymfoty.supabase.co";
const SUPABASE_KEY = "sb_publishable_GZ8VgQ9QFWRs-PKwQjByrQ_4dRFSDne";

const depthNames = [
    "[1] Συντρίμμια", "[2] Γκρεμισμένα Προπύλαια", "[3] Ο Κοβαλώνας", "[4] Καταφύγιο", "[5] Πλημμυρισμένη Στοά",
    "[6] Το Άσυλο", "[7] Θάλαμοι", "[8] Μνημούρια", "[9] Σφηκοφωλιές", "[10] Λημέρι του Τελώνη",
    "[11] Άντρο του Δερβίση", "[12] Περάσματα", "[13] Κρησφύγετο", "[14] Σμερδότρυπες", "[15] Μεγασπήλαιον",
    "[16] Λασπομέρος", "[17] Κυνοτροφείο", "[18] Μνημούρια", "[19] Οφεώνας", "[20] Λαγούμια",
    "[21] Υπόνομος", "[22] Βάραθρο", "[23] Δρασκέλα", "[24] Μπουγαροφωλιές", "[25] Ερπετοθάλαμοι",
    "[26] Φιδοσπηλιά", "[27] Αρουρίδα", "[28] Υπόγειο Ρέμα", "[29] Μαύρο Χάσμα", "[30] Κατσαριδοφωλιές",
    "[31] Κατακόμβες", "[32] Ιερατείο", "[33] Σκουλκατόριο", "[34] Σπουδαστήριο", "[35] Σκορποχώρι",
    "[36] Σαρκοφάγοι", "[37] Ογριανή", "[38] Τάφοι των Ξωτικών", "[39] Κελιά", "[40] Μολυσμένες Κρύπτες",
    "[41] Η Λεωφόρος", "[42] Φενακίδα", "[43] Φρουραρχείο", "[44] Σταυροδρόμια", "[45] Μεδουσιανή",
    "[46] Βουκολέων", "[47] Μαύρη Αλέα", "[48] Αγορά των Νεκρών", "[49] Φθαρμένες Αψίδες", "[50] Μαύρο Παλάτι",
    "[51] Καταβόθρες", "[52] Περάσματα", "[53] Αδιέξοδα", "[54] Υποβρύχιοι Διάδρομοι", "[55] Μουσείο",
    "[56] Κήπος Αγαλμάτων", "[57] Αρένα", "[58] Παγίδες", "[59] Κέντακλο", "[60] Καθρέφτες",
    "[61] Στοά του Δούκα", "[62] Εκκλησίασμα", "[63] Μαύρη Πύλη", "[64] Πυραμίδα", "[65] Άδυτον",
    "[66] Βεστιάριο", "[67] Εικονοστάσια", "[68] Μαύρο Ιερό", "[69] Τύμβος των Οστών", "[70] Ναός των Οστών",
    "[71] Βασαλτική Πύλη", "[72] Ο Θόλος της Στρίγγλας", "[73] Δρακοντική Αυλή", "[74] Βασαλτικές Αψίδες", "[75] Στοά του Ιφρίτη",
    "[76] Αβυσσάλειο", "[77] Μέγα Παλάτιο", "[78] Βασαλτική Πόλη", "[79] Εχιδναϊκή Λεωφόρος", "[80] Μεταλλουργείο",
    "[81] Πύλες της Νερτερίας", "[82] Αχέρων", "[83] Κωκυτός", "[84] Φλεγέθων", "[85] Στυξ",
    "[86] Λήθη", "[87] Νερτέρα Χθων", "[88] Χαρόντειο Μέλαθρον", "[89] Πύλη της Αβύσσου", "[90] Άβυσσος",
    "[91] Καταβύθιση", "[92] Άχρονα Πεδία", "[93] Παγωμένη Άβυσσος", "[94] Πυρωμένη Άβυσσος", "[95] Εξώτερος Πυρήν",
    "[96] Εσώτερος Πυρήν", "[97] Κόλαση", "[98] Αληθής Κόλαση", "[99] Εκτυφλωτικά Πεδία", "[100] Προγενής Γνόφος"
];

function depthLabel(d) {
    return depthNames[d - 1] || `Βάθος ${d}`;
}

function romanish(n) {
    return `${n}`;
}

function formatScore(n) {
    return Number(n).toLocaleString('el-GR');
}

function renderEntry(s, i, isVictory) {
    const d = new Date(s.death_date);
    const formattedDate = d.toLocaleDateString('el-GR');
    const isAlive = !s.killer;
    const turnsStr = s.turns ? formatScore(s.turns) : '';
    let detailLine;
    if (isVictory) {
        detailLine = `Νίκησε τον θεό Κόνανο στο ${escapeHtml(depthLabel(s.depth))}, το γυρο ${turnsStr} &middot; ${formattedDate}`;
    } else if (isAlive) {
        detailLine = `Ζωντανός στο ${escapeHtml(depthLabel(s.depth))}, γυρος ${turnsStr} &middot; ${formattedDate}`;
    } else {
        detailLine = `Σκοτώθηκε στο <em>${escapeHtml(depthLabel(s.depth))}</em>, από ${escapeHtml(s.killer)}, το γυρο ${turnsStr} &middot; ${formattedDate}`;
    }
    return `
        <div class="entry${isVictory ? ' victory' : isAlive ? ' alive' : ' dead'}">
            <div class="rank-badge">${romanish(i + 1)}</div>
            <div class="line1"><span class="name">${escapeHtml(s.name)}</span> — επίπεδο ${s.level}</div>
            <div class="line2">
                ${detailLine}
                <br>
                <span class="gear">εξοπλισμός: ${s.weapon} / ${s.armor} / ${s.magic} — Μαγκιά: ${formatScore(s.score ?? 0)}</span>
            </div>
        </div>
    `;
}

function renderTabContent(data, entriesEl) {
    const victors = data.filter(s => s.victory);
    const alive = data.filter(s => !s.victory && !s.killer);
    const deaths = data.filter(s => !s.victory && s.killer);
    let html = '';
    if (victors.length > 0) {
        html += `<div id="victors-heading">Θεοσφάχτες</div>`;
        html += victors.map((s, i) => renderEntry(s, i, true)).join('');
    }
    if (alive.length > 0) {
        if (victors.length > 0) {
            html += `<div id="victors-heading">Ζωντανοί</div>`;
        }
        html += alive.map((s, i) => renderEntry(s, i, false)).join('');
    }
    if (deaths.length > 0) {
        if (victors.length > 0 || alive.length > 0) {
            html += `<div id="victors-heading">Ψοφολόγιον</div>`;
        }
        html += deaths.map((s, i) => renderEntry(s, i, false)).join('');
    }
    entriesEl.innerHTML = html || '<div style="text-align:center;color:var(--parchment-dim);font-style:italic;padding:40px 10px;font-size:1.1rem;">Το κατάστιχο είναι άδειο...</div>';
}

let normalData = [];
let ironmenData = [];
let kNormalData = [];
let kIronmenData = [];

function switchTab(tab) {
    document.getElementById('entries').style.display = tab === 'normal' ? '' : 'none';
    document.getElementById('entries-ironmen').style.display = tab === 'ironmen' ? '' : 'none';
    document.getElementById('entries-k-normal').style.display = tab === 'cyborg-normal' ? '' : 'none';
    document.getElementById('entries-k-ironmen').style.display = tab === 'cyborg-ironmen' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
    const data = tab === 'normal' ? normalData : tab === 'ironmen' ? ironmenData : tab === 'cyborg-normal' ? kNormalData : kIronmenData;
    const victors = data.filter(s => s.victory);
    const alive = data.filter(s => !s.victory && !s.killer);
    const deaths = data.filter(s => !s.victory && s.killer);
    const topScore = data.length > 0 ? Math.max(...data.map(s => s.score ?? 0)) : 0;
    const deathMaxScore = deaths.length > 0 ? Math.max(...deaths.map(s => s.score ?? 0)) : 0;
    const victorMaxScore = victors.length > 0 ? Math.max(...victors.map(s => s.score ?? 0)) : 0;
    const aliveMaxScore = alive.length > 0 ? Math.max(...alive.map(s => s.score ?? 0)) : 0;
    document.getElementById('tally').innerHTML = `
        <div><strong>${deaths.length}</strong>νεκροί ${deaths.length > 0 ? `<span style="font-size:0.7em;opacity:0.7">(${formatScore(deathMaxScore)})</span>` : ''}</div>
        <div><strong>${victors.length}</strong>θεοσφάχτες ${victors.length > 0 ? `<span style="font-size:0.7em;opacity:0.7">(${formatScore(victorMaxScore)})</span>` : ''}</div>
        <div><strong>${alive.length}</strong>ζωντανοί ${alive.length > 0 ? `<span style="font-size:0.7em;opacity:0.7">(${formatScore(aliveMaxScore)})</span>` : ''}</div>
        <div><strong>${formatScore(topScore)}</strong>μέγιστη μαγκιά</div>
    `;
}

async function load() {
    const entriesEl = document.getElementById('entries');
    const errEl = document.getElementById('err');

    let client;
    try {
        client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch (e) {
        errEl.style.display = 'block';
        return;
    }

    const { data, error } = await client
        .from('ironman_deaths')
        .select('*')
        .order('score', { ascending: false })
        .order('level', { ascending: false })
        .order('death_date', { ascending: false });

    if (error) {
        console.error(error);
        errEl.style.display = 'block';
        return;
    }

    if (!data || data.length === 0) {
        document.getElementById('empty').style.display = 'block';
        return;
    }

    const deduped = deduplicate(data);
    if (deduped.length === 0) {
        document.getElementById('empty').style.display = 'block';
        return;
    }

    deduped.sort((a, b) => (b.score ?? 0) - (a.score ?? 0) || (b.level ?? 0) - (a.level ?? 0));

    const isK = n => n.name.startsWith('[K]') || n.name.startsWith('[Κ]');
    const isIronman = n => n.ironman === true;
    normalData = deduped.filter(s => !isIronman(s) && !isK(s));
    ironmenData = deduped.filter(s => isIronman(s) && !isK(s));
    kNormalData = deduped.filter(s => !isIronman(s) && isK(s));
    kIronmenData = deduped.filter(s => isIronman(s) && isK(s));

    renderTabContent(normalData, entriesEl);
    renderTabContent(ironmenData, document.getElementById('entries-ironmen'));
    renderTabContent(kNormalData, document.getElementById('entries-k-normal'));
    renderTabContent(kIronmenData, document.getElementById('entries-k-ironmen'));

    switchTab('normal');

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
}

function deduplicate(arr) {
    const seen = new Map();
    for (const entry of arr) {
        const name = entry.name;
        if (seen.has(name)) {
            const existing = seen.get(name);
            const replace = (entry.score ?? 0) > (existing.score ?? 0) ||
                ((entry.score ?? 0) === (existing.score ?? 0) && entry.level > existing.level) ||
                ((entry.score ?? 0) === (existing.score ?? 0) && entry.level === existing.level && new Date(entry.death_date) > new Date(existing.death_date));
            if (replace) {
                seen.set(name, entry);
            }
        } else {
            seen.set(name, entry);
        }
    }
    return Array.from(seen.values());
}

load();
</script>
</body>
</html>
