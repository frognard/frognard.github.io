<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κάθαρμα v62</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-gold: #ffd700;
            --hp-player: #2ecc71;
            --hp-monster: #e74c3c;
            --border-color: #333333;
            --skill-blue: #3498db;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #game-container {
            width: 100%;
            max-width: 650px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            transition: background-color 3s ease;
        }

        h2, h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .header-row h3 {
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .editable-name {
            border-bottom: 1px dashed var(--accent-gold);
            cursor: pointer;
            padding: 0 4px;
        }
        .editable-name:focus {
            outline: none;
            background-color: #2a2a2a;
            border-bottom: 1px solid var(--accent-gold);
        }

        .xp-wrapper-area {
            position: relative;
            margin: -2px 0 15px 0;
        }

        .rates-row{
            display:flex;
            justify-content:flex-end;
            gap:4px;
            margin-top:-10px;
            margin-bottom:12px;
        }

        .rates-row input{
            width:70px;
            font-size:11px;
        }

        .reset-rates-btn{
            padding:2px 6px;
        }

        .xp-bar-container {
            background-color: #333;
            width: 100%;
            height: 6px;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        #p-xp-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent-gold);
            transition: width 0.2s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            margin-bottom: 5px;
            font-size: 0.95rem;
            align-items: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #171717;
            padding: 4px 8px;
            border: 1px solid #252525;
            border-radius: 3px;
            position: relative;
        }

        .inline-upgrade-btn {
            background-color: #2a2a2a;
            color: var(--accent-gold);
            border: 1px solid #444;
            padding: 8px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 2px;
            font-family: inherit;
            transition: all 0.2s;
            margin-left: 10px;
        }
        .inline-upgrade-btn:hover:not(:disabled) {
            background-color: #3a3a3a;
            border-color: var(--accent-gold);
        }
        .inline-upgrade-btn:disabled {
            color: var(--text-muted);
            border-color: #222;
            background-color: #1a1a1a;
            cursor: not-allowed;
            opacity: 0.4;
        }

        .gold { color: var(--accent-gold); font-weight: bold; }

        .cooldown-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .cd-action-cell {
            display: flex;
            align-items: center;
            gap: 8px; /* Κενό μεταξύ μπάρας, κουμπιού και κειμένου */
            width: 100%;
        }
        .cd-action-cell .cd-wrapper { flex: none; width: 60px }
        .cd-action-cell button { margin-left: 0; flex-shrink: 0; }

        .bar-container {
            background-color: #333;
            width: 100%;
            height: 20px;
            border-radius: 3px;
            overflow: visible;
            margin: 5px 0 15px 0;
            position: relative;
        }

        .bar {
            height: 100%;
            width: 100%;
            transition: width 0.2s ease;
            border-radius: 3px;
        }

        #player-hp-bar { background-color: var(--hp-player); }
        #monster-hp-bar { background-color: var(--hp-monster); }

        .bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            left: 0;
            font-size: 0.85rem;
            line-height: 20px;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        .cd-wrapper {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        .cd-inner {
            height: 100%;
            width: 100%;
            background-color: #6ec6ff;
            transition: width 0.1s linear;
}
        .cd-inner.active {
            background-color: var(--hp-monster);
        }

        #log {
            height: 160px;
            border: 1px solid var(--border-color);
            background-color: #0a0a0a;
            padding: 10px;
            overflow-y: auto;
            font-size: 0.85rem;
            margin-bottom: 15px;
            border-radius: 3px;
        }

        .log-entry { margin-bottom: 4px; }
        .log-player { color: #5dade2; }
        .log-monster { color: #f1948a; }
        .log-system { color: #95a5a6; }
        .log-victory { color: var(--accent-gold); font-weight: bold; }
        .log-retreat { color: #e67e22; font-weight: bold; }

        .area-select-container {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
}

/* Προσθήκη για τη μείωση του ύψους του ίδιου του drop-down κουτιού */
.area-select-container select {
    height: 28px;       /* <-- Μειώνει το συνολικό ύψος του κουτιού (π.χ. από το default ~38px στα 28px) */
    padding: 2px 6px;   /* <-- Μικραίνει το εσωτερικό κενό πάνω-κάτω για να μην κόβεται το κείμενο */
    font-size: 13px;    /* <-- Ελαφρώς πιο συμπαγής γραμματοσειρά για να ταιριάζει με το νέο ύψος */
    line-height: 1;
}

        select {
            background-color: #2a2a2a;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px;
            font-family: inherit;
            border-radius: 3px;
            cursor: pointer;
            max-width: 100%;
        }

        button {
            background-color: #2a2a2a;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: background 0.2s;
            border-radius: 3px;
        }

        button:hover:not(:disabled) {
            background-color: #3a3a3a;
            border-color: #555;
        }

        button:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-delete-save {
            border-color: #c0392b; 
            padding: 4px 8px; 
            font-size: 0.75rem;
            background-color: #1a1a1a;
            color: #e74c3c;
        }
        .btn-delete-save:hover {
            background-color: #c0392b !important;
            color: #fff;
        }

        .hidden { display: none; }
        .hotkey-hint { color: var(--text-muted); font-size: 0.8rem; text-align: right; white-space: nowrap; }

        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 1.15rem;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 1px 1px 3px #000, -1px -1px 3px #000;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            20% { transform: translateY(-12px) scale(1.2); }
            100% { opacity: 1; transform: translateY(-55px) scale(0.85); }
        }

@keyframes monsterDeathFlash {
    0% {
        filter: brightness(1);
        opacity: 1;
    }

    20% {
        filter: brightness(8);
        background: #ffbe0d;
        box-shadow:
            0 0 10px #ffbe0d,
            0 0 25px #ffbe0d,
            0 0 50px #ffbe0d;
    }

    100% {
        filter: brightness(1);
        opacity: 0;
    }
}

.monster-death {
    animation: monsterDeathFlash 0.5s ease-out forwards;
}

.magic-row{
    padding-top: 12px;
    padding-bottom: 12px;
}

@keyframes itemUpgradeFlash {
    0%   { background-color: #171717; }
    50%  {
        background-color: #3a2157;
        box-shadow: 0 0 15px #bb66ff;
    }
    100% { background-color: #171717; }
}


.item-upgrade-flash {
    animation: monsterDeathFlash 0.5s ease-out 2;
}


.skill-queued {
    background-color: #e67e22 !important;
    border-color: #ffb347 !important;
    color: white !important;
}

.label-atk {
    color: #ec6868; /* κόκκινο */
}

.label-def {
    color: #6b9fec; /* γαλάζιο */
}

.label-xp {
    color: #c36ae9; /* μωβ */
}

.label-gold {
    color: #f5d142; /* χρυσό */
}


    </style>
</head>
<body>

<span id="p-name" class="editable-name"

            </div>
            <div class="stat-row" id="stat-def-box">

                <button id="btn-upgrade-armor" class="inline-upgrade-btn" onclick="upgradeEquipment('armor')">Up</button>
            </div>
            <div class="stat-row magic-row" id="stat-magic-box">

        <div class="cooldown-grid">

<div>Άμεσο Πλήγμα:</div>

        id="btn-precise"

        <div class="bar-container" id="monster-hp-parent">
            <div id="monster-hp-bar" class="bar"></div>
            <div id="monster-hp-text" class="bar-text">0 / 0 HP</div>
        </div>
    </div>

                    onclick="resetRates()">↺</button>

<script>


function getPlayerDamageBonus() {
    return (getPlayerAtk() - monster.def) * 0.05;
}
function getMonsterDamageBonus() {
    return (monster.atk - getPlayerDef()) * 0.05;
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let soundEnabled = true;


function monsterDeathSound() {

    if (!soundEnabled) return;


    const now = audioCtx.currentTime;

    [1100, 1650].forEach((freq, i) => {

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";

        osc.frequency.setValueAtTime(freq, now + i * 0.025);

        gain.gain.setValueAtTime(0.5, now + i * 0.025);
        gain.gain.exponentialRampToValueAtTime(
            0.0001,
            now + i * 0.025 + 0.10
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now + i * 0.025);
        osc.stop(now + i * 0.025 + 0.10);

    });

}

function playerDeathSound() {

    if (!soundEnabled) return;


    const now = audioCtx.currentTime;

    const freqs = [180, 120, 70];

    freqs.forEach((freq, i) => {

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";

        const t = now + i * 0.08;

        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(
            freq * 0.6,
            t + 0.18
        );

        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(
            0.0001,
            t + 0.20
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.20);

    });

}

function hitSound() {
    if (!soundEnabled) return;


    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "triangle";

    const now = audioCtx.currentTime;

    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(90, now + 0.04);

    gain.gain.setValueAtTime(0.5, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.05);
}

function specialHitSound() {

    if (!soundEnabled) return;
 

    const now = audioCtx.currentTime;

    // Κύριο χτύπημα
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();

    osc1.type = "triangle";

    osc1.frequency.setValueAtTime(220, now);
    osc1.frequency.exponentialRampToValueAtTime(80, now + 0.08);

    gain1.gain.setValueAtTime(0.6, now);
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);

    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);

    osc1.start(now);
    osc1.stop(now + 0.10);


    // Echo
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    osc2.type = "triangle";

    osc2.frequency.setValueAtTime(160, now + 0.035);
    osc2.frequency.exponentialRampToValueAtTime(70, now + 0.10);

    gain2.gain.setValueAtTime(0.25, now + 0.035);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start(now + 0.035);
    osc2.stop(now + 0.13);

}



function potionSound() {

    if (!soundEnabled) return;
   

    const now = audioCtx.currentTime;

    // Πρώτη φυσαλίδα
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();

    osc1.type = "sine";

    osc1.frequency.setValueAtTime(140, now);
    osc1.frequency.exponentialRampToValueAtTime(240, now + 0.08);

    gain1.gain.setValueAtTime(0.5, now);
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);

    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);

    osc1.start(now);
    osc1.stop(now + 0.10);


    // Δεύτερη φυσαλίδα
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    osc2.type = "sine";

    osc2.frequency.setValueAtTime(180, now + 0.05);
    osc2.frequency.exponentialRampToValueAtTime(320, now + 0.15);

    gain2.gain.setValueAtTime(0.25, now + 0.05);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start(now + 0.05);
    osc2.stop(now + 0.16);

}

function levelUpSound() {

    if (!soundEnabled) return;


    const now = audioCtx.currentTime;

    const notes = [523, 659, 784];

    notes.forEach((freq, i) => {

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";

        const t = now + i * 0.08;

        osc.frequency.setValueAtTime(freq, t);

        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(
            0.0001,
            t + 0.15
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.15);

    });

}


function itemDropSound() {

    if (!soundEnabled) return;


    const now = audioCtx.currentTime;

    const notes = [1400, 2100];

    notes.forEach((freq, i) => {

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";

        const t = now + i * 0.03;

        osc.frequency.setValueAtTime(freq, t);

        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(
            0.0001,
            t + 0.10
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.10);

    });

}

function buyItemSound() {

    if (!soundEnabled) return;


    const now = audioCtx.currentTime;

    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();

    osc1.type = "triangle";

        let arr = type === 'weapon' ? weaponNames : (type === 'armor' ? armorNames : magicNames);

        return `${arr[idx]} `;

    let d6a = Math.floor(Math.random() * 6) + 1;

    let modifier = d6a - d6b; // -5 έως +5
    let tier = monsterLevel + modifier;
    tier = Math.max(1, Math.min(100, tier));
    return tier;
}

    // cost armor kai weapon: ligo pio megalos ek8eths apo to gold gain, giati ta levels megalwnoun se xrono
    function getWeaponUpgradeCost(currentPower) { return Math.round(((Math.pow(currentPower, 1.9)) + 1) * 75 + 0); }
    function getArmorUpgradeCost(currentPower) { return Math.round(((Math.pow(currentPower, 1.9)) + 1) * 75 + 0); }
    
    function getMonsterXpReward(monsterLvl) { return Math.round(10 * Math.pow(monsterLvl, 2)); }

    function createFloatingText(parentId, text, color) {
        const parent = document.getElementById(parentId);
        if (!parent) return;
        
        const fText = document.createElement('div');
        fText.className = 'floating-text';
        fText.innerText = text;
        fText.style.color = color;
        
        const offset = Math.floor(Math.random() * 40) - 20; 
        fText.style.left = `calc(50% + ${offset}px)`;
        fText.style.top = `0px`;
        
        parent.appendChild(fText);
        setTimeout(() => { fText.remove(); }, 1400);
    }

    function loadGame() {
        const savedData = localStorage.getItem('minimal_rpg_save');
        if (savedData) {
            try {
                player = { ...player, ...JSON.parse(savedData) };
                if (!player.name) player.name = "Κάθαρμα";
                player.maxUnlockedLevel = 100;

                player.nextXp = calculateNextXpRequirement(player.level);
                player.weapon.name = getItemName('weapon', player.weapon.power);
                player.armor.name = getItemName('armor', player.armor.power);
                player.magic.name = getItemName('magic', player.magic.power);
                logMessage("Η πρόοδός φορτώθηκε αυτόματα.", 'system');
            } catch (e) {
                logMessage("Σφάλμα κατά τη φόρτωση του save.", 'system');
            }
        }
    }

    function saveGame() { localStorage.setItem('minimal_rpg_save', JSON.stringify(player)); }
    function resetGame() { if (confirm("Διαγραφή χαρακτήρα;")) { localStorage.removeItem('minimal_rpg_save'); location.reload(); } }

    function startTownRegen() {
        if (townRegenInterval) clearInterval(townRegenInterval);
        townRegenInterval = setInterval(() => {
            const maxHp = getPlayerMaxHp();
            if (!inCombat && player.hp < maxHp) {
                let regenAmount = Math.round(maxHp * 0.1);
                player.hp = Math.min(maxHp, player.hp + regenAmount);
                updateUI();
            }
        }, 2000);
    }

    function stopTownRegen() { if (townRegenInterval) { clearInterval(townRegenInterval); townRegenInterval = null; } }

    function updateCooldownBars() {
        const now = Date.now();

        const potBar = document.getElementById('potion-cd-bar');
        if (potionCooldownActive) {
            let elapsed = now - potionCdStart;
            let pct = Math.min(100, (elapsed / CD_DURATION) * 100);
            potBar.style.width = pct + '%';
            potBar.classList.add('active');
        } else {
            potBar.style.width = '100%';
            potBar.classList.remove('active');
        }

        const skillBar = document.getElementById('skill-cd-bar');
        if (skillCooldownActive) {
            let elapsed = now - skillCdStart;
            let pct = Math.min(100, (elapsed / CD_DURATION) * 100);
            skillBar.style.width = pct + '%';
            skillBar.classList.add('active');
        } else {
            skillBar.style.width = '100%';
            skillBar.classList.remove('active');
        }

        const preciseBar = document.getElementById('precise-cd-bar');

        if (preciseCooldownActive) {
            let elapsed = now - preciseCdStart;
            let pct = Math.min(100, (elapsed / CD_DURATION) * 100);
            preciseBar.style.width = pct + '%';
            preciseBar.classList.add('active');
        } else {
            preciseBar.style.width = '100%';
            preciseBar.classList.remove('active');
        }

    }

        preciseCooldownActive = false;

    function upgradeEquipment(type) {
        if (inCombat) return;
        let currentPower = player[type].power;
        let cost = (type === 'weapon') ? getWeaponUpgradeCost(currentPower) : getArmorUpgradeCost(currentPower);
        if (player.gold >= cost) {
            player.gold -= cost;
            player[type].power++;
            player[type].name = getItemName(type, player[type].power);
            logMessage(`Αναβάθμιση αντικειμένου: ${player[type].name}.`, 'victory');
            buyItemSound();
            
            let targetBox = type === 'weapon' ? 'stat-atk-box' : 'stat-def-box';

            const box = document.getElementById(targetBox);
            box.classList.add('item-upgrade-flash');
            setTimeout(() => {
            box.classList.remove('item-upgrade-flash');
            }, 400);

            createFloatingText(targetBox, "+1 Tier", "var(--accent-gold)");
            createFloatingText('stat-gold-box', `-${cost}g`, "#e74c3c");

            saveGame();
            updateUI();
        }
    }

    function calcDmgModifier(diff) {
    return diff >= 0
        ? 2 - Math.exp(-0.04 * diff)
        : 0.5 + 0.5 * Math.exp(0.08 * diff);
    }

    function rollBaseDamage() {
        let d6 = Math.floor(Math.random() * 6) + 1;
        let diff = getPlayerAtk() - monster.def;
        let dmgModifier = calcDmgModifier(diff);
        let dmg = d6 * 5 * player.level * dmgModifier;
        return Math.max(1, Math.round(dmg));
    }

       function performPlayerAttack(skill = null) {

            let hitChance = skill?.hitChance ?? 80;
            hitChance = Math.max(10, Math.min(100, hitChance));

            if (Math.floor(Math.random() * 100) >= hitChance) {

                return {
                    damage: 0,
                    log: skill
                        ? `[SKILL] ${skill.name}: Αστόχησε.`
                        : "Αστόχησες."
                };
            }

            // βασικό damage
            let damage = rollBaseDamage();

            // skill modifier
            if (skill) {

                damage = Math.round(damage * skill.multiplier);

                if (skill.sound)
                    skill.sound();

                return {
                    damage,
                    log: `[SKILL] ${skill.name}! Προκάλεσες ${damage} ζημιά.`
                };
            }

            return {
                damage,
                log: `Χτύπησες: ${damage} ζημιά σε ${monster.name}.`
            };
        }


    function queueSpecialAttack() {
        if (!inCombat || !monster || skillCooldownActive || isSkillQueued) return;
        isSkillQueued = true;
        queuedSkill = skills.heavyStrike;
        logMessage("[QUEUE] Το Ισχυρό Πλήγμα προετοιμάστηκε για τον επόμενο γύρο.", 'system');
        updateUI();
    }

    function queuePreciseStrike() {
    if (!inCombat || !monster || preciseCooldownActive) return;

    let result = performPlayerAttack(skills.preciseStrike);

    preciseCooldownActive = true;
    preciseCdStart = Date.now();
    preciseCdTimer = setTimeout(() => {
        preciseCooldownActive = false;
        updateUI();
    }, CD_DURATION);

    resolvePlayerAttack(result);
}

function resolvePlayerAttack(result) {
    if (result.log) logMessage(result.log, 'player');
    if (result.damage > 0) {
        monster.hp = Math.max(0, monster.hp - result.damage);
        if (monster.hp > 0) hitSound();
        createFloatingText('monster-hp-parent', `-${result.damage}`, "var(--hp-monster)");
    }
    else {
    createFloatingText('monster-hp-parent', 'MISS', '#ffffff');
        }
        
    updateUI();

    if (monster.hp <= 0) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => {
            document.getElementById('monster-hp-parent').classList.remove('monster-death');
        }, 500);
        endCombat('victory');
        return true;
    }
    return false;
}

function executeCombatRound() {
    logMessage("--------", 'system');
    if (!inCombat) return;
    if (waitingForNextMonster) return;

    if (!monster || monster.hp <= 0) {
        spawnMonster();
        updateUI();
    }

    // ==========================================
    // ΦΑΣΗ 1: ΥΠΟΛΟΓΙΣΜΟΣ ΕΠΙΘΕΣΕΩΝ (ταυτόχρονα)
    // ==========================================

    // Κρατάμε σε μια μεταβλητή αν χρησιμοποιήθηκε το Άμεσο Πλήγμα σε αυτόν τον γύρο
    let usedPreciseStrikeThisRound = false;

    // --- Επίθεση Παίκτη ---
    let result;

    if (isSkillQueued) {
        isSkillQueued = false;
        result = performPlayerAttack(queuedSkill);
        if (queuedSkill === skills.heavyStrike) {
            skillCooldownActive = true;
            skillCdStart = Date.now();
            skillCdTimer = setTimeout(() => {
                skillCooldownActive = false;
                updateUI();
            }, CD_DURATION);
        }
        if (queuedSkill === skills.preciseStrike) {
            usedPreciseStrikeThisRound = true; // Ενεργοποιείται η ιδιότητα του skill
            preciseCooldownActive = true;
            preciseCdStart = Date.now();
            preciseCdTimer = setTimeout(() => {
                preciseCooldownActive = false;
                updateUI();
            }, CD_DURATION);
        }
        queuedSkill = null;
    } else {
        result = performPlayerAttack();
    }

    // --- Επίθεση Τέρατος ---
    let monsterDamageCalculated = 0;
    let monsterActionLog = "";
    let monsterHitChance = 80;
    monsterHitChance = Math.max(10, Math.min(100, monsterHitChance));

    if (Math.floor(Math.random() * 100) >= monsterHitChance) {
        monsterActionLog = `${monster.name}: αστόχησε.`;
        monsterDamageCalculated = 0;
    } else {
        let d6 = Math.floor(Math.random() * 6) + 1;
        let diff = monster.atk - getPlayerDef();
        let dmgModifier = calcDmgModifier(diff);
        let dmg = d6 * 5 * monster.level * dmgModifier;
        monsterDamageCalculated = Math.max(1, Math.round(dmg));
        monsterActionLog = `${monster.name}: σου έκανε ${monsterDamageCalculated} ζημιά.`;
    }

    // ==========================================
    // ΦΑΣΗ 2: ΕΦΑΡΜΟΓΗ ΖΗΜΙΩΝ
    // ==========================================

    // Εφαρμογή ζημιάς του Παίκτη
    if (result.log) logMessage(result.log, 'player');
    if (result.damage > 0) {
        monster.hp = Math.max(0, monster.hp - result.damage);
        if (monster.hp > 0) hitSound();
        createFloatingText('monster-hp-parent', `-${result.damage}`, "var(--hp-monster)");
    } else {
        createFloatingText('monster-hp-parent', 'MISS', '#ffffff');
    }

    // ΣΥΓΚΕΚΡΙΜΕΝΟΣ ΕΛΕΓΧΟΣ: Αν χρησιμοποιήθηκε το Άμεσο Πλήγμα και το τέρας πέθανε,
    // η μάχη τελειώνει ΕΔΩ, κόβοντας την επίθεση του τέρατος.
    if (usedPreciseStrikeThisRound && monster.hp <= 0) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-parent').classList.remove('monster-death'), 500);
        updateUI();
        endCombat('victory');
        return;
    }

    // Εφαρμογή ζημιάς του Τέρατος (εκτελείται κανονικά αν δεν ίσχυε το παραπάνω)
    if (monsterActionLog) logMessage(monsterActionLog, 'monster');
    if (monsterDamageCalculated > 0) {
        player.hp = Math.max(0, player.hp - monsterDamageCalculated);
        createFloatingText('player-hp-parent', `-${monsterDamageCalculated}`, "var(--hp-monster)");
    } else {
        createFloatingText('player-hp-parent', 'DODGED', "var(--hp-player)");
    }

    updateUI();

    // ==========================================
    // ΦΑΣΗ 3: ΕΛΕΓΧΟΣ ΑΠΟΤΕΛΕΣΜΑΤΟΣ (Κλασικός ταυτόχρονος έλεγχος)
    // ==========================================
    let playerDied = player.hp <= 0;
    let monsterDied = monster.hp <= 0;

    if (monsterDied && playerDied) {
        document.getElementById('monster-hp-bar').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-bar').classList.remove('monster-death'), 500);
        playerDeathSound();
        endCombat('mutual_death');
        return;
    }

    if (monsterDied) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-parent').classList.remove('monster-death'), 500);
        endCombat('victory');
        return;
    }

    if (playerDied) {
        endCombat('defeat');
        playerDeathSound();
        return;
    }
}

    function handleEquipmentDrop(type, rolledTier) {
    let itemName = getItemName(type, rolledTier);
    logMessage(`[DROP] Στον εχθρό βρέθηκε: ${itemName}!`, 'victory');
    itemDropSound();
   

    if (rolledTier > player[type].power) {

        player[type] = { name: itemName, power: rolledTier };

        logMessage(`[EQUIP] Αναβάθμιση εξοπλισμού!`, 'victory');

        let targetBox =
            type === 'weapon' ? 'stat-atk-box' :
            type === 'armor' ? 'stat-def-box' :
            'stat-magic-box';

        const box = document.getElementById(targetBox);
            box.classList.add('item-upgrade-flash');
            setTimeout(() => {
            box.classList.remove('item-upgrade-flash');
            }, 400);

        if (type !== 'magic') {
            createFloatingText(targetBox, "NEW EQUIP!", "var(--accent-gold)");
        } else {
            createFloatingText('player-hp-parent', "MAX HP UP!", "var(--hp-player)");
        }

    } else {

    let sellValue;

    if (type === 'weapon') {
        sellValue = Math.floor(getWeaponUpgradeCost(rolledTier - 1) / 8);
    }
    else if (type === 'armor') {
        sellValue = Math.floor(getArmorUpgradeCost(rolledTier - 1) / 8);
    }
    else {
        // magic
        sellValue = Math.floor(getArmorUpgradeCost(rolledTier - 1) / 8);
    }

    player.gold += sellValue;

    logMessage(
        `[DROP] Το αντικείμενο ήταν κατώτερο και εκποιήθηκε για ${sellValue} χρυσά.`,
        'system'
    );

    createFloatingText('stat-gold-box', `+${sellValue}g`, "var(--accent-gold)");
}
}

   function endCombat(outcome) {
        if (outcome !== 'victory') {
            isAttemptingRetreat = false;
        }
        isSkillQueued = false;

        if (outcome === 'victory' || outcome === 'mutual_death') {
            document.getElementById('monster-hp-bar').classList.add('monster-death');
            setTimeout(() => document.getElementById('monster-hp-bar').classList.remove('monster-death'), 500);
            logMessage(`${monster.name}: εξοντώθηκε.`, 'victory');
            monsterDeathSound();
            
          
            // Υπολογισμός χρυσού με bonus για τα μη-normal τέρατα
            let d6Gold = Math.floor(Math.random() * 6) + 1;
            let goldMultiplier = (monster.variant !== 'normal') ? 2 : 1;
            let gainedGold = Math.floor(d6Gold * (monster.level ** 1.8) * goldMultiplier);
            
            player.gold += gainedGold;
            sessionGold += gainedGold;
            logMessage(`+${gainedGold} GP`, 'victory');
            createFloatingText('stat-gold-box', `+${gainedGold}g`, "var(--accent-gold)");

            let gainedXp = getMonsterXpReward(monster.level) *
               (monster.variant !== 'normal' ? 2 : 1);
            player.xp += gainedXp;
            sessionXp += gainedXp;
            logMessage(`+${gainedXp} XP`, 'victory');
            createFloatingText('xp-parent', `+${gainedXp} XP`, "var(--accent-gold)");

            
            // weaponchances
            let weaponChance  = (monster.variant === 'weapon') ? 1.00 : 0.000;
            let armorChance  = (monster.variant === 'armor') ? 1.00 : 0.000;
            let magicChance  = (monster.variant === 'magic') ? 1.00 : 0.000;

            
            let rolledPower = monster.level;
            let droppedSomething = false;

            if (monster.level === 0.5) {
    // κανένα drop
}
else {
    let rolledPower = rollItemTier(monster.level);

    if (Math.random() < weaponChance) handleEquipmentDrop('weapon', rolledPower);
    if (Math.random() < armorChance) handleEquipmentDrop('armor', rolledPower);
    if (Math.random() < magicChance) handleEquipmentDrop('magic', rolledPower);
}
            if (droppedSomething) { triggerSmoothTransition('#3e3200'); }

            if (player.xp >= player.nextXp) {
                player.level++;
                player.xp -= player.nextXp;
                player.nextXp = calculateNextXpRequirement(player.level);
                player.baseAtk += 0;
                player.baseDef += 0;
                player.hp = getPlayerMaxHp(); 
                logMessage(`*** ΑΠΟΚΤΗΣΗ ΕΠΙΠΕΔΟΥ: Level ${player.level}! ***`, 'victory');
                triggerSmoothTransition('#113f11');
                levelUpSound();
                
            }

            saveGame();
            if (outcome === 'victory') {
                if (isAttemptingRetreat) {

    document.getElementById('monster-hp-bar').classList.add('monster-death');

        if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
        inCombat = false;
        monster = null;
        isAttemptingRetreat = false;


    setTimeout(() => {

        document.getElementById('monster-hp-bar').classList.remove('monster-death');



        startTownRegen();
        document.getElementById('town-interface').classList.remove('hidden');
        document.getElementById('combat-interface').classList.add('hidden');
        logMessage("Υποχώρηση στον Τεκέ του Ζαλαδούρα. Ρίχνεις έναν υπνάκο.", 'retreat');
        player.hp = Math.round(getPlayerMaxHp() * 0.10);
        
        updateUI();

    }, 500);

    return;
}
 else {
    waitingForNextMonster = true;
    monster = null;

    logMessage("Ψάχνεις για νέο εχθρό...", "system");
    updateUI();

    setTimeout(() => {
        waitingForNextMonster = false;

        if (inCombat) {
            spawnMonster();
            logMessage(`Εμφανίζεται: ${monster.name}!`, "system");
            updateUI();
        }
    }, 2000);
}
            }
            updateUI();

            if (outcome === 'mutual_death') {
                if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
                inCombat = false;
                applyDefeatPenalties();
            }
        } else {
            if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
            inCombat = false;

            if (outcome === 'defeat') {
                applyDefeatPenalties();
            } else if (outcome === 'retreat') {
                
                startTownRegen();
                saveGame();
                document.getElementById('town-interface').classList.remove('hidden');
                document.getElementById('combat-interface').classList.add('hidden');
                updateUI();
            }
        }
    }

    function applyDefeatPenalties() {
        let xpLoss = Math.floor(player.xp * 0.20);
        let goldLoss = Math.floor(player.gold * 0.20);
        
        player.xp = Math.max(0, player.xp - xpLoss);
        player.gold = Math.max(0, player.gold - goldLoss);
        player.hp = 1; 
        
        logMessage(`Σκοτώθηκες! Μεταφερθήκες στην πόλη με 1 HP. Απώλεια: -${goldLoss} χρυσά και -${xpLoss} XP.`, 'monster');
        triggerSmoothTransition('#4a1515');

        resetCooldowns();
        startTownRegen();

        saveGame();
        document.getElementById('town-interface').classList.remove('hidden');
        document.getElementById('combat-interface').classList.add('hidden');
        updateUI();
    }

    function usePotion() {
        if (potionCooldownActive) return;
        
        let maxHp = getPlayerMaxHp();
        if (player.hp >= maxHp) {
            logMessage("Η υγεία είναι ήδη πλήρης.", 'system');
            return;
        }

        let pct = Math.floor(Math.random() * 41) + 10; 
        let heal = Math.round(maxHp * (pct / 100));
        player.hp = Math.min(maxHp, player.hp + heal);
        logMessage(`Αναπλήρωσες +${heal} HP μέσω Φίλτρου (Αναπλήρωση: ${pct}%).`, 'player');
        potionSound();

        createFloatingText('player-hp-parent', `+${heal} HP`, "var(--hp-player)");

        potionCooldownActive = true;
        potionCdStart = Date.now();
        potionCdTimer = setTimeout(() => { potionCooldownActive = false; updateUI(); }, CD_DURATION);

        saveGame();
        updateUI();
    }

    setInterval(updateCooldownBars, 100);

    window.addEventListener('keydown', function(event) {
        if (document.activeElement === document.getElementById('p-name')) return;

        if (event.code === 'NumpadEnter' || event.key === 'Enter') {
            event.preventDefault(); 
            if (inCombat) {
                toggleRetreat();
            } else {
                enterCombatFromSelector();
            }
            return;
        }
        if (event.code === 'Numpad4' || event.key === '4') {
            event.preventDefault();
            queueSpecialAttack();
            return;
        }
                if (event.code === 'Numpad5' || event.key === '5') {
            event.preventDefault();
            queuePreciseStrike();
            return;
        }
        if (event.code === 'Numpad6' || event.key === '6') {
            event.preventDefault();
            usePotion();
            return;
        }
    });
</script>
