<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κάθαρμα v72</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-gold: #ffd700;
            --hp-player: #2ecc71;
            --hp-monster: #e74c3c;
            --border-color: #333333;
            --skill-blue: #3498db;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            transition: background-color 3s ease;
        }

        h2, h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .header-row h3 {
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .editable-name {
            border-bottom: 1px dashed var(--accent-gold);
            cursor: pointer;
            padding: 0 4px;
        }
        .editable-name:focus {
            outline: none;
            background-color: #2a2a2a;
            border-bottom: 1px solid var(--accent-gold);
        }

        .xp-wrapper-area {
            position: relative;
            margin: -2px 0 15px 0;
        }

        .rates-row{
            display:flex;
            justify-content:flex-end;
            gap:4px;
            margin-top:-10px;
            margin-bottom:12px;
        }

        .rates-row input{
            width:70px;
            font-size:11px;
        }

        .reset-rates-btn{
            padding:2px 6px;
        }

        .xp-bar-container {
            background-color: #333;
            width: 100%;
            height: 6px;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        #p-xp-bar {
            height: 100%;
            width: 0%;
            background-color: #40a8ee;
            transition: width 0.2s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            margin-bottom: 5px;
            font-size: 0.95rem;
            align-items: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #171717;
            padding: 4px 8px;
            border: 1px solid #252525;
            border-radius: 3px;
            position: relative;
        }

        .inline-upgrade-btn {
            background-color: #2a2a2a;
            color: var(--accent-gold);
            border: 1px solid #444;
            padding: 8px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 2px;
            font-family: inherit;
            transition: all 0.2s;
            margin-left: 10px;
        }
        .inline-upgrade-btn:hover:not(:disabled) {
            background-color: #3a3a3a;
            border-color: var(--accent-gold);
        }
        .inline-upgrade-btn:disabled {
            color: var(--text-muted);
            border-color: #222;
            background-color: #1a1a1a;
            cursor: not-allowed;
            opacity: 0.4;
        }

        .gold { color: var(--accent-gold); font-weight: bold; }

        .cooldown-grid {
            display: grid;
            grid-template-columns: 100px 1fr 100px 1fr;
            gap: 10px;
            align-items: center;
        }

        .cd-action-cell {
            display: flex;
            align-items: center;
            gap: 8px; /* Κενό μεταξύ μπάρας, κουμπιού και κειμένου */
            width: 100%;
        }
        .cd-action-cell .cd-wrapper { flex: none; width: 60px }
        .cd-action-cell button { margin-left: 0; flex-shrink: 0; }

        .bar-container {
            background-color: #333;
            width: 100%;
            height: 20px;
            border-radius: 3px;
            overflow: visible;
            margin: 5px 0 15px 0;
            position: relative;
        }

        .bar {
            height: 100%;
            width: 100%;
            transition: width 0.2s ease;
            border-radius: 3px;
        }

        #player-hp-bar { background-color: var(--hp-player); }
        #monster-hp-bar { background-color: var(--hp-monster); }

        .bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            left: 0;
            font-size: 0.85rem;
            line-height: 20px;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        .cd-wrapper {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        .cd-inner {
            height: 100%;
            width: 100%;
            background-color: #6ec6ff;
            transition: width 0.1s linear;
        }

        .skill-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:8px;
            margin-top:10px;
            margin-bottom:15px;
        }

.skill-btn{
    position:relative;
    overflow:hidden;

    width:100%;
    height:44px;
    padding:0;

    border:1px solid #444;
    border-radius:4px;

    background:#1a1a1a;

    color:white;
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;

    cursor:pointer;

    --fill:100%;
    --ready-color:#2c3e50;
}

.skill-btn::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    width:var(--fill);
    height:100%;
    background:var(--ready-color);
    z-index:0;
}

.hunt-btn{
    --ready-color:#461a1a;      /* κόκκινο όταν λέει Σκότωσε */
}

.potion-btn{
    --ready-color:#0e703f;
}

.hunt-btn.retreat-ready{
    --ready-color:var(--accent-gold);
}

.hunt-btn.retreat-mode{
    --ready-color:#8a8a8a;      /* γαλάζιο όταν λέει Τρέξε */
}

.hunt-btn::before{
    background:var(--ready-color);
}

.skill-btn span{
    position:relative;
    z-index:1;
}

.skill-btn:disabled{
    opacity:1;
}

<script>







function getPlayerDamageBonus() {
    return (getPlayerAtk() - monster.def) * 0.05;
}
function getMonsterDamageBonus() {
    return (monster.atk - getPlayerDef()) * 0.05;
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let soundEnabled = true;

//  const now = audioCtx.currentTime;

function monsterDeathSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Ανεβάσαμε λίγο τις συχνότητες (από 400/200 σε 480/280) για να ακούγεται το μπάσο στο Android
    [480, 280].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine"; 
        const startTime = now + i * 0.06; 
        const duration = 0.14; 

        osc.frequency.setValueAtTime(freq, startTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.4, startTime + duration);

        gain.gain.setValueAtTime(0, startTime);
        // Ελαφρώς χαμηλότερο peak gain (0.2 αντί για 0.3) για να μην μπουκώνει
        gain.gain.linearRampToValueAtTime(0.2, startTime + 0.005); 
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
    });
}

function playerDeathSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Ανέβηκαν οι συχνότητες (από 180, 120, 70 σε 320, 240, 160) για να μην τις «καταπίνει» το κινητό
    // Χαμηλώσαμε το gain από 0.5 σε 0.22 επειδή οι νέες συχνότητες ακούγονται πιο δυνατά
    const freqs = [320, 240, 160];

    freqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        const t = now + i * 0.08;

        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.6, t + 0.18);

        gain.gain.setValueAtTime(0.22, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.20);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.20);
    });
}

function hitSound() {
    if (!soundEnabled) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "triangle";
    const now = audioCtx.currentTime;

    // Από 180->90 το πήγαμε 360->140. Το pop-corn "κλικ" παραμένει, αλλά ακούγεται πεντακάθαρα στο Android
    // Ρυθμίσαμε το gain στο 0.28 για να είναι ισορροπημένο
    osc.frequency.setValueAtTime(360, now);
    osc.frequency.exponentialRampToValueAtTime(140, now + 0.04);

    gain.gain.setValueAtTime(0.28, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.05);
}

function specialHitSound() {
    if (!soundEnabled) return;
 
    const now = audioCtx.currentTime;

    // Κύριο χτύπημα (Ανέβηκαν οι συχνότητες και μαζεύτηκε το gain στο 0.3)
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();

    osc1.type = "triangle";
    osc1.frequency.setValueAtTime(380, now);
    osc1.frequency.exponentialRampToValueAtTime(150, now + 0.08);

    gain1.gain.setValueAtTime(0.3, now);
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);

    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);

    osc1.start(now);
    osc1.stop(now + 0.10);

    // Echo (Ανέβηκαν οι συχνότητες και μαζεύτηκε το gain στο 0.15)
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    osc2.type = "triangle";
    osc2.frequency.setValueAtTime(280, now + 0.035);
    osc2.frequency.exponentialRampToValueAtTime(120, now + 0.10);

    gain2.gain.setValueAtTime(0.15, now + 0.035);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start(now + 0.035);
    osc2.stop(now + 0.13);
}

function potionSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Οι συχνότητες εδώ ήταν σχετικά καλές, απλά μαζέψαμε το αρχικό gain (0.25 και 0.12) για να μην κάνει clip
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();

    osc1.type = "sine";
    osc1.frequency.setValueAtTime(160, now);
    osc1.frequency.exponentialRampToValueAtTime(260, now + 0.08);

    gain1.gain.setValueAtTime(0.25, now);
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);

    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);

    osc1.start(now);
    osc1.stop(now + 0.10);

    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    osc2.type = "sine";
    osc2.frequency.setValueAtTime(200, now + 0.05);
    osc2.frequency.exponentialRampToValueAtTime(340, now + 0.15);

    gain2.gain.setValueAtTime(0.12, now + 0.05);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start(now + 0.05);
    osc2.stop(now + 0.16);
}

function levelUpSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Εδώ είχες ήδη 0.15 gain, το οποίο είναι καλό. Χαμηλώσαμε τις νότες κατά μία οκτάβα 
    // (από 523, 659, 784 σε Do-Mi-Sol της προηγούμενης οκτάβας) για να ακούγεται πιο γλυκό και "γεμάτο"
    const notes = [261.63, 329.63, 392.00];

    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        const t = now + i * 0.08;

        osc.frequency.setValueAtTime(freq, t);

        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.15);
    });
}

function itemDropSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Πολύ ψηλές συχνότητες (1400, 2100). Κρατάμε το fast-blip, αλλά ρίχνουμε το gain στο 0.08 
    // για να ακούγεται σαν διακριτικό text/drop εφέ χωρίς να ενοχλεί
    const notes = [1400, 2100];

    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        const t = now + i * 0.03;

        osc.frequency.setValueAtTime(freq, t);

        gain.gain.setValueAtTime(0.08, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.10);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.10);
    });
}

function buyItemSound() {
    if (!soundEnabled) return;
    const now = audioCtx.currentTime;

    // Ο μεγάλος ένοχος! Το 0.5 gain στα 900Hz-1400Hz έσπαγε τα ηχεία. 
    // Κατεβάσαμε το gain στο 0.12 για τον osc1 και 0.04 για το λαμπύρισμα (osc2). 
    // Ο ήχος παραμένει ακριβώς ο ίδιος σε δομή, αλλά έρχεται σε τέλεια ισορροπία.
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();

    osc1.type = "triangle";
    osc1.frequency.setValueAtTime(900, now);
    osc1.frequency.exponentialRampToValueAtTime(1400, now + 0.05);

    gain1.gain.setValueAtTime(0.12, now); // Από 0.5
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.07);

    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);

    osc1.start(now);
    osc1.stop(now + 0.07);

    // μικρό λαμπύρισμα
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    osc2.type = "sine";
    osc2.frequency.setValueAtTime(1800, now + 0.02);

    gain2.gain.setValueAtTime(0.04, now + 0.02); // Από 0.15
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start(now + 0.02);
    osc2.stop(now + 0.08);
}

function playerHitSound() {
    if (!soundEnabled) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine"; 
    const now = audioCtx.currentTime;

    // Πιο χαμηλή και υπόκωφη συχνότητα για να μην μπερδεύεται με το Hit του παίκτη
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(170, now + 0.04);

    // Ελάχιστο gain για να μην μπουκώνει το ηχείο του Android στην ταυτόχρονη μάχη
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.04);
}

function retreatSound() {
    if (!soundEnabled) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    // Το 'sine' κύμα είναι το πιο απαλό και καθαρό, ιδανικό για "καλμ" ήχους
    osc.type = "sine"; 
    const now = audioCtx.currentTime;

    // Ξεκινάμε από μια πιο υψηλή συχνότητα και πέφτουμε αργά, 
    // δίνοντας μια αίσθηση "αναστεναγμού" ή απομάκρυνσης
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(100, now + 0.6);

    // Το gain πέφτει πολύ ομαλά για να μην ακουστεί "κλικ" ή "ποπ"
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.6);
}

function getPlayerTitle(level) {
    let currentTitle = "Αλήτης";

    for (let lvl of Object.keys(levelTitles)) {
        if (level >= lvl) currentTitle = levelTitles[lvl];
    }

    return currentTitle;
}

    function getMonsterName(lvl) {
    if (lvl === 0.5) return "Μπάμπουρας";

    return monsterNames[Math.min(Math.floor(lvl) - 1, monsterNames.length - 1)];
}

    function getItemName(type, power) {
        if (power === 0) return type === 'weapon' ? "Γυμνά Χέρια" : (type === 'armor' ? "Κουρέλια" : "Κανένα");
        let arr = type === 'weapon' ? weaponNames : (type === 'armor' ? armorNames : magicNames);
        let idx = Math.min(power - 1, arr.length - 1);
        return `${arr[idx]} `;
    }

    function rollItemTier(monsterLevel) {
    let d6a = Math.floor(Math.random() * 6) + 1;
    let d6b = Math.floor(Math.random() * 6) + 1;
    let modifier = d6a - d6b; // -5 έως +5
    let tier = monsterLevel + modifier;
    tier = Math.max(1, Math.min(100, tier));
    return tier;
}

    function createFloatingText(parentId, text, color) {
        const parent = document.getElementById(parentId);
        if (!parent) return;
        
        const fText = document.createElement('div');
        fText.className = 'floating-text';
        fText.innerText = text;
        fText.style.color = color;
        
        const offset = Math.floor(Math.random() * 40) - 20; 
        fText.style.left = `calc(50% + ${offset}px)`;
        fText.style.top = `0px`;
        
        parent.appendChild(fText);
        setTimeout(() => { fText.remove(); }, 1400);
    }

    function startTownRegen() {
        if (townRegenInterval) clearInterval(townRegenInterval);
        townRegenInterval = setInterval(() => {
            const maxHp = getPlayerMaxHp();
            if (!inCombat && player.hp < maxHp) {
                let regenAmount = Math.round(maxHp * 0.1);
                player.hp = Math.min(maxHp, player.hp + regenAmount);
                updateUI();
            }
        }, 2000);
    }

    function stopTownRegen() { if (townRegenInterval) { clearInterval(townRegenInterval); townRegenInterval = null; } }

    // Μπύρα
    const btnPotion = document.getElementById('btn-potion');

    if (potionCooldownActive) {
        let elapsed = now - potionCdStart;
        let pct = Math.min(100, (elapsed / CD_DURATION) * 100);
        btnPotion.style.setProperty('--fill', pct + '%');
    } else {
        btnPotion.style.setProperty('--fill', '100%');
    }


    // Κατραπακιά

    if (skillCooldownActive) {
        let elapsed = now - skillCdStart;
        let pct = Math.min(100, (elapsed / CD_DURATION) * 100);
        btnSkill.style.setProperty('--fill', pct + '%');
    } else {
        btnSkill.style.setProperty('--fill', '100%');
    }


    // Εκτέλεση
    const btnPrecise = document.getElementById('btn-precise');

    if (preciseCooldownActive) {
        let elapsed = now - preciseCdStart;
        let pct = Math.min(100, (elapsed / CD_DURATION) * 100);
        btnPrecise.style.setProperty('--fill', pct + '%');
    } else {
        btnPrecise.style.setProperty('--fill', '100%');

    function upgradeEquipment(type) {
        if (inCombat) return;
        let currentPower = player[type].power;
        let cost = (type === 'weapon') ? getWeaponUpgradeCost(currentPower) : getArmorUpgradeCost(currentPower);
        if (player.gold >= cost) {
            player.gold -= cost;
            player[type].power++;
            player[type].name = getItemName(type, player[type].power);
            logMessage(`Αναβάθμιση αντικειμένου: ${player[type].name}.`, 'victory');
            buyItemSound();
            
            let targetBox = type === 'weapon' ? 'stat-atk-box' : 'stat-def-box';

            const box = document.getElementById(targetBox);
            box.classList.add('item-upgrade-flash');
            setTimeout(() => {
            box.classList.remove('item-upgrade-flash');
            }, 400);

            createFloatingText(targetBox, "+1 Tier", "var(--accent-gold)");
            createFloatingText('stat-gold-box', `-${cost}g`, "#e74c3c");

            saveGame();
            updateUI();
        }
    }

    function spawnMonster() {
        let lvl = currentSelectedLevel;
        let baseAtk = 10 + (lvl-1) + (lvl-1);
        let baseDef = 10 + (lvl-1) + (lvl-1) ;
        let baseHp = (lvl * 100)
        let variant = 'normal';

        if (Math.random() < 0.15) {
            let roll = Math.random();
            if (roll < 0.33) { variant = 'weapon'; baseAtk = baseAtk + 10; }
            else if (roll < 0.66) { variant = 'armor'; baseDef = baseDef + 10; }
            else { 
                variant = 'magic'; {
                baseAtk = baseAtk + 10;
                baseDef = baseDef + 10; }
            }
        }

        monster = {
            name: getMonsterName(lvl),
            level: lvl,
            atk: baseAtk,
            def: baseDef,
            hp: baseHp,      
            maxHp: baseHp,   
            variant: variant
        };

        let prefix = "";
        if (variant === 'weapon') prefix = "<Άγριο> ";
        if (variant === 'armor') prefix = "<Θωρακισμένο> ";
        if (variant === 'magic') prefix = "<Μαγικό> ";

       // logMessage("--------", 'system');
       // logMessage(`Εμφανίστηκε: ${prefix}${monster.name} (Lvl ${monster.level})!`, 'system');
    }

    function toggleRetreat() {
        if (!inCombat) return;
        isAttemptingRetreat = !isAttemptingRetreat;
        if (isAttemptingRetreat) {
            logMessage("Επιχειρείς να ξεφύγεις!", 'retreat');
        } else {
            logMessage("Η προσπάθεια διαφυγής ακυρώθηκε.", 'system');
        }
        updateUI();
    }

    function handleHuntRetreatClick() {
        if (inCombat) {
            toggleRetreat();
        } else {
            enterCombatFromSelector();
        }
    }

    function calcDmgModifier(diff) {
    return diff >= 0
        ? 2 - Math.exp(-0.04 * diff)
        : 0.5 + 0.5 * Math.exp(0.08 * diff);
    }

    function rollBaseDamage(fixedDice = null) {
        let d6;
        if (fixedDice !== null) {
            d6 = fixedDice;
        } else {
            d6 = Math.floor(Math.random() * 6) + 1;
        }
        let diff = getPlayerAtk() - monster.def;
        let dmgModifier = calcDmgModifier(diff);
        let dmg = d6 * 5 * player.level * dmgModifier;
        return Math.max(1, Math.round(dmg));
    }

       function performPlayerAttack(skill = null) {

            let hitChance = skill?.hitChance ?? 80;
            hitChance = Math.max(10, Math.min(100, hitChance));

            if (Math.floor(Math.random() * 100) >= hitChance) {

                return {
                    damage: 0,
                    log: skill
                        ? `[SKILL] ${skill.name}: Αστόχησε.`
                        : "Αστόχησες."
                };
            }

            // βασικό damage
            let damage = rollBaseDamage(skill?.fixedDice);

            // skill modifier
            
            if (skill) {
               
                damage = Math.round(damage * skill.multiplier);

                if (skill.sound)
                    skill.sound();

                return {
                    damage,
                    log: `[SKILL] ${skill.name}! Προκάλεσες ${damage} ζημιά.`
                };
            }

            return {
                damage,
                log: `Χτύπησες: ${damage} ζημιά σε ${monster.name}.`
            };
        }


    function queueSpecialAttack() {
        if (!inCombat || !monster || skillCooldownActive || isSkillQueued) return;
        isSkillQueued = true;
        queuedSkill = skills.heavyStrike;
        logMessage("[QUEUE] Η Κατραπακιά προετοιμάστηκε για τον επόμενο γύρο.", 'system');
        updateUI();
    }

    function queuePreciseStrike() {
    if (!inCombat || !monster || preciseCooldownActive) return;
    if (monster.hp > monster.maxHp * skills.preciseStrike.executeThreshold) return;

    let result = performPlayerAttack(skills.preciseStrike);

    preciseCooldownActive = true;
    preciseCdStart = Date.now();
    preciseCdTimer = setTimeout(() => {
        preciseCooldownActive = false;
        updateUI();
    }, CD_DURATION);

    resolvePlayerAttack(result);
}

function resolvePlayerAttack(result) {
    if (result.log) logMessage(result.log, 'player');
    if (result.damage > 0) {
        monster.hp = Math.max(0, monster.hp - result.damage);
        if (monster.hp > 0) hitSound();
        createFloatingText('monster-hp-parent', `-${result.damage}`, "var(--hp-monster)");
    }
    else {
    createFloatingText('monster-hp-parent', 'ΑΠΕΦΥΓΕ', '#ffffff');
        }
        
    updateUI();

    if (monster.hp <= 0) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => {
            document.getElementById('monster-hp-parent').classList.remove('monster-death');
        }, 500);
        endCombat('victory');
        return true;
    }
    return false;
}

function forceRetreat() {
    // 1. ΣΤΑΜΑΤΗΜΑ του interval της μάχης
    if (typeof combatInterval !== 'undefined') {
        clearInterval(combatInterval);
        combatInterval = null;
    }

    // 2. Επαναφορά του interface
    document.getElementById('monster-hp-bar').classList.remove('monster-death');
    startTownRegen();
    document.getElementById('town-interface').classList.remove('hidden');
    document.getElementById('combat-interface').classList.add('hidden');

    // 3. Επαναφορά μεταβλητών κατάστασης
    inCombat = false;
    isAttemptingRetreat = false;
    isSkillQueued = false;
    queuedSkill = null;
    player.hp = Math.round(getPlayerMaxHp() * 0.10);
    logMessage("Επέστρεψες κουρασμένος στον Τεκέ του Ζαλαδούρα. Ρίχνεις έναν υπνάκο.", 'retreat');
    createFloatingText('player-hp-parent', "ΥΠΟΧΩΡΗΣΗ", "#00d2ff");
    retreatSound();
    
    updateUI();
    saveGame();
}

function executeCombatRound() {
    logMessage("--------", 'system');
    if (!inCombat) return;
    if (waitingForNextMonster) return;

    if (!monster || monster.hp <= 0) {
        spawnMonster();
        updateUI();
    }

// Προσθήκη για την πιθανότητα υποχώρησης
if (isAttemptingRetreat) {
    if (Math.random() < 0.25) {
       // logMessage("Ξέφυγες! Γυρίζεις εξουθενωμένος στον Τεκέ.", 'retreat');
        // Προσομοίωση νίκης για να γίνει η διαφυγή με ασφάλεια
      forceRetreat();
      //DOCTOR
      
        return;
    } else {
        logMessage("Υποχώρηση...", 'monster');
    }
}

    // ==========================================
    // ΦΑΣΗ 1: ΥΠΟΛΟΓΙΣΜΟΣ ΕΠΙΘΕΣΕΩΝ (ταυτόχρονα)
    // ==========================================

    // Κρατάμε σε μια μεταβλητή αν χρησιμοποιήθηκε το Άμεσο Πλήγμα σε αυτόν τον γύρο
    let usedPreciseStrikeThisRound = false;

    // --- Επίθεση Παίκτη ---
    let result;

    if (isSkillQueued) {
        isSkillQueued = false;
        result = performPlayerAttack(queuedSkill);
        if (queuedSkill === skills.heavyStrike) {
            skillCooldownActive = true;
            skillCdStart = Date.now();
            skillCdTimer = setTimeout(() => {
                skillCooldownActive = false;
                updateUI();
            }, CD_DURATION);
        }
        if (queuedSkill === skills.preciseStrike) {
            usedPreciseStrikeThisRound = true; // Ενεργοποιείται η ιδιότητα του skill
            preciseCooldownActive = true;
            preciseCdStart = Date.now();
            preciseCdTimer = setTimeout(() => {
                preciseCooldownActive = false;
                updateUI();
            }, CD_DURATION);
        }
        queuedSkill = null;
    } else {
        result = performPlayerAttack();
    }

    // --- Επίθεση Τέρατος ---
    let monsterDamageCalculated = 0;
    let monsterActionLog = "";
    let monsterHitChance = 80;
    monsterHitChance = Math.max(10, Math.min(100, monsterHitChance));

    if (Math.floor(Math.random() * 100) >= monsterHitChance) {
        monsterActionLog = `${monster.name}: αστόχησε.`;
        monsterDamageCalculated = 0;
    } else {
        let d6 = Math.floor(Math.random() * 6) + 1;
        let diff = monster.atk - getPlayerDef();
        let dmgModifier = calcDmgModifier(diff);
        let dmg = d6 * 5 * monster.level * dmgModifier;
        monsterDamageCalculated = Math.max(1, Math.round(dmg));
        monsterActionLog = `${monster.name}: σου έκανε ${monsterDamageCalculated} ζημιά.`;
    }

    // ==========================================
    // ΦΑΣΗ 2: ΕΦΑΡΜΟΓΗ ΖΗΜΙΩΝ
    // ==========================================

    // Εφαρμογή ζημιάς του Παίκτη
    if (result.log) logMessage(result.log, 'player');
    if (result.damage > 0) {
        monster.hp = Math.max(0, monster.hp - result.damage);
        if (monster.hp > 0) hitSound();
        createFloatingText('monster-hp-parent', `-${result.damage}`, "var(--hp-monster)");
    } else {
        createFloatingText('monster-hp-parent', 'ΑΠΕΦΥΓΕ', '#ffffff');
    }

    // ΣΥΓΚΕΚΡΙΜΕΝΟΣ ΕΛΕΓΧΟΣ: Αν χρησιμοποιήθηκε το Άμεσο Πλήγμα και το τέρας πέθανε,
    // η μάχη τελειώνει ΕΔΩ, κόβοντας την επίθεση του τέρατος.
    if (usedPreciseStrikeThisRound && monster.hp <= 0) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-parent').classList.remove('monster-death'), 500);
        updateUI();
        endCombat('victory');
        return;
    }

    // Εφαρμογή ζημιάς του Τέρατος (εκτελείται κανονικά αν δεν ίσχυε το παραπάνω)
    if (monsterActionLog) logMessage(monsterActionLog, 'monster');
    if (monsterDamageCalculated > 0) {
        player.hp = Math.max(0, player.hp - monsterDamageCalculated);
        createFloatingText('player-hp-parent', `-${monsterDamageCalculated}`, "var(--hp-monster)");
        playerHitSound();
    } else {
        createFloatingText('player-hp-parent', 'ΑΠΕΦΥΓΕΣ', "var(--hp-player)");
    }

    updateUI();

    // ==========================================
    // ΦΑΣΗ 3: ΕΛΕΓΧΟΣ ΑΠΟΤΕΛΕΣΜΑΤΟΣ (Κλασικός ταυτόχρονος έλεγχος)
    // ==========================================
    let playerDied = player.hp <= 0;
    let monsterDied = monster.hp <= 0;

    if (monsterDied && playerDied) {
        document.getElementById('monster-hp-bar').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-bar').classList.remove('monster-death'), 500);
        playerDeathSound();
        endCombat('mutual_death');
        return;
    }

    if (monsterDied) {
        document.getElementById('monster-hp-parent').classList.add('monster-death');
        setTimeout(() => document.getElementById('monster-hp-parent').classList.remove('monster-death'), 500);
        endCombat('victory');
        return;
    }

    if (playerDied) {
        endCombat('defeat');
        playerDeathSound();
        return;
    }
}

    function handleEquipmentDrop(type, rolledTier) {
    let itemName = getItemName(type, rolledTier);
    logMessage(`[DROP] Στον εχθρό βρέθηκε: ${itemName}!`, 'victory');
    
   

    if (rolledTier > player[type].power) {
        let oldTier = player[type].power;
        player[type] = { name: itemName, power: rolledTier };
        itemDropSound();
        logMessage(
         `[EQUIP] Αναβάθμιση εξοπλισμού! (T${oldTier} → T${rolledTier})`,
         'victory'
                 );

        let targetBox =
            type === 'weapon' ? 'stat-atk-box' :
            type === 'armor' ? 'stat-def-box' :
            'stat-magic-box';

        const box = document.getElementById(targetBox);
            box.classList.add('item-upgrade-flash');
            setTimeout(() => {
            box.classList.remove('item-upgrade-flash');
            }, 400);

        if (type !== 'magic') {
            createFloatingText(targetBox, "NEW EQUIP!", "var(--accent-gold)");
        } else {
            createFloatingText('player-hp-parent', "MAX HP UP!", "var(--hp-player)");
        }

    } else {

    let sellValue;

    if (type === 'weapon') {
        sellValue = Math.floor(getWeaponUpgradeCost(rolledTier - 1) / 8);
    }
    else if (type === 'armor') {
        sellValue = Math.floor(getArmorUpgradeCost(rolledTier - 1) / 8);
    }
    else {
        // magic
        sellValue = Math.floor(getArmorUpgradeCost(rolledTier - 1) / 8);
    }

    player.gold += sellValue;

    logMessage(
        `[DROP] Το αντικείμενο ήταν κατώτερο και εκποιήθηκε για ${sellValue} χρυσά.`,
        'system'
    );

    createFloatingText('stat-gold-box', `+${sellValue}g`, "var(--accent-gold)");
}
}

   function endCombat(outcome) {
        if (outcome !== 'victory') {
            isAttemptingRetreat = false;
        }
        isSkillQueued = false;

        if (outcome === 'victory' || outcome === 'mutual_death') {
            document.getElementById('monster-hp-bar').classList.add('monster-death');
            setTimeout(() => document.getElementById('monster-hp-bar').classList.remove('monster-death'), 500);
            logMessage(`${monster.name}: εξοντώθηκε.`, 'victory');
            monsterDeathSound();
            
          
            // Υπολογισμός χρυσού με bonus για τα μη-normal τέρατα
            let d6Gold = Math.floor(Math.random() * 6) + 1;
            let goldMultiplier = (monster.variant !== 'normal') ? 2 : 1;
            let gainedGold = Math.floor(d6Gold * (monster.level ** 1.3) * goldMultiplier);
            
            player.gold += gainedGold;
            sessionGold += gainedGold;
            logMessage(`+${gainedGold} GP`, 'victory');
            createFloatingText('stat-gold-box', `+${gainedGold}g`, "var(--accent-gold)");

            let gainedXp = getMonsterXpReward(monster.level) *
               (monster.variant !== 'normal' ? 2 : 1);
            player.xp += gainedXp;
            sessionXp += gainedXp;
            logMessage(`+${gainedXp} XP`, 'victory');
            createFloatingText('xp-parent', `+${gainedXp} XP`, "var(--accent-gold)");

            
            // weaponchances
            let weaponChance  = (monster.variant === 'weapon') ? 1.00 : 0.000;
            let armorChance  = (monster.variant === 'armor') ? 1.00 : 0.000;
            let magicChance  = (monster.variant === 'magic') ? 1.00 : 0.000;

            
            let rolledPower = monster.level;
            let droppedSomething = false;

            if (monster.level === 0.5) {
    // κανένα drop
}
else {
    let rolledPower = rollItemTier(monster.level);

    if (Math.random() < weaponChance) handleEquipmentDrop('weapon', rolledPower);
    if (Math.random() < armorChance) handleEquipmentDrop('armor', rolledPower);
    if (Math.random() < magicChance) handleEquipmentDrop('magic', rolledPower);
}
            if (droppedSomething) { triggerSmoothTransition('#3e3200'); }

        if (player.xp >= player.nextXp && player.level < 100) {
            player.level++;
            player.xp -= player.nextXp;
            if (player.level >= 100) {
                player.level = 100;
                player.xp = 0;              // προαιρετικά
                player.nextXp = 0;          // προαιρετικά
            } else {
                player.nextXp = calculateNextXpRequirement(player.level);
            }
            player.hp = getPlayerMaxHp();
            logMessage(`*** ΑΠΟΚΤΗΣΗ ΕΠΙΠΕΔΟΥ ${player.level}! ***`, 'victory');
            levelUpSound();
            triggerSmoothTransition('#113f11');
        }

            saveGame();
            if (outcome === 'victory') {
                if (isAttemptingRetreat) {

    document.getElementById('monster-hp-bar').classList.add('monster-death');

        if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
        inCombat = false;
        monster = null;
        isAttemptingRetreat = false;


    setTimeout(() => {

        document.getElementById('monster-hp-bar').classList.remove('monster-death');



        startTownRegen();
        document.getElementById('town-interface').classList.remove('hidden');
        document.getElementById('combat-interface').classList.add('hidden');
        logMessage("Επέστρεψες κουρασμένος στον Τεκέ του Ζαλαδούρα. Ρίχνεις έναν υπνάκο.", 'retreat');
        player.hp = Math.round(getPlayerMaxHp() * 0.10);
        // --- ΠΡΟΣΘΗΚΗ FLOATING TEXT ΚΑΤΑ ΤΗΝ ΥΠΟΧΩΡΗΣΗ ---
        createFloatingText('player-hp-parent', "ΥΠΟΧΩΡΗΣΗ", "#00d2ff");
        retreatSound();
        
        
        updateUI();

    }, 500);

    return;
}
 else {
    waitingForNextMonster = true;
    monster = null;

    logMessage("Ψάχνεις για νέο εχθρό...", "system");
    updateUI();

    setTimeout(() => {
        waitingForNextMonster = false;

        if (inCombat) {
            spawnMonster();
            logMessage(`Εμφανίζεται: ${monster.name}!`, "system");
            updateUI();
        }
    }, 2000);
}
            }
            updateUI();

            if (outcome === 'mutual_death') {
                if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
                inCombat = false;
                applyDefeatPenalties();
            }
        } else {
            if (combatInterval) { clearInterval(combatInterval); combatInterval = null; }
            inCombat = false;

            if (outcome === 'defeat') {
                applyDefeatPenalties();
            } else if (outcome === 'retreat') {
                
                startTownRegen();
                saveGame();
                document.getElementById('town-interface').classList.remove('hidden');
                document.getElementById('combat-interface').classList.add('hidden');
                updateUI();
            }
        }
    }

function applyDefeatPenalties() {
    let xpLoss = Math.floor(player.xp * 0.10);
    let goldLoss = Math.floor(player.gold * 0.10);

    player.xp = Math.max(0, player.xp - xpLoss);
    player.gold = Math.max(0, player.gold - goldLoss);
    player.hp = 1;

    // xasimo eksoplismou
    const slots = ['weapon', 'armor', 'magic'];
    const lostSlot = slots[Math.floor(Math.random() * slots.length)];

    const slotNames = {
        weapon: "Το όπλο",
        armor: "Η πανοπλία",
        magic: "Το φυλαχτό"
    };

    if (player[lostSlot].power > 1) {
        player[lostSlot].power--;
        player[lostSlot].name =
            getItemName(lostSlot, player[lostSlot].power);

        logMessage(
            `${slotNames[lostSlot]} υπέστη φθορά και έπεσε σε T${player[lostSlot].power}.`,
            'monster'
        );
    }

    logMessage(
        `Σκοτώθηκες! Μεταφερθήκες στην πόλη με 1 HP. Απώλεια: -${goldLoss} χρυσά και -${xpLoss} XP.`,
        'monster'
    );

    triggerSmoothTransition('#4a1515');

    resetCooldowns();
    startTownRegen();

    saveGame();
    document.getElementById('town-interface').classList.remove('hidden');
    document.getElementById('combat-interface').classList.add('hidden');
    updateUI();
}

    function usePotion() {
        if (potionCooldownActive) return;
        
        let maxHp = getPlayerMaxHp();
        if (player.hp >= maxHp) {
            logMessage("Η υγεία είναι ήδη πλήρης.", 'system');
            return;
        }

        let pct = Math.floor(Math.random() * 41) + 10; 
        let heal = Math.round(maxHp * (pct / 100));
        player.hp = Math.min(maxHp, player.hp + heal);
        logMessage(`Έσφιξες μια μπύρα για +${heal} HP! (Αναπλήρωση: ${pct}%).`, 'player');
        potionSound();

        createFloatingText('player-hp-parent', `+${heal} HP`, "var(--hp-player)");

        potionCooldownActive = true;
        potionCdStart = Date.now();
        potionCdTimer = setTimeout(() => { potionCooldownActive = false; updateUI(); }, CD_DURATION);

        saveGame();
        updateUI();
    }

    setInterval(updateCooldownBars, 100);

    window.addEventListener('keydown', function(event) {
        if (document.activeElement === document.getElementById('p-name')) return;

        if (event.code === 'NumpadEnter' || event.key === 'Enter') {
            event.preventDefault(); 
            if (inCombat) {
                toggleRetreat();
            } else {
                enterCombatFromSelector();
            }
            return;
        }
        if (event.code === 'Numpad4' || event.key === '4') {
            event.preventDefault();
            queueSpecialAttack();
            return;
        }
                if (event.code === 'Numpad5' || event.key === '5') {
            event.preventDefault();
            queuePreciseStrike();
            return;
        }
        if (event.code === 'Numpad6' || event.key === '6') {
            event.preventDefault();
            usePotion();
            return;
        }
    });
